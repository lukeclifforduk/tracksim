<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Train & Truck SIM</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        body {
            margin: 0;
            padding: 0;
            background: #0a1f0a;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            image-rendering: pixelated;
        }
        canvas {
            border: 12px solid #222;
            box-shadow: 0 0 0 16px #1a3a1a;
            image-rendering: pixelated;
            background: #0a1f0a;
        }
    </style>
</head>
<body>
    <canvas id="canvas" width="1200" height="700"></canvas>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // Canvas & track constants
        const WIDTH = 1200;
        const HEIGHT = 700;
        const CENTER_X = 600;
        const CENTER_Y = 350;
        const STRAIGHT_LENGTH = 410;
        const CURVE_RADIUS = 128;
        const LEFT_CX = CENTER_X - STRAIGHT_LENGTH / 2;
        const RIGHT_CX = CENTER_X + STRAIGHT_LENGTH / 2;
        const TOP_Y = CENTER_Y - CURVE_RADIUS;
        const BOTTOM_Y = CENTER_Y + CURVE_RADIUS;
        const TOTAL_TRACK_LENGTH = 2 * STRAIGHT_LENGTH + 2 * Math.PI * CURVE_RADIUS;

        // Train & carriage dimensions
        const TRAIN_LENGTH = 42;
        const TRAIN_WIDTH = 20;
        const CARRIAGE_LENGTH = 26;
        const CARRIAGE_WIDTH = 22;
        const CARRIAGE_SEPARATION = 36;

        // Train Speed and State
        let baseSpeed = 265;
        let currentSpeed = baseSpeed;
        let trainState = 'MOVING';
        let trainStopTimer = 0;
        let distance = 120;
        let trainAtStation = null;

        const STOP_DIST_1 = 285;
        const STOP_DIST_2 = STOP_DIST_1 + STRAIGHT_LENGTH + Math.PI * CURVE_RADIUS;
        const BRAKE_DISTANCE = 185;
        const ACCELERATION_RATE = 135;

        // Station & Parking settings
        const STATION_X = 529;
        const STATION_WIDTH = 142;
        const PARKING_WIDTH = 110;
        const PARKING_HEIGHT = 55;
        const topParkingY = TOP_Y - 30 - 78 - PARKING_HEIGHT - 4;
        const TOP_ROAD_Y = topParkingY + PARKING_HEIGHT / 2;
        const bottomParkingY = BOTTOM_Y + 4 + 26 + 78 + 6;
        const BOTTOM_ROAD_Y = bottomParkingY + PARKING_HEIGHT / 2;

        // Storage areas
        const STORAGE_WIDTH = 92;
        const STORAGE_HEIGHT = 98;
        const TOP_STORAGE_X = STATION_X - 108;
        const TOP_STORAGE_Y = TOP_Y - 128;
        const BOTTOM_STORAGE_X = STATION_X + STATION_WIDTH + 18;
        const BOTTOM_STORAGE_Y = BOTTOM_Y + 29;
        const STORAGE_CAPACITY = 20;
        let topStorageCount = 0;
        let bottomStorageCount = 0;
        let trainBlocks = [false, false, false];

        // Quarry settings
        const BLOCK_SIZE = 18;
        const QUARRY_MAX_ROWS = 17;
        const BOTTOM_QUARRY_MAX_ROWS = 17;
        const QUARRY_OFFSET_X = 12;
        const QUARRY_OFFSET_Y = TOP_ROAD_Y - 81;
        const BOTTOM_QUARRY_OFFSET_X = WIDTH - 12 - BLOCK_SIZE;
        const BOTTOM_QUARRY_OFFSET_Y = BOTTOM_ROAD_Y + 45;

        // Colors
        const COLORS = {
            grass: '#2e8b57',
            trackBed: '#2c2c2c',
            rail: '#e8e8e8',
            engineBody: '#1e90ff',
            engineFront: '#ff4757',
            engineWheel: '#1c2526',
            carriageBody: '#a8b0b8',
            carriageInner: '#5f6a72',
            carriageWheel: '#1c2526',
            quarryMain: '#d4c3a8',
            quarryMid: '#b9a98f',
            quarryDeep: '#9e8a6f',
            quarryOutline: '#5c5340',
            stationBuilding: '#7a7a8a',
            stationPlatform: '#a8a8b8',
            parkingAsphalt: '#3f3f3f',
            parkingLine: '#e0e0e0',
            truckCab: '#e69900',
            truckTrailer: '#cc5500',
            truckWindow: '#add8e6',
            forkliftBody: '#ffcc00',
            forkliftForks: '#bbbbbb',
            craneBase: '#555555',
            craneArm: '#333333',
            forkliftPath: 'rgba(230, 230, 230, 0.35)'
        };

        const topBlocks = [];
        const bottomBlocks = [];
        const trucks = [];
        let forklifts = [];
        let cranes = [];

        // Forklift home positions (inside the dashed drop-off bay)
        const TOP_FORKLIFT_HOME_X = STATION_X + 41;
        const TOP_FORKLIFT_HOME_Y = TOP_Y - 72;
        const BOTTOM_FORKLIFT_HOME_X = STATION_X + 41;
        const BOTTOM_FORKLIFT_HOME_Y = BOTTOM_Y + 48;

        function isTopRoadBlock(row, col) {
            if (row === 4 && col >= 4) return true;
            if (row === 12 && col >= 4 && col <= 14) return true;
            if (col === 4 && row >= 4 && row <= 12) return true;
            if (col === 14 && row >= 4 && row <= 12) return true;
            return false;
        }

        function isBottomRoadBlock(row, col) {
            if (row === 3 && col >= 4) return true;
            if (row === 11 && col >= 4 && col <= 14) return true;
            if (col === 4 && row >= 3 && row <= 11) return true;
            if (col === 14 && row >= 3 && row <= 11) return true;
            return false;
        }

        function initSim() {
            topBlocks.length = 0;
            bottomBlocks.length = 0;
            trucks.length = 0;
            forklifts.length = 0;
            cranes.length = 0;

            // Build Top Quarry
            for (let row = 0; row < QUARRY_MAX_ROWS; row++) {
                let numCols = (row === 0) ? 26 : Math.max(4, 16 - Math.floor(row * 0.9));
                for (let col = 0; col < numCols; col++) {
                    if (isTopRoadBlock(row, col)) continue;
                    topBlocks.push({
                        x: QUARRY_OFFSET_X + col * BLOCK_SIZE,
                        y: QUARRY_OFFSET_Y + row * BLOCK_SIZE,
                        active: true
                    });
                }
            }

            // Build Bottom Quarry
            for (let row = 0; row < BOTTOM_QUARRY_MAX_ROWS; row++) {
                let numCols = (row === 0) ? 26 : Math.max(4, 16 - Math.floor(row * 0.9));
                for (let col = 0; col < numCols; col++) {
                    if (isBottomRoadBlock(row, col)) continue;
                    bottomBlocks.push({
                        x: BOTTOM_QUARRY_OFFSET_X - col * BLOCK_SIZE,
                        y: BOTTOM_QUARRY_OFFSET_Y - row * BLOCK_SIZE,
                        active: false
                    });
                }
            }

            for (let i = 0; i < 5; i++) {
                trucks.push(new Truck('top', i));
                trucks.push(new Truck('bottom', i));
            }

            topStorageCount = 0;
            bottomStorageCount = 0;
            trainBlocks = [false, false, false];
            trainAtStation = null;

            forklifts = [
                new Forklift('top'),
                new Forklift('bottom')
            ];
            cranes = [
                new Crane('top'),
                new Crane('bottom')
            ];
        }

        class Truck {
            constructor(type, index) {
                this.type = type;
                this.index = index;
                this.state = 'PARKED';
                this.timer = Math.random() * 4 + 1;
                this.scanTimer = 0;
                const spotSpacing = PARKING_WIDTH / 5;
                const parkingX = STATION_X + (STATION_WIDTH - PARKING_WIDTH) / 2;
                this.parkX = parkingX + spotSpacing * 0.5 + index * spotSpacing;
                if (this.type === 'top') {
                    this.parkY = topParkingY + PARKING_HEIGHT / 2;
                    this.angle = Math.PI / 2;
                } else {
                    this.parkY = bottomParkingY + PARKING_HEIGHT / 2;
                    this.angle = -Math.PI / 2;
                }
                this.x = this.parkX;
                this.y = this.parkY;
                this.route = [];
                this.routeIndex = 0;
                this.hasBlock = false;
                this.speed = 65;
            }

            update(dt) {
                switch (this.state) {
                    case 'PARKED':
                        this.timer -= dt;
                        if (this.timer <= 0) {
                            if (this.type === 'top') {
                                if (this.hasBlock) {
                                    this.timer = 0.5;
                                    return;
                                }
                                if (topStorageCount >= STORAGE_CAPACITY) {
                                    this.timer = 1.0;
                                    return;
                                }
                            }
                            if (this.type === 'bottom' && !this.hasBlock) {
                                this.timer = 0.8;
                                return;
                            }
                            this.state = 'DRIVING';
                            this.route = this.type === 'top' ? [
                                {x: topCol14X, y: topRow4Y},
                                {x: topCol4X, y: topRow4Y},
                                {x: topCol4X, y: topRow12Y},
                                {x: topCol14X, y: topRow12Y},
                                {x: topCol14X, y: topRow4Y},
                                {x: this.parkX, y: this.parkY}
                            ] : [
                                {x: botCol14X, y: botRow3Y},
                                {x: botCol4X, y: botRow3Y},
                                {x: botCol4X, y: botRow11Y},
                                {x: botCol14X, y: botRow11Y},
                                {x: botCol14X, y: botRow3Y},
                                {x: this.parkX, y: this.parkY}
                            ];
                            this.routeIndex = 0;
                            this.targetX = this.route[0].x;
                            this.targetY = this.route[0].y;
                        }
                        break;

                    case 'DRIVING':
                        if (this.moveToTarget(dt)) {
                            this.routeIndex++;
                            if (this.routeIndex >= this.route.length) {
                                this.angle = this.type === 'top' ? Math.PI / 2 : -Math.PI / 2;
                                this.state = 'PARKED';
                                this.timer = Math.random() * 3 + 1.5;
                            } else {
                                this.targetX = this.route[this.routeIndex].x;
                                this.targetY = this.route[this.routeIndex].y;
                            }
                        }
                        if (this.type === 'bottom' && this.hasBlock && this.routeIndex >= 1 && this.routeIndex <= 3) {
                            let candidates = [];
                            let nearest = null;
                            let nearestDist = Infinity;
                            for (let b of bottomBlocks) {
                                if (b.active) continue;
                                const dist = Math.hypot((b.x + BLOCK_SIZE / 2) - this.x, (b.y + BLOCK_SIZE / 2) - this.y);
                                if (dist <= 5 * BLOCK_SIZE) candidates.push(b);
                                if (dist < nearestDist) {
                                    nearestDist = dist;
                                    nearest = b;
                                }
                            }
                            let chosen = null;
                            if (candidates.length > 0) {
                                chosen = candidates[Math.floor(Math.random() * candidates.length)];
                            } else if (nearest) {
                                chosen = nearest;
                            }
                            if (chosen) {
                                chosen.active = true;
                                this.hasBlock = false;
                            }
                        }
                        if (this.type === 'top' && !this.hasBlock && this.routeIndex >= 1 && this.routeIndex <= 4) {
                            this.scanTimer -= dt;
                            if (this.scanTimer <= 0) {
                                this.scanTimer = 0.2;
                                let closest = null;
                                let minDist = 120;
                                for (let b of topBlocks) {
                                    if (b.active) {
                                        const dist = Math.hypot(b.x + BLOCK_SIZE/2 - this.x, b.y + BLOCK_SIZE/2 - this.y);
                                        if (dist <= minDist) {
                                            minDist = dist;
                                            closest = b;
                                        }
                                    }
                                }
                                if (closest) {
                                    closest.active = false;
                                    this.hasBlock = true;
                                    this.state = 'LOADING';
                                    this.timer = 1.0;
                                }
                            }
                        }
                        break;

                    case 'LOADING':
                        this.timer -= dt;
                        if (this.timer <= 0) this.state = 'DRIVING';
                        break;
                }
            }

            moveToTarget(dt) {
                let blocked = false;
                for (let ot of trucks) {
                    if (ot.type !== this.type || ot === this) continue;
                    if (ot.state !== 'LOADING') continue;
                    const dx = ot.x - this.x;
                    const dy = ot.y - this.y;
                    const distToOther = Math.hypot(dx, dy);
                    if (distToOther < 42 && distToOther > 8) {
                        const dot = Math.cos(this.angle) * dx + Math.sin(this.angle) * dy;
                        if (dot > 10) {
                            blocked = true;
                            break;
                        }
                    }
                }
                if (blocked) return false;

                const dx = this.targetX - this.x;
                const dy = this.targetY - this.y;
                const dist = Math.hypot(dx, dy);
                if (dist < 2) {
                    this.x = this.targetX;
                    this.y = this.targetY;
                    return true;
                }
                this.angle = Math.atan2(dy, dx);
                const move = Math.min(this.speed * dt, dist);
                this.x += Math.cos(this.angle) * move;
                this.y += Math.sin(this.angle) * move;
                return false;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                ctx.fillStyle = COLORS.truckTrailer;
                ctx.fillRect(-22, -7, 16, 14);
                ctx.fillStyle = '#444';
                ctx.fillRect(-6, -2, 4, 4);
                ctx.fillStyle = COLORS.truckCab;
                ctx.fillRect(-2, -5, 10, 10);
                ctx.fillStyle = COLORS.truckWindow;
                ctx.fillRect(4, -3, 3, 6);
                ctx.fillStyle = COLORS.engineWheel;
                ctx.fillRect(-18, -9, 6, 2);
                ctx.fillRect(-18, 7, 6, 2);
                ctx.fillRect(0, -7, 6, 2);
                ctx.fillRect(0, 5, 6, 2);
                if (this.hasBlock) {
                    ctx.fillStyle = COLORS.quarryMain;
                    ctx.fillRect(-19, -5, 10, 10);
                    ctx.fillStyle = COLORS.quarryMid;
                    ctx.fillRect(-17, -3, 6, 6);
                }
                ctx.restore();
            }
        }

        class Forklift {
            constructor(type) {
                this.type = type;
                this.state = 'HOME';
                this.timer = 0;
                this.carrying = false;
                this.speed = 62;
                this.nextTask = null;
                this.targetTruck = null;
                if (type === 'top') {
                    this.homeX = TOP_FORKLIFT_HOME_X;
                    this.homeY = TOP_FORKLIFT_HOME_Y;
                    this.homeAngle = Math.PI / 2;
                } else {
                    this.homeX = BOTTOM_FORKLIFT_HOME_X;
                    this.homeY = BOTTOM_FORKLIFT_HOME_Y;
                    this.homeAngle = -Math.PI / 2;
                }
                this.x = this.homeX;
                this.y = this.homeY;
                this.angle = this.homeAngle;
                this.path = [];
                this.pathIndex = 0;
            }

            // Simple L-shaped path via station middle spine (exactly as requested)
            buildPathTo(destX, destY, destAngle) {
                const path = [];
                const spineX = STATION_X + 41;               // vertical corridor inside station
                const topStationCY = TOP_Y - 72;
                const botStationCY = BOTTOM_Y + 48;
                const topParkingLaneY = topParkingY + PARKING_HEIGHT / 2;
                const botParkingLaneY = bottomParkingY + PARKING_HEIGHT / 2;

                if (this.type === 'top') {
                    const destIsStorage = destX < STATION_X;
                    const destIsParking = destY < TOP_Y - 50 && destX >= STATION_X - 5;
                    const destIsHome = Math.abs(destX - this.homeX) < 5 && Math.abs(destY - this.homeY) < 5;

                    // Always route via the station middle spine for a clean L-shape
                    path.push({x: spineX, y: topStationCY});           // go to center of station

                    if (destIsStorage) {
                        path.push({x: destX, y: topStationCY});        // horizontal leg to storage
                        path.push({x: destX, y: destY});
                    } else if (destIsParking || destIsHome) {
                        path.push({x: spineX, y: topParkingLaneY});    // vertical leg up to parking lane
                        path.push({x: destX, y: topParkingLaneY});     // horizontal to truck bay
                        path.push({x: destX, y: destY});
                    } else {
                        path.push({x: destX, y: destY});
                    }
                } else {
                    const destIsStorage = destX > STATION_X + STATION_WIDTH;
                    const destIsParking = destY > BOTTOM_Y + 90 && destX <= STATION_X + STATION_WIDTH + 5;
                    const destIsHome = Math.abs(destX - this.homeX) < 5 && Math.abs(destY - this.homeY) < 5;

                    path.push({x: spineX, y: botStationCY});

                    if (destIsStorage) {
                        path.push({x: destX, y: botStationCY});
                        path.push({x: destX, y: destY});
                    } else if (destIsParking || destIsHome) {
                        path.push({x: spineX, y: botParkingLaneY});
                        path.push({x: destX, y: botParkingLaneY});
                        path.push({x: destX, y: destY});
                    } else {
                        path.push({x: destX, y: destY});
                    }
                }

                // Remove any duplicate consecutive points
                const cleaned = [];
                for (const p of path) {
                    if (cleaned.length === 0 || Math.hypot(p.x - cleaned[cleaned.length - 1].x, p.y - cleaned[cleaned.length - 1].y) > 2) {
                        cleaned.push(p);
                    }
                }
                this.path = cleaned;
                this.pathIndex = 0;
                this.finalAngle = destAngle;
            }

            update(dt) {
                if (this.state === 'HOME' || this.state === 'IDLE') {
                    this.findNextTask();
                } else if (this.state === 'MOVING') {
                    if (this.followPath(dt)) {
                        this.arriveAtTarget();
                    }
                } else if (this.state === 'WORKING') {
                    this.timer -= dt;
                    if (this.timer <= 0) this.completeWork();
                } else if (this.state === 'GOING_HOME') {
                    if (this.followPath(dt)) {
                        this.x = this.homeX;
                        this.y = this.homeY;
                        this.angle = this.homeAngle;
                        this.state = 'HOME';
                    }
                }
            }

            findNextTask() {
                if (this.type === 'top') {
                    // Top forklift: only works if storage has room
                    if (topStorageCount >= STORAGE_CAPACITY) {
                        this.goHomeIfNotThere();
                        return;
                    }
                    // Look for a parked truck with a block
                    for (let t of trucks) {
                        if (t.type === 'top' && t.state === 'PARKED' && t.hasBlock) {
                            this.targetTruck = t;
                            this.nextTask = 'UNLOAD_TRUCK';
                            // Direct approach from home / station middle to truck (stops beside truck, no overlap)
                            this.buildPathTo(t.x + 8, t.y, Math.PI / 2);
                            this.state = 'MOVING';
                            return;
                        }
                    }
                    this.goHomeIfNotThere();
                } else {
                    // Bottom forklift: only works if storage has blocks
                    if (bottomStorageCount <= 0) {
                        this.goHomeIfNotThere();
                        return;
                    }
                    // Look for an empty parked truck
                    for (let t of trucks) {
                        if (t.type === 'bottom' && t.state === 'PARKED' && !t.hasBlock) {
                            this.targetTruck = t;
                            this.nextTask = 'PICK_STORAGE';
                            // Direct to storage first
                            this.buildPathTo(BOTTOM_STORAGE_X + 38, BOTTOM_STORAGE_Y + 24, -Math.PI / 2);
                            this.state = 'MOVING';
                            return;
                        }
                    }
                    this.goHomeIfNotThere();
                }
            }

            goHomeIfNotThere() {
                const atHome = Math.abs(this.x - this.homeX) < 3 && Math.abs(this.y - this.homeY) < 3;
                if (atHome) {
                    this.state = 'HOME';
                    this.angle = this.homeAngle;
                    return;
                }
                this.buildPathTo(this.homeX, this.homeY, this.homeAngle);
                this.state = 'GOING_HOME';
            }

            followPath(dt) {
                if (this.pathIndex >= this.path.length) return true;
                const wp = this.path[this.pathIndex];
                const dx = wp.x - this.x;
                const dy = wp.y - this.y;
                const dist = Math.hypot(dx, dy);
                if (dist < 3) {
                    this.x = wp.x;
                    this.y = wp.y;
                    this.pathIndex++;
                    if (this.pathIndex >= this.path.length) {
                        if (this.finalAngle !== undefined) this.angle = this.finalAngle;
                        return true;
                    }
                    return false;
                }
                this.angle = Math.atan2(dy, dx);
                const move = Math.min(this.speed * dt, dist);
                this.x += Math.cos(this.angle) * move;
                this.y += Math.sin(this.angle) * move;
                return false;
            }

            arriveAtTarget() {
                this.state = 'WORKING';
                this.timer = 0.75;
            }

            completeWork() {
                if (this.type === 'top') {
                    if (this.nextTask === 'UNLOAD_TRUCK') {
                        if (this.targetTruck && this.targetTruck.hasBlock) {
                            this.targetTruck.hasBlock = false;
                            this.carrying = true;
                        }
                        this.targetTruck = null;
                        this.nextTask = 'DROP_STORAGE';
                        this.buildPathTo(TOP_STORAGE_X + STORAGE_WIDTH / 2, TOP_STORAGE_Y + STORAGE_HEIGHT / 2, Math.PI);
                        this.state = 'MOVING';
                    } else if (this.nextTask === 'DROP_STORAGE') {
                        if (this.carrying) {
                            topStorageCount = Math.min(STORAGE_CAPACITY, topStorageCount + 1);
                        }
                        this.carrying = false;
                        this.nextTask = null;
                        this.state = 'IDLE';
                    }
                } else {
                    if (this.nextTask === 'PICK_STORAGE') {
                        if (bottomStorageCount > 0) {
                            bottomStorageCount = Math.max(0, bottomStorageCount - 1);
                            this.carrying = true;
                        }
                        // Find an empty parked truck to deliver to
                        let truck = null;
                        let minDist = 999;
                        for (let t of trucks) {
                            if (t.type === 'bottom' && t.state === 'PARKED' && !t.hasBlock) {
                                const d = Math.hypot(t.x - this.x, t.y - this.y);
                                if (d < minDist) {
                                    minDist = d;
                                    truck = t;
                                }
                            }
                        }
                        if (truck) {
                            this.targetTruck = truck;
                            this.nextTask = 'DELIVER_TRUCK';
                            this.buildPathTo(truck.x - 8, truck.y, -Math.PI / 2);
                            this.state = 'MOVING';
                        } else {
                            if (this.carrying) {
                                bottomStorageCount = Math.min(STORAGE_CAPACITY, bottomStorageCount + 1);
                                this.carrying = false;
                            }
                            this.state = 'IDLE';
                        }
                    } else if (this.nextTask === 'DELIVER_TRUCK') {
                        if (this.targetTruck && this.targetTruck.state === 'PARKED' && !this.targetTruck.hasBlock && this.carrying) {
                            this.targetTruck.hasBlock = true;
                            this.targetTruck.timer = 0.2;
                        } else if (this.carrying) {
                            bottomStorageCount = Math.min(STORAGE_CAPACITY, bottomStorageCount + 1);
                        }
                        this.carrying = false;
                        this.targetTruck = null;
                        this.nextTask = null;
                        this.state = 'IDLE';
                    }
                }
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                ctx.fillStyle = COLORS.forkliftBody;
                ctx.fillRect(-18, -9, 22, 14);
                ctx.fillStyle = '#222';
                ctx.fillRect(-4, -13, 12, 8);
                ctx.fillStyle = COLORS.forkliftForks;
                ctx.fillRect(4, -11, 14, 3);
                ctx.fillRect(4, 4, 14, 3);
                if (this.carrying) {
                    ctx.fillStyle = COLORS.quarryMain;
                    ctx.fillRect(12, -10, 13, 13);
                    ctx.fillStyle = COLORS.quarryMid;
                    ctx.fillRect(15, -7, 7, 7);
                }
                ctx.restore();
            }
        }

        class Crane {
            constructor(type) {
                this.type = type;
                this.baseX = type === 'top' ? STATION_X - 22 : STATION_X + STATION_WIDTH + 22;
                this.baseY = type === 'top' ? TOP_Y + 8 : BOTTOM_Y + 18;
                this.pivotX = this.baseX;
                this.pivotY = this.baseY - 82;
                this.minLength = 28;
                this.maxLength = 160;
                this.currentAngle = type === 'top' ? Math.PI * 0.6 : Math.PI * 1.4;
                this.currentLength = this.minLength;
                this.targetAngle = this.currentAngle;
                this.targetLength = this.minLength;
                this.hookX = this.pivotX + Math.cos(this.currentAngle) * this.currentLength;
                this.hookY = this.pivotY + Math.sin(this.currentAngle) * this.currentLength;
                this.carrying = false;
                this.state = 'IDLE';
                this.timer = 0;
                this.currentCarriage = -1;
                this.rotateSpeed = 3.2;
                this.extendSpeed = 155;
                this.pickWorldX = 0;
                this.pickWorldY = 0;
                this.dropWorldX = 0;
                this.dropWorldY = 0;
            }

            aimAt(wx, wy) {
                const dx = wx - this.pivotX;
                const dy = wy - this.pivotY;
                const ang = Math.atan2(dy, dx);
                const len = Math.min(this.maxLength, Math.max(this.minLength, Math.hypot(dx, dy)));
                return { angle: ang, length: len };
            }

            armSettled() {
                let angleDelta = this.targetAngle - this.currentAngle;
                angleDelta = ((angleDelta + Math.PI) % (2 * Math.PI)) - Math.PI;
                const lenDelta = this.targetLength - this.currentLength;
                return Math.abs(angleDelta) < 0.08 && Math.abs(lenDelta) < 2.5;
            }

            angleSettled() {
                let angleDelta = this.targetAngle - this.currentAngle;
                angleDelta = ((angleDelta + Math.PI) % (2 * Math.PI)) - Math.PI;
                return Math.abs(angleDelta) < 0.06;
            }

            stepArm(dt) {
                let angleDelta = this.targetAngle - this.currentAngle;
                angleDelta = ((angleDelta + Math.PI) % (2 * Math.PI)) - Math.PI;
                this.currentAngle += angleDelta * this.rotateSpeed * dt;
                if (Math.abs(angleDelta) < 0.12) {
                    const lenDelta = this.targetLength - this.currentLength;
                    this.currentLength += Math.sign(lenDelta) * Math.min(Math.abs(lenDelta), this.extendSpeed * dt);
                }
                this.hookX = this.pivotX + Math.cos(this.currentAngle) * this.currentLength;
                this.hookY = this.pivotY + Math.sin(this.currentAngle) * this.currentLength;
            }

            update(dt) {
                if (trainAtStation !== this.type || trainState !== 'STOPPED') {
                    this.targetLength = this.minLength;
                    this.stepArm(dt);
                    if (this.state !== 'IDLE') {
                        this.carrying = false;
                        this.state = 'IDLE';
                        this.currentCarriage = -1;
                    }
                    return;
                }
                this.stepArm(dt);
                switch (this.state) {
                    case 'IDLE':
                        if (this.type === 'top') {
                            if (topStorageCount > 0 && !trainBlocks.every(b => b)) {
                                this.pickWorldX = TOP_STORAGE_X + STORAGE_WIDTH / 2;
                                this.pickWorldY = TOP_STORAGE_Y + STORAGE_HEIGHT / 2;
                                const aim = this.aimAt(this.pickWorldX, this.pickWorldY);
                                this.targetAngle = aim.angle;
                                this.targetLength = this.minLength;
                                this.state = 'ROTATING_TO_PICK';
                            }
                        } else {
                            const loadedIdx = trainBlocks.findIndex(b => b);
                            if (loadedIdx !== -1) {
                                this.currentCarriage = loadedIdx;
                                const carriageOffset = CARRIAGE_SEPARATION * (loadedIdx + 1);
                                const pos = getPosition(distance - carriageOffset);
                                this.pickWorldX = pos.x;
                                this.pickWorldY = pos.y - 8;
                                const aim = this.aimAt(this.pickWorldX, this.pickWorldY);
                                this.targetAngle = aim.angle;
                                this.targetLength = this.minLength;
                                this.state = 'ROTATING_TO_PICK';
                            }
                        }
                        break;

                    case 'ROTATING_TO_PICK':
                        if (this.angleSettled()) {
                            const aim = this.aimAt(this.pickWorldX, this.pickWorldY);
                            this.targetLength = aim.length;
                            this.state = 'EXTENDING_TO_PICK';
                        }
                        break;

                    case 'EXTENDING_TO_PICK':
                        if (this.armSettled()) {
                            this.state = 'PICKING';
                            this.timer = 0.45;
                        }
                        break;

                    case 'PICKING':
                        this.timer -= dt;
                        if (this.timer <= 0) {
                            if (this.type === 'top') {
                                if (topStorageCount > 0) {
                                    topStorageCount--;
                                    this.carrying = true;
                                }
                            } else {
                                if (this.currentCarriage >= 0 && trainBlocks[this.currentCarriage]) {
                                    trainBlocks[this.currentCarriage] = false;
                                    this.carrying = true;
                                }
                            }
                            this.targetLength = this.minLength;
                            this.state = 'RETRACTING_AFTER_PICK';
                        }
                        break;

                    case 'RETRACTING_AFTER_PICK':
                        if (this.armSettled()) {
                            if (!this.carrying) {
                                this.state = 'IDLE';
                                break;
                            }
                            if (this.type === 'top') {
                                this.currentCarriage = trainBlocks.findIndex(b => !b);
                                if (this.currentCarriage < 0) {
                                    topStorageCount = Math.min(STORAGE_CAPACITY, topStorageCount + 1);
                                    this.carrying = false;
                                    this.state = 'IDLE';
                                    break;
                                }
                                const carriageOffset = CARRIAGE_SEPARATION * (this.currentCarriage + 1);
                                const pos = getPosition(distance - carriageOffset);
                                this.dropWorldX = pos.x;
                                this.dropWorldY = pos.y - 8;
                            } else {
                                this.dropWorldX = BOTTOM_STORAGE_X + STORAGE_WIDTH / 2;
                                this.dropWorldY = BOTTOM_STORAGE_Y + STORAGE_HEIGHT / 2;
                            }
                            const aim = this.aimAt(this.dropWorldX, this.dropWorldY);
                            this.targetAngle = aim.angle;
                            this.targetLength = this.minLength;
                            this.state = 'ROTATING_TO_DROP';
                        }
                        break;

                    case 'ROTATING_TO_DROP':
                        if (this.angleSettled()) {
                            const aim = this.aimAt(this.dropWorldX, this.dropWorldY);
                            this.targetLength = aim.length;
                            this.state = 'EXTENDING_TO_DROP';
                        }
                        break;

                    case 'EXTENDING_TO_DROP':
                        if (this.armSettled()) {
                            this.state = 'DROPPING';
                            this.timer = 0.45;
                        }
                        break;

                    case 'DROPPING':
                        this.timer -= dt;
                        if (this.timer <= 0) {
                            if (this.type === 'top') {
                                if (this.currentCarriage >= 0 && this.carrying) {
                                    trainBlocks[this.currentCarriage] = true;
                                }
                            } else {
                                if (this.carrying) {
                                    bottomStorageCount = Math.min(STORAGE_CAPACITY, bottomStorageCount + 1);
                                }
                            }
                            this.carrying = false;
                            this.targetLength = this.minLength;
                            this.state = 'RETRACTING_AFTER_DROP';
                        }
                        break;

                    case 'RETRACTING_AFTER_DROP':
                        if (this.armSettled()) {
                            this.state = 'IDLE';
                        }
                        break;
                }
            }

            draw() {
                ctx.save();
                ctx.translate(this.baseX, this.baseY);
                ctx.fillStyle = COLORS.craneBase;
                ctx.fillRect(-18, -8, 36, 16);
                ctx.fillRect(-6, -88, 12, 80);
                ctx.strokeStyle = COLORS.craneArm;
                ctx.lineWidth = 7;
                ctx.beginPath();
                ctx.moveTo(0, -82);
                ctx.lineTo(this.hookX - this.baseX, this.hookY - this.baseY);
                ctx.stroke();
                ctx.fillStyle = '#111';
                ctx.fillRect(this.hookX - this.baseX - 6, this.hookY - this.baseY - 8, 12, 14);
                if (this.carrying) {
                    ctx.fillStyle = COLORS.quarryMain;
                    ctx.fillRect(this.hookX - this.baseX - 9, this.hookY - this.baseY - 27, 18, 18);
                    ctx.fillStyle = COLORS.quarryMid;
                    ctx.fillRect(this.hookX - this.baseX - 6, this.hookY - this.baseY - 24, 12, 12);
                }
                ctx.restore();
            }
        }

        function getPosition(dist) {
            let d = dist % TOTAL_TRACK_LENGTH;
            if (d < 0) d += TOTAL_TRACK_LENGTH;
            if (d < STRAIGHT_LENGTH) return { x: LEFT_CX + d, y: TOP_Y, angle: 0 };
            d -= STRAIGHT_LENGTH;
            if (d < Math.PI * CURVE_RADIUS) {
                const theta = -Math.PI / 2 + (d / CURVE_RADIUS);
                return { x: RIGHT_CX + CURVE_RADIUS * Math.cos(theta), y: CENTER_Y + CURVE_RADIUS * Math.sin(theta), angle: theta + Math.PI / 2 };
            }
            d -= Math.PI * CURVE_RADIUS;
            if (d < STRAIGHT_LENGTH) return { x: RIGHT_CX - d, y: BOTTOM_Y, angle: Math.PI };
            d -= STRAIGHT_LENGTH;
            const theta = Math.PI / 2 + (d / CURVE_RADIUS);
            return { x: LEFT_CX + CURVE_RADIUS * Math.cos(theta), y: CENTER_Y + CURVE_RADIUS * Math.sin(theta), angle: theta + Math.PI / 2 };
        }

        function drawForkliftPaths() {
            ctx.save();
            ctx.strokeStyle = COLORS.forkliftPath;
            ctx.lineWidth = 2;
            ctx.setLineDash([5, 6]);
            const spineX = STATION_X + 41;
            const parkingX = STATION_X + (STATION_WIDTH - PARKING_WIDTH) / 2;
            const spotSpacing = PARKING_WIDTH / 5;

            // TOP network (L-shaped)
            const topStationCY = TOP_Y - 72;
            const topParkingLaneY = topParkingY + PARKING_HEIGHT / 2;
            const topStorageInX = TOP_STORAGE_X + STORAGE_WIDTH / 2;
            ctx.beginPath();
            ctx.moveTo(topStorageInX, topStationCY);
            ctx.lineTo(spineX, topStationCY);
            ctx.moveTo(spineX, topStationCY);
            ctx.lineTo(spineX, topParkingLaneY);
            ctx.moveTo(parkingX + spotSpacing * 0.5, topParkingLaneY);
            ctx.lineTo(parkingX + spotSpacing * 4.5, topParkingLaneY);
            for (let i = 0; i < 5; i++) {
                const bx = parkingX + spotSpacing * 0.5 + i * spotSpacing;
                ctx.moveTo(bx, topParkingLaneY);
                ctx.lineTo(bx, topParkingLaneY - 6);
            }
            ctx.stroke();

            // BOTTOM network (L-shaped)
            const botStationCY = BOTTOM_Y + 48;
            const botParkingLaneY = bottomParkingY + PARKING_HEIGHT / 2;
            const botStorageInX = BOTTOM_STORAGE_X + STORAGE_WIDTH / 2;
            ctx.beginPath();
            ctx.moveTo(botStorageInX, botStationCY);
            ctx.lineTo(spineX, botStationCY);
            ctx.moveTo(spineX, botStationCY);
            ctx.lineTo(spineX, botParkingLaneY);
            ctx.moveTo(parkingX + spotSpacing * 0.5, botParkingLaneY);
            ctx.lineTo(parkingX + spotSpacing * 4.5, botParkingLaneY);
            for (let i = 0; i < 5; i++) {
                const bx = parkingX + spotSpacing * 0.5 + i * spotSpacing;
                ctx.moveTo(bx, botParkingLaneY);
                ctx.lineTo(bx, botParkingLaneY + 6);
            }
            ctx.stroke();

            ctx.setLineDash([]);
            ctx.restore();
        }

        function drawRoads() {
            const parkingX = STATION_X + (STATION_WIDTH - PARKING_WIDTH) / 2;
            ctx.lineJoin = 'round';
            ctx.lineCap = 'square';
            ctx.strokeStyle = COLORS.parkingAsphalt;
            ctx.lineWidth = 20;
            ctx.beginPath();
            ctx.moveTo(parkingX + PARKING_WIDTH - 10, TOP_ROAD_Y);
            ctx.lineTo(topCol4X, TOP_ROAD_Y);
            ctx.lineTo(topCol4X, topRow12Y);
            ctx.lineTo(topCol14X, topRow12Y);
            ctx.lineTo(topCol14X, TOP_ROAD_Y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(parkingX + 10, BOTTOM_ROAD_Y);
            ctx.lineTo(botCol4X, BOTTOM_ROAD_Y);
            ctx.lineTo(botCol4X, botRow11Y);
            ctx.lineTo(botCol14X, botRow11Y);
            ctx.lineTo(botCol14X, BOTTOM_ROAD_Y);
            ctx.stroke();

            ctx.strokeStyle = COLORS.parkingLine;
            ctx.lineWidth = 2;
            ctx.setLineDash([8, 8]);
            ctx.beginPath();
            ctx.moveTo(parkingX, TOP_ROAD_Y);
            ctx.lineTo(topCol4X, TOP_ROAD_Y);
            ctx.lineTo(topCol4X, topRow12Y);
            ctx.lineTo(topCol14X, topRow12Y);
            ctx.lineTo(topCol14X, TOP_ROAD_Y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(parkingX + PARKING_WIDTH, BOTTOM_ROAD_Y);
            ctx.lineTo(botCol4X, BOTTOM_ROAD_Y);
            ctx.lineTo(botCol4X, botRow11Y);
            ctx.lineTo(botCol14X, botRow11Y);
            ctx.lineTo(botCol14X, BOTTOM_ROAD_Y);
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.lineJoin = 'miter';
            ctx.lineCap = 'butt';
        }

        function drawQuarryBlocks() {
            const drawBlocks = (blocks) => {
                for (let b of blocks) {
                    if (b.active) {
                        ctx.fillStyle = COLORS.quarryMain;
                        ctx.fillRect(b.x, b.y, BLOCK_SIZE, BLOCK_SIZE);
                        ctx.fillStyle = COLORS.quarryMid;
                        ctx.fillRect(b.x + 3, b.y + 3, BLOCK_SIZE - 6, BLOCK_SIZE - 6);
                        ctx.fillStyle = COLORS.quarryDeep;
                        ctx.fillRect(b.x + 7, b.y + 7, BLOCK_SIZE - 14, BLOCK_SIZE - 14);
                    } else {
                        ctx.fillStyle = COLORS.quarryDeep;
                        ctx.fillRect(b.x, b.y, BLOCK_SIZE, BLOCK_SIZE);
                    }
                    ctx.strokeStyle = COLORS.quarryOutline;
                    ctx.lineWidth = 2;
                    ctx.strokeRect(b.x, b.y, BLOCK_SIZE, BLOCK_SIZE);
                }
            };
            drawBlocks(topBlocks);
            drawBlocks(bottomBlocks);
        }

        function drawStations() {
            const parkingX = STATION_X + (STATION_WIDTH - PARKING_WIDTH) / 2;
            const spotSpacing = PARKING_WIDTH / 5;
            const lineHeight = 21;

            // TOP STATION
            ctx.fillStyle = COLORS.stationPlatform;
            ctx.fillRect(STATION_X, TOP_Y - 30, STATION_WIDTH, 26);
            ctx.fillStyle = COLORS.stationBuilding;
            ctx.fillRect(STATION_X, TOP_Y - 30 - 78, STATION_WIDTH, 78);
            ctx.fillStyle = COLORS.parkingAsphalt;
            ctx.fillRect(parkingX, topParkingY, PARKING_WIDTH, PARKING_HEIGHT);
            ctx.strokeStyle = COLORS.parkingLine;
            ctx.lineWidth = 3;
            const lineY = topParkingY + (PARKING_HEIGHT - lineHeight) / 2;
            for (let i = 1; i < 5; i++) {
                ctx.beginPath();
                ctx.moveTo(parkingX + i * spotSpacing, lineY);
                ctx.lineTo(parkingX + i * spotSpacing, lineY + lineHeight);
                ctx.stroke();
            }
            ctx.setLineDash([5, 5]);
            ctx.strokeStyle = '#e0e0e0';
            ctx.lineWidth = 3;
            ctx.strokeRect(STATION_X + 18, TOP_Y - 88, 46, 32);

            // BOTTOM STATION
            ctx.fillStyle = COLORS.stationPlatform;
            ctx.fillRect(STATION_X, BOTTOM_Y + 4, STATION_WIDTH, 26);
            ctx.fillStyle = COLORS.stationBuilding;
            ctx.fillRect(STATION_X, BOTTOM_Y + 4 + 26, STATION_WIDTH, 78);
            ctx.fillStyle = COLORS.parkingAsphalt;
            ctx.fillRect(parkingX, bottomParkingY, PARKING_WIDTH, PARKING_HEIGHT);
            const bottomLineY = bottomParkingY + (PARKING_HEIGHT - lineHeight) / 2;
            for (let i = 1; i < 5; i++) {
                ctx.beginPath();
                ctx.moveTo(parkingX + i * spotSpacing, bottomLineY);
                ctx.lineTo(parkingX + i * spotSpacing, bottomLineY + lineHeight);
                ctx.stroke();
            }
            ctx.strokeRect(STATION_X + 18, BOTTOM_Y + 32, 46, 32);
            ctx.setLineDash([]);
        }

        function drawStorages() {
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 4;
            ctx.strokeRect(TOP_STORAGE_X, TOP_STORAGE_Y, STORAGE_WIDTH, STORAGE_HEIGHT);
            ctx.fillStyle = '#222222';
            ctx.fillRect(TOP_STORAGE_X + 4, TOP_STORAGE_Y + 4, STORAGE_WIDTH - 8, STORAGE_HEIGHT - 8);
            ctx.strokeRect(BOTTOM_STORAGE_X, BOTTOM_STORAGE_Y, STORAGE_WIDTH, STORAGE_HEIGHT);
            ctx.fillRect(BOTTOM_STORAGE_X + 4, BOTTOM_STORAGE_Y + 4, STORAGE_WIDTH - 8, STORAGE_HEIGHT - 8);

            const cols = 5;
            const cellStep = 15;
            for (let i = 0; i < topStorageCount; i++) {
                const sx = TOP_STORAGE_X + 9 + (i % cols) * cellStep;
                const sy = TOP_STORAGE_Y + 9 + Math.floor(i / cols) * cellStep;
                ctx.fillStyle = COLORS.quarryMain;
                ctx.fillRect(sx, sy, 13, 13);
                ctx.fillStyle = COLORS.quarryMid;
                ctx.fillRect(sx + 2, sy + 2, 9, 9);
            }
            for (let i = 0; i < bottomStorageCount; i++) {
                const sx = BOTTOM_STORAGE_X + 9 + (i % cols) * cellStep;
                const sy = BOTTOM_STORAGE_Y + 9 + Math.floor(i / cols) * cellStep;
                ctx.fillStyle = COLORS.quarryMain;
                ctx.fillRect(sx, sy, 13, 13);
                ctx.fillStyle = COLORS.quarryMid;
                ctx.fillRect(sx + 2, sy + 2, 9, 9);
            }
        }

        function drawRails() {
            ctx.lineWidth = 28;
            ctx.strokeStyle = COLORS.trackBed;
            ctx.beginPath();
            ctx.moveTo(LEFT_CX, TOP_Y);
            ctx.lineTo(RIGHT_CX, TOP_Y);
            ctx.arc(RIGHT_CX, CENTER_Y, CURVE_RADIUS, -Math.PI / 2, Math.PI / 2);
            ctx.lineTo(LEFT_CX, BOTTOM_Y);
            ctx.arc(LEFT_CX, CENTER_Y, CURVE_RADIUS, Math.PI / 2, 3 * Math.PI / 2);
            ctx.stroke();

            ctx.lineWidth = 4;
            ctx.strokeStyle = COLORS.rail;
            ctx.beginPath();
            ctx.moveTo(LEFT_CX, TOP_Y - 9);
            ctx.lineTo(RIGHT_CX, TOP_Y - 9);
            ctx.moveTo(LEFT_CX, TOP_Y + 9);
            ctx.lineTo(RIGHT_CX, TOP_Y + 9);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(RIGHT_CX, BOTTOM_Y - 9);
            ctx.lineTo(LEFT_CX, BOTTOM_Y - 9);
            ctx.moveTo(RIGHT_CX, BOTTOM_Y + 9);
            ctx.lineTo(LEFT_CX, BOTTOM_Y + 9);
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(RIGHT_CX, CENTER_Y, CURVE_RADIUS - 9, -Math.PI / 2, Math.PI / 2);
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(RIGHT_CX, CENTER_Y, CURVE_RADIUS + 9, -Math.PI / 2, Math.PI / 2);
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(LEFT_CX, CENTER_Y, CURVE_RADIUS - 9, Math.PI / 2, 3 * Math.PI / 2);
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(LEFT_CX, CENTER_Y, CURVE_RADIUS + 9, Math.PI / 2, 3 * Math.PI / 2);
            ctx.stroke();
        }

        function drawEngine(x, y, angle) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle);
            ctx.fillStyle = COLORS.engineBody;
            ctx.fillRect(-TRAIN_LENGTH / 2, -TRAIN_WIDTH / 2, TRAIN_LENGTH, TRAIN_WIDTH);
            ctx.fillStyle = COLORS.engineFront;
            ctx.fillRect(TRAIN_LENGTH / 2 - 11, -TRAIN_WIDTH / 2 + 2, 11, TRAIN_WIDTH - 4);
            ctx.fillStyle = COLORS.engineWheel;
            ctx.fillRect(-17, -10, 9, 6);
            ctx.fillRect(6, -10, 9, 6);
            ctx.fillRect(-17, 4, 9, 6);
            ctx.fillRect(6, 4, 9, 6);
            ctx.restore();
        }

        function drawCarriage(x, y, angle, hasBlock) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle);
            ctx.fillStyle = COLORS.carriageBody;
            ctx.fillRect(-CARRIAGE_LENGTH / 2, -CARRIAGE_WIDTH / 2, CARRIAGE_LENGTH, CARRIAGE_WIDTH);
            ctx.fillStyle = COLORS.carriageInner;
            ctx.fillRect(-(CARRIAGE_LENGTH - 7) / 2, -(CARRIAGE_WIDTH - 5) / 2, CARRIAGE_LENGTH - 7, CARRIAGE_WIDTH - 5);
            ctx.fillStyle = COLORS.carriageWheel;
            ctx.fillRect(-CARRIAGE_LENGTH / 2 + 6, -10, 8, 5);
            ctx.fillRect(CARRIAGE_LENGTH / 2 - 14, -10, 8, 5);
            ctx.fillRect(-CARRIAGE_LENGTH / 2 + 6, 5, 8, 5);
            ctx.fillRect(CARRIAGE_LENGTH / 2 - 14, 5, 8, 5);
            if (hasBlock) {
                ctx.fillStyle = COLORS.quarryMain;
                ctx.fillRect(-9, -9, 13, 13);
                ctx.fillStyle = COLORS.quarryMid;
                ctx.fillRect(-6, -6, 7, 7);
            }
            ctx.restore();
        }

        let lastTime = 0;
        function animate(timestamp) {
            if (!lastTime) lastTime = timestamp;
            let dt = (timestamp - lastTime) / 1000;
            if (dt > 0.1) dt = 0.1;
            lastTime = timestamp;

            let d = distance % TOTAL_TRACK_LENGTH;
            let dist1 = (STOP_DIST_1 - d + TOTAL_TRACK_LENGTH) % TOTAL_TRACK_LENGTH;
            let dist2 = (STOP_DIST_2 - d + TOTAL_TRACK_LENGTH) % TOTAL_TRACK_LENGTH;
            let closestDist = Math.min(dist1, dist2);

            if (closestDist < BRAKE_DISTANCE && trainState !== 'STOPPED' && trainState !== 'ACCELERATING') {
                trainState = 'DECELERATING';
                currentSpeed = Math.max(8, baseSpeed * Math.pow(closestDist / BRAKE_DISTANCE, 0.78));
                if (closestDist < 2) {
                    currentSpeed = 0;
                    trainState = 'STOPPED';
                    trainAtStation = (dist1 < dist2) ? 'top' : 'bottom';
                    trainStopTimer = 999;
                }
            } else if (trainState === 'STOPPED') {
                trainStopTimer -= dt;
                const isTopFullyLoaded = trainAtStation === 'top' && trainBlocks.every(b => b);
                const isBottomFullyEmptied = trainAtStation === 'bottom' && !trainBlocks.some(b => b);
                if (isTopFullyLoaded || isBottomFullyEmptied) {
                    trainStopTimer = 0;
                }
                if (trainStopTimer <= 0) {
                    trainState = 'ACCELERATING';
                    trainAtStation = null;
                }
            } else if (trainState === 'ACCELERATING') {
                currentSpeed = Math.min(baseSpeed, currentSpeed + ACCELERATION_RATE * dt);
                if (currentSpeed >= baseSpeed) {
                    currentSpeed = baseSpeed;
                    trainState = 'MOVING';
                    trainAtStation = null;
                }
            }

            distance += currentSpeed * dt;

            for (let t of trucks) t.update(dt);
            for (let f of forklifts) f.update(dt);
            for (let c of cranes) c.update(dt);

            ctx.clearRect(0, 0, WIDTH, HEIGHT);
            ctx.fillStyle = COLORS.grass;
            ctx.fillRect(0, 0, WIDTH, HEIGHT);

            drawRoads();
            drawForkliftPaths();
            drawQuarryBlocks();
            drawStations();
            drawStorages();
            for (let t of trucks) t.draw();
            for (let f of forklifts) f.draw();
            for (let c of cranes) c.draw();
            drawRails();

            const enginePos = getPosition(distance);
            const carriage1Pos = getPosition(distance - CARRIAGE_SEPARATION);
            const carriage2Pos = getPosition(distance - CARRIAGE_SEPARATION * 2);
            const carriage3Pos = getPosition(distance - CARRIAGE_SEPARATION * 3);

            drawCarriage(carriage3Pos.x, carriage3Pos.y, carriage3Pos.angle, trainBlocks[2]);
            drawCarriage(carriage2Pos.x, carriage2Pos.y, carriage2Pos.angle, trainBlocks[1]);
            drawCarriage(carriage1Pos.x, carriage1Pos.y, carriage1Pos.angle, trainBlocks[0]);
            drawEngine(enginePos.x, enginePos.y, enginePos.angle);

            requestAnimationFrame(animate);
        }

        // Global road coordinates used by trucks
        const topRow4Y = TOP_ROAD_Y;
        const topRow12Y = QUARRY_OFFSET_Y + 12 * BLOCK_SIZE + 9;
