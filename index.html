  // ─────────────────────────────────────────────────────────────────────
  // WHEAT FARMING SYSTEM
  // ─────────────────────────────────────────────────────────────────────
  const FARM_CELL_STATES = {
    EMPTY_SOIL: 0,
    SEEDED: 1,
    SEEDLING: 2,
    GROWING: 3,
    FULL_WHEAT: 4,
    HARVESTED: 5

  let farmCells = [];
  let globalGrowthStage = FARM_CELL_STATES.EMPTY_SOIL;
  let growthStageTimer = 0;
  let seedingTimer = 0;
  let firstHarvestedTime = null;
  function initFarmCells() {
    farmCells = [];
    for (let r = 0; r < FARM_SOIL_ROWS; r++) {
      for (let c = 0; c < FARM_SOIL_COLS; c++) {
        const x = FARM_SOIL_X + c * FARM_BLOCK_SIZE;
        const y = FARM_SOIL_Y + r * FARM_BLOCK_SIZE;
        farmCells.push({
          col: c,
          row: r,
          x: x,
          y: y,
          centerX: x + FARM_BLOCK_SIZE / 2,
          centerY: y + FARM_BLOCK_SIZE / 2,
          state: FARM_CELL_STATES.EMPTY_SOIL,
          reserved: false
        });
      }
    }
  }
  function allCellsState(state) {
    return farmCells.every(cell => cell.state === state);
  }
  function hasHarvestedBlocks() {
    return farmCells.some(cell => cell.state === FARM_CELL_STATES.HARVESTED && !cell.reserved);
  }
  function updateFarmGrowth(dt) {
    if (globalGrowthStage === FARM_CELL_STATES.EMPTY_SOIL) {
      seedingTimer -= dt;
      if (seedingTimer <= 0) {
        globalGrowthStage = FARM_CELL_STATES.SEEDED;
        farmCells.forEach(cell => { cell.state = FARM_CELL_STATES.SEEDED; });
        growthStageTimer = 2.5 + Math.random() * 1.5;
      }
    } else if (globalGrowthStage < FARM_CELL_STATES.FULL_WHEAT) {
      growthStageTimer -= dt;
      if (growthStageTimer <= 0) {
        globalGrowthStage++;
        const prev = globalGrowthStage - 1;
        farmCells.forEach(cell => {
          if (cell.state === prev && cell.state !== FARM_CELL_STATES.HARVESTED) {
            cell.state = globalGrowthStage;
          }
        });
        if (globalGrowthStage < FARM_CELL_STATES.FULL_WHEAT) {
          const baseDelays = [0, 2.5, 4, 5.5];
          growthStageTimer = baseDelays[globalGrowthStage] + Math.random() * 2;
        }
      }
    }
  }
  function generateSerpentinePath() {
    const path = [];
    for (let c = 0; c < FARM_SOIL_COLS; c++) {
      if (c % 2 === 0) {
        for (let r = 0; r < FARM_SOIL_ROWS; r++) path.push({col: c, row: r});
      } else {
        for (let r = FARM_SOIL_ROWS - 1; r >= 0; r--) path.push({col: c, row: r});
      }
    }
    return path;
  }
  class Harvester {
    constructor() {
      this.state = 'PARKED';
      this.x = FARM_OUTER_X + FARM_BLOCK_SIZE * 1.5;
      this.y = FARM_OUTER_Y + FARM_BLOCK_SIZE * 0.5;
      this.angle = Math.PI / 2;
      this.speed = 55;
      this.path = [];
      this.pathIndex = 0;
      this.currentCell = null;
      this.timer = 0;
    }
    update(dt) {
      if (this.state === 'PARKED') {
        if (allCellsState(FARM_CELL_STATES.FULL_WHEAT)) {
          this.path = generateSerpentinePath();
          this.pathIndex = 0;
          const start = this.path[0];
          this.currentCell = farmCells.find(cell => cell.col === start.col && cell.row === start.row);
          this.state = 'MOVING_TO_CELL';
        }
        return;
      }
      if (this.state === 'MOVING_TO_CELL') {
        if (!this.currentCell) return;
        const dx = this.currentCell.centerX - this.x;
        const dy = this.currentCell.centerY - this.y;
        const dist = Math.hypot(dx, dy);
        if (dist < 6) {
          this.x = this.currentCell.centerX;
          this.y = this.currentCell.centerY;
          this.state = 'HARVESTING';
          this.timer = 0.35 + Math.random() * 0.25;
        } else {
          this.angle = Math.atan2(dy, dx);
          const moveDist = Math.min(this.speed * dt, dist);
          this.x += Math.cos(this.angle) * moveDist;
          this.y += Math.sin(this.angle) * moveDist;
        }
      } else if (this.state === 'HARVESTING') {
        this.timer -= dt;
        if (this.timer <= 0 && this.currentCell && this.currentCell.state === FARM_CELL_STATES.FULL_WHEAT) {
          this.currentCell.state = FARM_CELL_STATES.HARVESTED;
          if (firstHarvestedTime === null) firstHarvestedTime = Date.now();
          this.currentCell.reserved = false;
          this.pathIndex++;
          if (this.pathIndex < this.path.length) {
            const next = this.path[this.pathIndex];
            this.currentCell = farmCells.find(cell => cell.col === next.col && cell.row === next.row);
            this.state = 'MOVING_TO_CELL';
          } else {
            this.state = 'DONE';
          }
        }
      }
    }
  }
  let harvester = null;
  // ─────────────────────────────────────────────────────────────────────

  const ASPHALT_CENTER_X = 1068;

  class Tractor {
    constructor() {

          this.y += Math.sin(this.angle) * moveDist;

        this.craneTimer -= dt;
        if (this.craneTimer <= 0 && this.targetCell) {
          this.targetCell.state = FARM_CELL_STATES.HARVESTED + 1;
          this.loaded = Math.min(this.trailerCapacity, this.loaded + 1);
          this.targetCell.reserved = false;
          this.targetCell = null;

            this.state = 'RETURNING_TO_HOME';

            this.pathIndex++;
            if (this.pathIndex < this.path.length) {

  function getTopStorageSlotPosition(index) {

    };

  function forkliftStopPos(targetX, targetY, approachAngle) {
    const cos = Math.cos(approachAngle);

    const wy = FORKLIFT_CARRY_LOCAL_X * sin + FORKLIFT_CARRY_LOCAL_Y * cos;
    return { x: targetX - wx, y: targetY - wy };
  }
  function getTruckBlockSlotPosition(truck) {

    const sin = Math.sin(truck.angle);

      x: truck.x + lx * cos - ly * sin,

    };
  }
  function closestPointOnSegment(px, py, ax, ay, bx, by) {
    const dx = bx - ax, dy = by - ay;
    const len2 = dx * dx + dy * dy;
    if (len2 === 0) return { x: ax, y: ay };
    let t = ((px - ax) * dx + (py - ay) * dy) / len2;
    t = Math.max(0, Math.min(1, t));
    return { x: ax + t * dx, y: ay + t * dy };
  }
  function isRoadBlock(row, col) {
    if (row === ROAD_ENTRY_ROW && col >= ROAD_LEFT_COL) return true;
    if (row === ROAD_FAR_ROW && col >= ROAD_LEFT_COL && col <= ROAD_RIGHT_COL) return true;
    if (row === ROAD_MID_ROW && col >= ROAD_LEFT_COL && col <= ROAD_RIGHT_COL) return true;
    if (col === ROAD_LEFT_COL && row >= ROAD_ENTRY_ROW && row <= ROAD_FAR_ROW) return true;
    if (col === ROAD_RIGHT_COL && row >= ROAD_ENTRY_ROW && row <= ROAD_FAR_ROW) return true;
    return false;
  }
  function closestRoadPoint(px, py, rc) {
    let best = null, bestDist = Infinity;
    for (const s of rc.segments) {
      const cp = closestPointOnSegment(px, py, s[0], s[1], s[2], s[3]);
      const d = Math.hypot(cp.x - px, cp.y - py);
      if (d < bestDist) { bestDist = d; best = cp; }
    }
    return best;
  }
  function buildRoadPath(sx, sy, ex, ey, rc) {
    const eps = 1.5;
    const onRow4 = y => Math.abs(y - rc.row4Y) < eps;
    const onMidRow = y => Math.abs(y - rc.midY) < eps;
    const onRow14 = y => Math.abs(y - rc.row14Y) < eps;
    const onLeftCol = x => Math.abs(x - rc.leftColX) < eps;
    const onRightCol = x => Math.abs(x - rc.rightColX) < eps;
    if (Math.abs(sx - ex) < eps && Math.abs(sy - ey) < eps) return [];
    const sameRow = (onRow4(sy) && onRow4(ey)) ||
                    (onMidRow(sy) && onMidRow(ey)) ||
                    (onRow14(sy) && onRow14(ey));
    const sameCol = (onLeftCol(sx) && onLeftCol(ex)) ||

            ctx.lineTo(rc.leftColX, rc.row14Y);
            ctx.lineTo(rc.rightColX, rc.row14Y);
            ctx.lineTo(rc.rightColX, rc.row4Y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(rc.leftColX, rc.midY);
            ctx.lineTo(rc.rightColX, rc.midY);
            ctx.stroke();
            ctx.setLineDash([]);
        }
        function drawStationHalf(railY, ySign, pkgY, forkliftHomeX, forkliftHomeY) {
            const platformH = ySign < 0 ? TOP_PLATFORM_HEIGHT : BOTTOM_PLATFORM_HEIGHT;
            const platformY = ySign < 0 ? railY - TOP_PLATFORM_HEIGHT : railY + BOTTOM_PLATFORM_OFFSET;
            const buildingY = ySign < 0 ? platformY - BUILDING_HEIGHT : platformY + platformH;
            const parkingX = STATION_X + (STATION_WIDTH - PARKING_WIDTH) / 2;
            const spotSpacing = PARKING_WIDTH / 5;
            const lineHeight = 21;
            ctx.fillStyle = COLORS.stationPlatform;
            ctx.fillRect(STATION_X, platformY, STATION_WIDTH, platformH);
            ctx.fillStyle = COLORS.stationBuilding;
            ctx.fillRect(STATION_X, buildingY, STATION_WIDTH, BUILDING_HEIGHT);
            ctx.fillStyle = COLORS.parkingAsphalt;
            ctx.fillRect(parkingX, pkgY, PARKING_WIDTH, PARKING_HEIGHT);
            ctx.strokeStyle = COLORS.parkingLine;
            ctx.lineWidth = 3;
            const lineTopY = ySign < 0
                ? pkgY + (PARKING_HEIGHT - lineHeight) / 2
                : pkgY;
            const lineBotY = ySign < 0
                ? pkgY + PARKING_HEIGHT
                : pkgY + (PARKING_HEIGHT - lineHeight) / 2 + lineHeight;
            for (let i = 1; i < 5; i++) {
                ctx.beginPath();
                ctx.moveTo(parkingX + i * spotSpacing, lineTopY);
                ctx.lineTo(parkingX + i * spotSpacing, lineBotY);
                ctx.stroke();
            }
            const boxOffX = ySign < 0 ? -10 : -14;
            const boxOffY = ySign < 0 ? -18 : -20;
            ctx.setLineDash([5, 5]);
            ctx.strokeStyle = '#e0e0e0';
            ctx.lineWidth = 3;
            ctx.strokeRect(forkliftHomeX + boxOffX, forkliftHomeY + boxOffY, 24, 38);
            ctx.setLineDash([]);
        }
        function drawRoads() {
            ctx.lineJoin = 'round';
            ctx.lineCap = 'square';
            const parkingX = STATION_X + (STATION_WIDTH - PARKING_WIDTH) / 2;
            drawRoadLoop(TOP_ROAD_COORDS, parkingX + PARKING_WIDTH - 10);
            drawRoadLoop(BOT_ROAD_COORDS, parkingX + 10);
            ctx.lineJoin = 'miter';
            ctx.lineCap = 'butt';
        }
        function drawStorages() {
            drawStorage(TOP_STORAGE_X, TOP_STORAGE_Y, sim.topStorageCount);
            drawStorage(BOTTOM_STORAGE_X, BOTTOM_STORAGE_Y, sim.bottomStorageCount);
        }
        function drawStations() {
            drawStationHalf(TOP_Y, -1, topParkingY, TOP_FORKLIFT_HOME_X, TOP_FORKLIFT_HOME_Y);
            drawStationHalf(BOTTOM_Y, +1, bottomParkingY, BOTTOM_FORKLIFT_HOME_X, BOTTOM_FORKLIFT_HOME_Y);
        }
        function drawQuarryBlocks() {
            function drawBlocks(blocks) {
                for (const b of blocks) {
                    if (b.active) {
                        ctx.fillStyle = COLORS.quarryMain; ctx.fillRect(b.x, b.y, BLOCK_SIZE, BLOCK_SIZE);
                        ctx.fillStyle = COLORS.quarryMid; ctx.fillRect(b.x+3, b.y+3, BLOCK_SIZE-6, BLOCK_SIZE-6);
                        ctx.fillStyle = COLORS.quarryDeep; ctx.fillRect(b.x+7, b.y+7, BLOCK_SIZE-14, BLOCK_SIZE-14);
                    } else {
                        ctx.fillStyle = COLORS.quarryDeep; ctx.fillRect(b.x, b.y, BLOCK_SIZE, BLOCK_SIZE);
                    }
                    ctx.strokeStyle = COLORS.quarryOutline;
                    ctx.lineWidth = 2;
                    ctx.strokeRect(b.x, b.y, BLOCK_SIZE, BLOCK_SIZE);
                }
            }
            drawBlocks(sim.topBlocks);
            drawBlocks(sim.bottomBlocks);
        }
        function drawRails() {
            ctx.lineWidth = 26;
            ctx.strokeStyle = COLORS.trackBed;
            ctx.beginPath();
            ctx.moveTo(LEFT_CX, TOP_Y); ctx.lineTo(RIGHT_CX, TOP_Y);
            ctx.arc(RIGHT_CX, CENTER_Y, CURVE_RADIUS, -Math.PI/2, Math.PI/2);
            ctx.lineTo(LEFT_CX, BOTTOM_Y);
            ctx.arc(LEFT_CX, CENTER_Y, CURVE_RADIUS, Math.PI/2, 3*Math.PI/2);
            ctx.stroke();
            ctx.lineWidth = 4;
            ctx.strokeStyle = COLORS.rail;
            [[-8],[8]].forEach(([off]) => {
                ctx.beginPath();
                ctx.moveTo(LEFT_CX, TOP_Y+off); ctx.lineTo(RIGHT_CX, TOP_Y+off); ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(RIGHT_CX, BOTTOM_Y+off); ctx.lineTo(LEFT_CX, BOTTOM_Y+off); ctx.stroke();
            });
            [[RIGHT_CX, -1],[RIGHT_CX, 1],[LEFT_CX, -1],[LEFT_CX, 1]].forEach(([cx, sign]) => {
                const startA = cx === RIGHT_CX ? -Math.PI/2 : Math.PI/2;
                const endA = cx === RIGHT_CX ? Math.PI/2 : 3*Math.PI/2;
                [-8,8].forEach(off => {
                    ctx.beginPath();
                    ctx.arc(cx, CENTER_Y, CURVE_RADIUS + off, startA, endA);
                    ctx.stroke();
                });
            });
        }
        function drawTruck(truck) {
            ctx.save();
            ctx.translate(truck.x, truck.y);
            ctx.rotate(truck.angle);
            ctx.fillStyle = COLORS.truckTrailer; ctx.fillRect(-22, -8, 17, 17);
            ctx.fillStyle = '#444'; ctx.fillRect(-5, -2, 1, 4);
            ctx.fillStyle = COLORS.truckCab; ctx.fillRect(-4, -6, 10, 12);
            ctx.fillStyle = COLORS.truckWindow; ctx.fillRect(2, -3, 3, 6);
            ctx.fillStyle = COLORS.engineWheel;
            ctx.fillRect(-18,-9,6,2); ctx.fillRect(-18,8,6,2);
            ctx.fillRect(0,-7,6,2); ctx.fillRect(0,5,6,2);
            if (truck.hasBlock) {
                ctx.fillStyle = COLORS.quarryMain; ctx.fillRect(-20,-6,13,13);
                ctx.fillStyle = COLORS.quarryMid; ctx.fillRect(-18,-4,9,9);
                ctx.fillStyle = COLORS.quarryDeep; ctx.fillRect(-15,-1,3,3);
            }
            ctx.restore();
        }
        function drawForklift(fl) {
            ctx.save();
            ctx.translate(fl.x, fl.y);
            ctx.rotate(fl.angle);
            ctx.scale(0.9, 0.9);
            ctx.fillStyle = '#1c2526';
            ctx.fillRect(-15,-11,5,3); ctx.fillRect(-15,4,5,3);
            ctx.fillRect(-2,-11,5,3); ctx.fillRect(-2,4,5,3);
            ctx.fillStyle = COLORS.forkliftBody; ctx.fillRect(-16,-9,22,14);
            ctx.fillStyle = COLORS.forkliftForks;
            ctx.fillRect(5,-9,14,3); ctx.fillRect(5,2,14,3);
            if (fl.carrying) {
                ctx.fillStyle = COLORS.quarryMain; ctx.fillRect(7,-8,13,13);
                ctx.fillStyle = COLORS.quarryMid; ctx.fillRect(9,-6,9,9);
                ctx.fillStyle = COLORS.quarryDeep; ctx.fillRect(12,-3,3,3);
            }
            ctx.restore();
        }
        function drawEngine(x, y, angle) {
            ctx.save();
            ctx.translate(x, y); ctx.rotate(angle);
            ctx.fillStyle = COLORS.engineWheel;
            ctx.fillRect(-17,-12,9,6); ctx.fillRect(6,-12,9,6);
            ctx.fillRect(-17,6,9,6); ctx.fillRect(6,6,9,6);
            ctx.fillStyle = COLORS.engineBody;
            ctx.fillRect(-TRAIN_LENGTH/2, -TRAIN_WIDTH/2, TRAIN_LENGTH, TRAIN_WIDTH);
            ctx.fillStyle = COLORS.engineFront;
            ctx.fillRect(TRAIN_LENGTH/2-11, -TRAIN_WIDTH/2+2, 11, TRAIN_WIDTH-4);
            ctx.restore();
        }
        function drawCarriage(x, y, angle, hasBlock) {
            ctx.save();
            ctx.translate(x, y); ctx.rotate(angle);
            ctx.fillStyle = COLORS.carriageWheel;
            ctx.fillRect(-CARRIAGE_LENGTH/2+6,-13,8,5); ctx.fillRect(CARRIAGE_LENGTH/2-14,-13,8,5);
            ctx.fillRect(-CARRIAGE_LENGTH/2+6,8,8,5); ctx.fillRect(CARRIAGE_LENGTH/2-14,8,8,5);
            ctx.fillStyle = COLORS.carriageBody;
            ctx.fillRect(-CARRIAGE_LENGTH/2, -CARRIAGE_WIDTH/2, CARRIAGE_LENGTH, CARRIAGE_WIDTH);
            ctx.fillStyle = COLORS.carriageInner;
            ctx.fillRect(-(CARRIAGE_LENGTH-7)/2, -(CARRIAGE_WIDTH-5)/2, CARRIAGE_LENGTH-7, CARRIAGE_WIDTH-5);
            if (hasBlock) {
                ctx.fillStyle = COLORS.quarryMain; ctx.fillRect(-6,-6,13,13);
                ctx.fillStyle = COLORS.quarryMid; ctx.fillRect(-4,-4,9,9);
                ctx.fillStyle = COLORS.quarryDeep; ctx.fillRect(-1,-1,3,3);
            }
            ctx.restore();
        }
        function drawCrane(crane) {
            const staticArmLen = 17, baseH = 9, rotatingLen = 22;
            const armW = 7, extW = 5.5, crossScale = 0.36;
            const extension = Math.max(0, crane.currentLength - rotatingLen);
            const baseLeft = crane.baseX - 13;
            const baseTop = crane.baseY - baseH;
            ctx.fillStyle = '#facc15';
            ctx.fillRect(baseLeft, baseTop, 26, baseH);
            ctx.save();
            ctx.beginPath(); ctx.rect(baseLeft, baseTop, 26, baseH); ctx.clip();
            ctx.fillStyle = '#000000';
            const band = 26 * 0.26;
            for (let i = -2; i < 5; i++) {
                const ox = i * band * 1.85 + baseLeft;
                ctx.beginPath();
                ctx.moveTo(ox, baseTop); ctx.lineTo(ox + baseH*1.15, crane.baseY);
                ctx.lineTo(ox + baseH*1.15 + band, crane.baseY); ctx.lineTo(ox + band, baseTop);
                ctx.closePath(); ctx.fill();
            }
            ctx.restore();
            ctx.strokeStyle = '#222'; ctx.lineWidth = 1;
            ctx.strokeRect(baseLeft, baseTop, 26, baseH);
            ctx.fillStyle = '#f1c40f'; ctx.fillRect(crane.baseX-4, crane.baseY-baseH-staticArmLen, 8, staticArmLen);
            ctx.strokeStyle = '#555555'; ctx.lineWidth = 1.2;
            ctx.strokeRect(crane.baseX-4, crane.baseY-baseH-staticArmLen, 8, staticArmLen);
            ctx.save();
            ctx.translate(crane.pivotX, crane.pivotY); ctx.rotate(crane.currentAngle);
            ctx.fillStyle = '#7f8c8d'; ctx.fillRect(0, -armW/2, rotatingLen, armW);
            ctx.strokeStyle = '#555'; ctx.lineWidth = 1;
            ctx.strokeRect(0, -armW/2, rotatingLen, armW);
            if (extension > 0) {
                ctx.fillStyle = '#95a5a6'; ctx.fillRect(rotatingLen, -extW/2, extension, extW);
                ctx.strokeRect(rotatingLen, -extW/2, extension, extW);
            }
            ctx.restore();
            ctx.fillStyle = '#555555';
            ctx.beginPath(); ctx.arc(crane.pivotX, crane.pivotY, 6, 0, Math.PI*2); ctx.fill();
            if (crane.isCarrying) {
                const bSize = 13;
                ctx.fillStyle = COLORS.quarryMain; ctx.fillRect(crane.hookX-bSize/2, crane.hookY-bSize/2, bSize, bSize);
                ctx.fillStyle = COLORS.quarryMid; ctx.fillRect(crane.hookX-bSize/2+2, crane.hookY-bSize/2+2, bSize-4, bSize-4);
                ctx.fillStyle = COLORS.quarryDeep; ctx.fillRect(crane.hookX-1.5, crane.hookY-1.5, 3, 3);
            }
            drawCraneCross(crane.hookX, crane.hookY, crossScale);
        }
        function drawCraneCross(hx, hy, scale) {
            ctx.save();
            ctx.translate(hx, hy); ctx.rotate(Math.PI/4); ctx.scale(scale, scale);
            ctx.fillStyle = '#f1c40f';
            ctx.fillRect(-20,-3,40,6); ctx.fillRect(-3,-20,6,40);
            ctx.strokeStyle = '#000000'; ctx.lineWidth = 1.5;
            ctx.strokeRect(-20,-3,40,6); ctx.strokeRect(-3,-20,6,40);
            ctx.fillStyle = '#000000';
            ctx.beginPath(); ctx.moveTo(-20,-3); ctx.lineTo(-26,0); ctx.lineTo(-20,3); ctx.closePath(); ctx.fill();
            ctx.beginPath(); ctx.moveTo( 20,-3); ctx.lineTo( 26,0); ctx.lineTo( 20,3); ctx.closePath(); ctx.fill();
            ctx.beginPath(); ctx.moveTo(-3,-20); ctx.lineTo(0,-26); ctx.lineTo(3,-20); ctx.closePath(); ctx.fill();
            ctx.beginPath(); ctx.moveTo(-3, 20); ctx.lineTo(0, 26); ctx.lineTo(3, 20); ctx.closePath(); ctx.fill();
            ctx.restore();
        }
        function drawHarvester(h) {
          if (!h) return;
          ctx.save();
          ctx.translate(h.x, h.y);
          ctx.rotate(h.angle);
          ctx.fillStyle = '#27ae60';
          ctx.fillRect(-12, -10, 28, 18);
          ctx.fillStyle = '#1e8c4f';
          ctx.fillRect(12, -13, 8, 24);
          ctx.fillStyle = '#2c3e50';
          ctx.fillRect(-12, -13, 6, 26);
          ctx.restore();
        }
        function drawTractor(t) {
          if (!t) return;
          ctx.save();
          ctx.translate(t.x, t.y);
          ctx.rotate(t.angle);
          ctx.fillStyle = '#5d6d7e';
          ctx.fillRect(-58, -11, 42, 22);
          ctx.strokeStyle = '#2c3e50';
          ctx.lineWidth = 1;
          ctx.strokeRect(-58, -11, 42, 22);
          ctx.fillStyle = '#34495e';
          ctx.fillRect(-21, -2, 4, 4);
          if (t.loaded > 0) {
            ctx.fillStyle = '#e8d050';
            for (let i = 0; i < t.loaded; i++) {
              const tx = -57 + (i % 5) * 8;
              const ty = -9 + Math.floor(i / 5) * 9;
              ctx.fillRect(tx, ty, 7, 8);
              ctx.fillStyle = '#d4ac0d';
              ctx.fillRect(tx + 1, ty + 1, 5, 6);
              ctx.fillStyle = '#e8d050';
            }
          }
          ctx.fillStyle = '#c0392b';
          ctx.fillRect(-14, -9, 20, 18);
          ctx.fillStyle = '#e74c3c';
          ctx.fillRect(4, -5, 10, 10);
          ctx.fillStyle = '#ecf0f1';
          ctx.fillRect(-8, -7, 7, 14);
          ctx.fillStyle = '#1a252f';
          ctx.fillRect(-11, -12, 7, 5);
          ctx.fillRect(-11, 7, 7, 5);
          ctx.fillRect(11, -6, 4, 3);
          ctx.fillRect(11, 3, 4, 3);
          ctx.restore();
        }
        function drawWindmill() {
          const g = sim.windmillGeometry;
          const sailAngle = sim.windmillSailAngle;
          const mAngle = sim.millstoneAngle;
          ctx.fillStyle = '#d2b48c';
          ctx.fillRect(g.towerX, g.towerY, g.towerWidth, g.towerHeight);
          ctx.strokeStyle = '#8b5a2b';
          ctx.lineWidth = 2.5;
          ctx.strokeRect(g.towerX, g.towerY, g.towerWidth, g.towerHeight);
          ctx.fillStyle = '#c9a37f';
          ctx.fillRect(g.towerX - 4, g.towerY + g.towerHeight - 6, g.towerWidth + 8, 6);
          ctx.strokeRect(g.towerX - 4, g.towerY + g.towerHeight - 6, g.towerWidth + 8, 6);
          ctx.fillStyle = '#a0522d';
          ctx.fillRect(g.towerX - 3, g.towerY - 7, g.towerWidth + 6, 11);
          ctx.fillStyle = '#333';
          ctx.fillRect(g.hubX - 1.5, g.hubY - 4, 3, 14);
          ctx.save();
          ctx.translate(g.hubX, g.hubY);
          ctx.rotate(sailAngle);
          const halfLen = g.sailLength / 2;
          for (let i = 0; i < 4; i++) {
            ctx.rotate(i * Math.PI / 2);
            ctx.fillStyle = '#f0e0b0';
            ctx.fillRect(-halfLen, -g.sailWidth / 2, g.sailLength, g.sailWidth);
            ctx.fillStyle = '#c9b37f';
            ctx.fillRect(-halfLen + 3, -g.sailWidth / 2 + 1, g.sailLength - 6, g.sailWidth - 2);
          }
          ctx.restore();
          ctx.save();
          ctx.translate(g.millstoneX, g.millstoneY);
          ctx.rotate(mAngle);
          ctx.fillStyle = '#777777';
          ctx.beginPath();
          ctx.arc(0, 0, g.millstoneRadius, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = '#555555';
          ctx.beginPath();
          ctx.arc(0, 0, g.millstoneRadius - 2.5, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = '#999999';
          ctx.lineWidth = 1.8;
          for (let i = 0; i < 8; i++) {
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(Math.cos(i * Math.PI / 4) * g.millstoneRadius * 0.82, Math.sin(i * Math.PI / 4) * g.millstoneRadius * 0.82);
            ctx.stroke();
          }
          ctx.fillStyle = '#333333';
          ctx.beginPath();
          ctx.arc(0, 0, 2.5, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }
        const sim = createSim();
        const {
            WIDTH, HEIGHT, CENTER_X, CENTER_Y,
            TOP_Y, BOTTOM_Y, LEFT_CX, RIGHT_CX, CURVE_RADIUS, STRAIGHT_LENGTH,
            TOTAL_TRACK_LENGTH, BLOCK_SIZE, STORAGE_CAPACITY,
            STORAGE_COLS, STORAGE_CELL_STEP, STORAGE_CELL_MARGIN, STORAGE_CELL_SIZE,
            TOP_ROAD_COORDS, BOT_ROAD_COORDS,
            TOP_STORAGE_X, TOP_STORAGE_Y, BOTTOM_STORAGE_X, BOTTOM_STORAGE_Y,
            STORAGE_WIDTH, STORAGE_HEIGHT, STATION_X, STATION_WIDTH,
            topParkingY, bottomParkingY, PARKING_WIDTH, PARKING_HEIGHT,
            TOP_FORKLIFT_HOME_X, TOP_FORKLIFT_HOME_Y,
            BOTTOM_FORKLIFT_HOME_X, BOTTOM_FORKLIFT_HOME_Y,
            STOP_DIST_1, STOP_DIST_2, BRAKE_DISTANCE,
        } = sim.geometry;
        const TOP_PLATFORM_HEIGHT = 30;
        const BOTTOM_PLATFORM_HEIGHT = 26;
        const BOTTOM_PLATFORM_OFFSET = 4;
        const BUILDING_HEIGHT = 78;
        const PARKING_GAP = 4;
        const STATION_TOTAL_HEIGHT = 108;
        const TRAIN_LENGTH = 42;
        const TRAIN_WIDTH = 18;
        const CARRIAGE_LENGTH = 26;
        const CARRIAGE_WIDTH = 20;
        const CARRIAGE_SEPARATION = 36;
        let lastTime = 0;
        function animate(timestamp) {
            if (!lastTime) lastTime = timestamp;
            let dt = Math.min((timestamp - lastTime) / 1000, 0.1);
            lastTime = timestamp;
            sim.step(dt);
            ctx.clearRect(0, 0, WIDTH, HEIGHT);
            ctx.fillStyle = COLORS.grass;
            ctx.fillRect(0, 0, WIDTH, HEIGHT);
            drawFarmPatch();
            drawAsphaltParkingBay();
            drawRoads();
            drawQuarryBlocks();
            drawStations();
            drawStorages();
            for (const t of sim.trucks) { if (t.state === 'PARKED' && !t.hasBlock) drawTruck(t); }
            for (const t of sim.trucks) { if (t.state !== 'PARKED' || t.hasBlock) drawTruck(t); }
            for (const f of sim.forklifts) drawForklift(f);
            drawRails();
            const enginePos = sim.helpers.getPosition(sim.distance);
            for (let i = 4; i >= 0; i--) {
                const p = sim.helpers.getPosition(sim.distance - CARRIAGE_SEPARATION * (i + 1));
                drawCarriage(p.x, p.y, p.angle, sim.trainBlocks[i]);
            }
            drawEngine(enginePos.x, enginePos.y, enginePos.angle);
            for (const c of sim.cranes) drawCrane(c);
            for (const c of sim.cranes) drawCraneCross(c.hookX, c.hookY, 0.36);
            drawHarvester(sim.harvester);
            drawTractor(sim.tractor);
            drawWindmill();
            requestAnimationFrame(animate);
        }
        sim.initSim();
        requestAnimationFrame(animate);
    </script>
</body>
