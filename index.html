<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Train & Truck SIM</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        body { margin: 0; padding: 0; background: #0a1f0a; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; image-rendering: pixelated; }
        canvas { border: 12px solid #222; box-shadow: 0 0 0 16px #1a3a1a; image-rendering: pixelated; background: #0a1f0a; }
    </style>
</head>
<body>
    <canvas id="canvas" width="1200" height="700"></canvas>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        // Canvas & track constants
        const WIDTH = 1200;
        const HEIGHT = 700;
        const CENTER_X = 600;
        const CENTER_Y = 350;
        const STRAIGHT_LENGTH = 410;
        const CURVE_RADIUS = 128;
        const LEFT_CX = CENTER_X - STRAIGHT_LENGTH / 2;
        const RIGHT_CX = CENTER_X + STRAIGHT_LENGTH / 2;
        const TOP_Y = CENTER_Y - CURVE_RADIUS;
        const BOTTOM_Y = CENTER_Y + CURVE_RADIUS;
        const TOTAL_TRACK_LENGTH = 2 * STRAIGHT_LENGTH + 2 * Math.PI * CURVE_RADIUS;
        // Train & carriage dimensions
        const TRAIN_LENGTH = 42;
        const TRAIN_WIDTH = 18;
        const CARRIAGE_LENGTH = 26;
        const CARRIAGE_WIDTH = 20;
        const CARRIAGE_SEPARATION = 36;
        // Train Speed and State
        let baseSpeed = 265;
        let currentSpeed = baseSpeed;
        let trainState = 'MOVING';
        let trainStopTimer = 0;
        let distance = 120;
        let trainAtStation = null;
        const STOP_DIST_1 = 310;
        const STOP_DIST_2 = STOP_DIST_1 + STRAIGHT_LENGTH + Math.PI * CURVE_RADIUS;
        const BRAKE_DISTANCE = 185;
        const ACCELERATION_RATE = 135;
        // Station & Parking settings
        const STATION_X = 529;
        const STATION_WIDTH = 142;
        const PARKING_WIDTH = 120;
        const PARKING_HEIGHT = 55;
        const topParkingY = TOP_Y - 30 - 78 - PARKING_HEIGHT - 4;
        const TOP_ROAD_Y = topParkingY + PARKING_HEIGHT / 2;
        const bottomParkingY = BOTTOM_Y + 4 + 26 + 78 + 6;
        const BOTTOM_ROAD_Y = bottomParkingY + PARKING_HEIGHT / 2;
        // Storage areas
        const STORAGE_WIDTH = 80;
        const STORAGE_HEIGHT = 80;
        const TOP_STORAGE_X = STATION_X - 89 - 6;
        const TOP_STORAGE_Y = TOP_Y - 112 - 3;
        const BOTTOM_STORAGE_X = STATION_X + STATION_WIDTH + 18;
        const BOTTOM_STORAGE_Y = BOTTOM_Y + 37 - 3;
        const STORAGE_CAPACITY = 25;
        let topStorageCount = 0;
        let bottomStorageCount = 0;
        let trainBlocks = [false, false, false, false, false];
        // Quarry settings
        const BLOCK_SIZE = 18;
        const QUARRY_MAX_ROWS = 19;
        const BOTTOM_QUARRY_MAX_ROWS = 19;
        const QUARRY_OFFSET_X = 12;
        const QUARRY_OFFSET_Y = TOP_ROAD_Y - 81;
        const BOTTOM_QUARRY_OFFSET_X = WIDTH - 12 - BLOCK_SIZE;
        const BOTTOM_QUARRY_OFFSET_Y = BOTTOM_ROAD_Y + 45 + BLOCK_SIZE;
        // PERMANENT TOP QUARRY LAYOUT (unchanged)
        const TOP_QUARRY_COLS_PER_ROW = [18, 19, 19, 18, 17, 18, 17, 16, 16, 15, 14, 13, 12, 12, 11, 11, 9, 6, 5];
        // Colors
        const COLORS = {
            grass: '#2e8b57', trackBed: '#654321', rail: '#D3D3D3',
            engineBody: '#1e90ff', engineFront: '#ff4757', engineWheel: '#1c2526',
            carriageBody: '#a8b0b8', carriageInner: '#5f6a72', carriageWheel: '#1c2526',
            quarryMain: '#d4c3a8', quarryMid: '#b9a98f', quarryDeep: '#9e8a6f', quarryOutline: '#5c5340',
            stationBuilding: '#7a7a8a', stationPlatform: '#a8a8b8',
            parkingAsphalt: '#3f3f3f', parkingLine: '#e0e0e0',
            truckCab: '#e69900', truckTrailer: '#cc5500', truckWindow: '#add8e6',
            forkliftBody: '#ffcc00', forkliftForks: '#bbbbbb',
            craneBase: '#555555', craneArm: '#333333',
            forkliftPath: 'rgba(230, 230, 230, 0.35)'
        };
        const topBlocks = [];
        const bottomBlocks = [];
        const trucks = [];
        let forklifts = [];
        let cranes = [];
        // Forklift home positions
        const TOP_FORKLIFT_HOME_X = STATION_X + STATION_WIDTH - 2 - 12 - 2;
        const TOP_FORKLIFT_HOME_Y = (TOP_Y - 108) + 2 + 19 - 1;
        const BOTTOM_FORKLIFT_HOME_X = STATION_X + 2 + 12 + 2;
        const BOTTOM_FORKLIFT_HOME_Y = (BOTTOM_Y + 108) - 2 - 19 + 1;
        // Road coordinates
        const topRow4Y = TOP_ROAD_Y;
        const topRow14Y = QUARRY_OFFSET_Y + 14 * BLOCK_SIZE + 9;
        const topMiddleRowY = QUARRY_OFFSET_Y + 9 * BLOCK_SIZE + 9;
        const topCol3X = QUARRY_OFFSET_X + 3 * BLOCK_SIZE + 9;
        const topCol13X = QUARRY_OFFSET_X + 13 * BLOCK_SIZE + 9;
        const botRow4Y = BOTTOM_ROAD_Y;
        const botRow14Y = BOTTOM_QUARRY_OFFSET_Y - 14 * BLOCK_SIZE + 9;
        const botMiddleRowY = BOTTOM_QUARRY_OFFSET_Y - 9 * BLOCK_SIZE + 9;
        const botCol3X = BOTTOM_QUARRY_OFFSET_X - 3 * BLOCK_SIZE + 9;
        const botCol13X = BOTTOM_QUARRY_OFFSET_X - 13 * BLOCK_SIZE + 9;
        // Helper: closest point on a line segment to (px, py)
        function closestPointOnSegment(px, py, ax, ay, bx, by) {
            const dx = bx - ax, dy = by - ay;
            const len2 = dx * dx + dy * dy;
            if (len2 === 0) return { x: ax, y: ay };
            let t = ((px - ax) * dx + (py - ay) * dy) / len2;
            t = Math.max(0, Math.min(1, t));
            return { x: ax + t * dx, y: ay + t * dy };
        }
        function closestRoadPointTop(px, py) {
            const segments = [
                [topCol3X, topRow4Y, topCol13X, topRow4Y],
                [topCol3X, topMiddleRowY, topCol13X, topMiddleRowY],
                [topCol3X, topRow14Y, topCol13X, topRow14Y],
                [topCol3X, topRow4Y, topCol3X, topRow14Y],
                [topCol13X, topRow4Y, topCol13X, topRow14Y]
            ];
            let best = null, bestDist = Infinity;
            for (const s of segments) {
                const cp = closestPointOnSegment(px, py, s[0], s[1], s[2], s[3]);
                const d = Math.hypot(cp.x - px, cp.y - py);
                if (d < bestDist) { bestDist = d; best = cp; }
            }
            return best;
        }
        function buildTopRoadPath(sx, sy, ex, ey) {
            const eps = 1.5;
            const onTopRow = y => Math.abs(y - topRow4Y) < eps;
            const onMidRow = y => Math.abs(y - topMiddleRowY) < eps;
            const onBotRow = y => Math.abs(y - topRow14Y) < eps;
            const onLeftCol = x => Math.abs(x - topCol3X) < eps;
            const onRightCol = x => Math.abs(x - topCol13X) < eps;
            if (Math.abs(sx - ex) < eps && Math.abs(sy - ey) < eps) return [];
            const sameRow = (onTopRow(sy) && onTopRow(ey)) ||
                            (onMidRow(sy) && onMidRow(ey)) ||
                            (onBotRow(sy) && onBotRow(ey));
            const sameCol = (onLeftCol(sx) && onLeftCol(ex)) ||
                            (onRightCol(sx) && onRightCol(ex));
            if (sameRow) return [{ x: ex, y: ey }];
            if (sameCol) return [{ x: ex, y: ey }];
            const startCol = onLeftCol(sx) ? topCol3X : (onRightCol(sx) ? topCol13X : null);
            const endCol = onLeftCol(ex) ? topCol3X : (onRightCol(ex) ? topCol13X : null);
            if (startCol !== null) return [{ x: startCol, y: ey }, { x: ex, y: ey }];
            if (endCol !== null) return [{ x: endCol, y: sy }, { x: ex, y: ey }];
            return [{ x: ex, y: ey }];
        }
        function closestRoadPointBottom(px, py) {
            const segments = [
                [botCol3X, botRow4Y, botCol13X, botRow4Y],
                [botCol3X, botMiddleRowY, botCol13X, botMiddleRowY],
                [botCol3X, botRow14Y, botCol13X, botRow14Y],
                [botCol3X, botRow4Y, botCol3X, botRow14Y],
                [botCol13X, botRow4Y, botCol13X, botRow14Y]
            ];
            let best = null;
            let bestDist = Infinity;
            for (const s of segments) {
                const cp = closestPointOnSegment(px, py, s[0], s[1], s[2], s[3]);
                const d = Math.hypot(cp.x - px, cp.y - py);
                if (d < bestDist) { bestDist = d; best = cp; }
            }
            return best;
        }
        function buildBottomRoadPath(sx, sy, ex, ey) {
            const eps = 1.5;
            const onTopRow = y => Math.abs(y - botRow4Y) < eps;
            const onMidRow = y => Math.abs(y - botMiddleRowY) < eps;
            const onBotRow = y => Math.abs(y - botRow14Y) < eps;
            const onLeftCol = x => Math.abs(x - botCol3X) < eps;
            const onRightCol = x => Math.abs(x - botCol13X) < eps;
            if (Math.abs(sx - ex) < eps && Math.abs(sy - ey) < eps) return [];
            const sameRow = onTopRow(sy) && onTopRow(ey) ||
                            onMidRow(sy) && onMidRow(ey) ||
                            onBotRow(sy) && onBotRow(ey);
            const sameCol = onLeftCol(sx) && onLeftCol(ex) ||
                            onRightCol(sx) && onRightCol(ex);
            if (sameRow) return [{ x: ex, y: ey }];
            if (sameCol) return [{ x: ex, y: ey }];
            const startCol = onLeftCol(sx) ? botCol3X : (onRightCol(sx) ? botCol13X : null);
            const endCol = onLeftCol(ex) ? botCol3X : (onRightCol(ex) ? botCol13X : null);
            if (startCol !== null) {
                return [
                    { x: startCol, y: ey },
                    { x: ex, y: ey }
                ];
            }
            if (endCol !== null) {
                return [
                    { x: endCol, y: sy },
                    { x: ex, y: ey }
                ];
            }
            return [{ x: ex, y: ey }];
        }
        function isTopRoadBlock(row, col) {
            if (row === 4 && col >= 3) return true;
            if (row === 14 && col >= 3 && col <= 13) return true;
            if (row === 9 && col >= 3 && col <= 13) return true;
            if (col === 3 && row >= 4 && row <= 14) return true;
            if (col === 13 && row >= 4 && row <= 14) return true;
            return false;
        }
        function isBottomRoadBlock(row, col) {
            if (row === 4 && col >= 3) return true;
            if (row === 14 && col >= 3 && col <= 13) return true;
            if (row === 9 && col >= 3 && col <= 13) return true;
            if (col === 3 && row >= 4 && row <= 14) return true;
            if (col === 13 && row >= 4 && row <= 14) return true;
            return false;
        }
        function initSim() {
            topBlocks.length = 0;
            bottomBlocks.length = 0;
            trucks.length = 0;
            forklifts.length = 0;
            cranes.length = 0;
            for (let row = 0; row < QUARRY_MAX_ROWS; row++) {
                const numCols = TOP_QUARRY_COLS_PER_ROW[row];
                for (let col = 0; col < numCols; col++) {
                    if (isTopRoadBlock(row, col)) continue;
                    topBlocks.push({ x: QUARRY_OFFSET_X + col * BLOCK_SIZE, y: QUARRY_OFFSET_Y + row * BLOCK_SIZE, active: true });
                }
            }
            for (let row = 0; row < BOTTOM_QUARRY_MAX_ROWS; row++) {
                const numCols = TOP_QUARRY_COLS_PER_ROW[row];
                for (let col = 0; col < numCols; col++) {
                    if (isBottomRoadBlock(row, col)) continue;
                    bottomBlocks.push({
                        x: BOTTOM_QUARRY_OFFSET_X - col * BLOCK_SIZE,
                        y: BOTTOM_QUARRY_OFFSET_Y - row * BLOCK_SIZE,
                        active: false
                    });
                }
            }
            for (let i = 0; i < 5; i++) {
                trucks.push(new Truck('top', i));
                trucks.push(new Truck('bottom', i));
            }
            topStorageCount = 0;
            bottomStorageCount = 0;
            trainBlocks = [false, false, false, false, false];
            trainAtStation = null;
            forklifts = [new Forklift('top'), new Forklift('bottom')];
            cranes = [new Crane('top'), new Crane('bottom')];
        }
        class Truck {
            constructor(type, index) {
                this.type = type;
                this.index = index;
                this.state = 'PARKED';
                this.timer = Math.random() * 4 + 1;
                this.scanTimer = 0;
                const spotSpacing = PARKING_WIDTH / 5;
                const parkingX = STATION_X + (STATION_WIDTH - PARKING_WIDTH) / 2;
                this.parkX = parkingX + spotSpacing * 0.5 + index * spotSpacing;
                if (this.type === 'top') {
                    this.parkY = topParkingY + PARKING_HEIGHT / 2;
                    this.angle = -Math.PI / 2;
                } else {
                    this.parkY = bottomParkingY + PARKING_HEIGHT / 2;
                    this.angle = Math.PI / 2;
                }
                this.x = this.parkX;
                this.y = this.parkY;
                this.route = [];
                this.routeIndex = 0;
                this.hasBlock = false;
                this.depositTarget = null;
                this.pickupTarget = null; // block reserved for pickup during APPROACHING
                this.approachBudget = 0; // remaining distance (px) allowed during APPROACHING
                this.safetyNetTarget = null;
                this.safetyNetTriggerIndex = -1;
                this.speed = 61.75;
                this.parkedTime = 0; // NEW: track continuous time spent in PARKED state for longest-wait selection
            }
            update(dt) {
                switch (this.state) {
                    case 'PARKED':
                        this.parkedTime += dt; // accumulate wait time
                        this.timer -= dt;
                        if (this.timer <= 0) {
                            if (this.type === 'top') {
                                if (this.hasBlock) { this.timer = 0.5; return; }
                                if (topStorageCount >= STORAGE_CAPACITY) { this.timer = 1.0; return; }
                            }
                            if (this.type === 'bottom' && !this.hasBlock) { this.timer = 0.8; return; }
                            this.state = 'DRIVING';
                            this.parkedTime = 0; // reset when leaving parking
                            if (this.type === 'top') {
                                const useShortcut = Math.random() < 0.5;
                                if (useShortcut) {
                                    this.route = [
                                        {x: topCol13X, y: topRow4Y},
                                        {x: topCol3X, y: topRow4Y},
                                        {x: topCol3X, y: topMiddleRowY},
                                        {x: topCol13X, y: topMiddleRowY},
                                        {x: topCol13X, y: topRow4Y},
                                        {x: this.parkX, y: this.parkY}
                                    ];
                                } else {
                                    this.route = [
                                        {x: topCol13X, y: topRow4Y},
                                        {x: topCol3X, y: topRow4Y},
                                        {x: topCol3X, y: topRow14Y},
                                        {x: topCol13X, y: topRow14Y},
                                        {x: topCol13X, y: topRow4Y},
                                        {x: this.parkX, y: this.parkY}
                                    ];
                                }
                            } else {
                                const useShortcut = Math.random() < 0.5;
                                if (useShortcut) {
                                    this.route = [
                                        {x: botCol13X, y: botRow4Y},
                                        {x: botCol3X, y: botRow4Y},
                                        {x: botCol3X, y: botMiddleRowY},
                                        {x: botCol13X, y: botMiddleRowY},
                                        {x: botCol13X, y: botRow4Y},
                                        {x: this.parkX, y: this.parkY}
                                    ];
                                } else {
                                    this.route = [
                                        {x: botCol13X, y: botRow4Y},
                                        {x: botCol3X, y: botRow4Y},
                                        {x: botCol3X, y: botRow14Y},
                                        {x: botCol13X, y: botRow14Y},
                                        {x: botCol13X, y: botRow4Y},
                                        {x: this.parkX, y: this.parkY}
                                    ];
                                }
                            }
                            this.routeIndex = 0;
                            this.targetX = this.route[0].x;
                            this.targetY = this.route[0].y;
                        }
                        break;
                    case 'DRIVING':
                        if (this.moveToTarget(dt)) {
                            if (this.type === 'bottom' && this.hasBlock && this.safetyNetTarget &&
                                this.routeIndex === this.safetyNetTriggerIndex) {
                                // Safety-net detour arrived. Reserve only — commit on LOADING timer.
                                this.depositTarget = this.safetyNetTarget;
                                this.safetyNetTarget = null;
                                this.safetyNetTriggerIndex = -1;
                                this.state = 'APPROACHING';
                                this.approachBudget = 3 * BLOCK_SIZE;
                                break;
                            }
                            if (this.type === 'top' && !this.hasBlock && this.safetyNetTarget &&
                                this.routeIndex === this.safetyNetTriggerIndex) {
                                // Safety-net detour arrived. Reserve only — commit on LOADING timer.
                                this.pickupTarget = this.safetyNetTarget;
                                this.safetyNetTarget = null;
                                this.safetyNetTriggerIndex = -1;
                                this.state = 'APPROACHING';
                                this.approachBudget = 3 * BLOCK_SIZE;
                                break;
                            }
                            this.routeIndex++;
                            if (this.type === 'bottom' && this.hasBlock && this.routeIndex === this.route.length - 1) {
                                let nearest = null;
                                let nearestDist = Infinity;
                                for (const b of bottomBlocks) {
                                    if (b.active || b.reserved) continue;
                                    const cx = b.x + BLOCK_SIZE / 2;
                                    const cy = b.y + BLOCK_SIZE / 2;
                                    const d = Math.hypot(cx - this.x, cy - this.y);
                                    if (d < nearestDist) { nearestDist = d; nearest = b; }
                                }
                                if (nearest) {
                                    nearest.reserved = true;
                                    const targetCx = nearest.x + BLOCK_SIZE / 2;
                                    const targetCy = nearest.y + BLOCK_SIZE / 2;
                                    const rp = closestRoadPointBottom(targetCx, targetCy);
                                    const pathToDetour = buildBottomRoadPath(this.x, this.y, rp.x, rp.y);
                                    const pathToExit = buildBottomRoadPath(rp.x, rp.y, botCol13X, botRow4Y);
                                    const homeWp = this.route[this.route.length - 1];
                                    const newRoute = [];
                                    if (pathToDetour.length) newRoute.push(...pathToDetour);
                                    else newRoute.push({ x: rp.x, y: rp.y });
                                    if (pathToExit.length) newRoute.push(...pathToExit);
                                    newRoute.push(homeWp);
                                    this.route = newRoute;
                                    this.routeIndex = 0;
                                    this.targetX = this.route[0].x;
                                    this.targetY = this.route[0].y;
                                    this.safetyNetTarget = nearest;
                                    this.safetyNetTriggerIndex = Math.max(0, (pathToDetour.length || 1) - 1);
                                    break;
                                }
                            }
                            if (this.type === 'top' && !this.hasBlock && this.routeIndex === this.route.length - 1) {
                                let nearest = null;
                                let nearestDist = Infinity;
                                for (const b of topBlocks) {
                                    if (!b.active || b.reserved) continue;
                                    const cx = b.x + BLOCK_SIZE / 2;
                                    const cy = b.y + BLOCK_SIZE / 2;
                                    const d = Math.hypot(cx - this.x, cy - this.y);
                                    if (d < nearestDist) { nearestDist = d; nearest = b; }
                                }
                                if (nearest) {
                                    nearest.reserved = true;
                                    const targetCx = nearest.x + BLOCK_SIZE / 2;
                                    const targetCy = nearest.y + BLOCK_SIZE / 2;
                                    const rp = closestRoadPointTop(targetCx, targetCy);
                                    const pathToDetour = buildTopRoadPath(this.x, this.y, rp.x, rp.y);
                                    const pathToExit = buildTopRoadPath(rp.x, rp.y, topCol13X, topRow4Y);
                                    const homeWp = this.route[this.route.length - 1];
                                    const newRoute = [];
                                    if (pathToDetour.length) newRoute.push(...pathToDetour);
                                    else newRoute.push({ x: rp.x, y: rp.y });
                                    if (pathToExit.length) newRoute.push(...pathToExit);
                                    newRoute.push(homeWp);
                                    this.route = newRoute;
                                    this.routeIndex = 0;
                                    this.targetX = this.route[0].x;
                                    this.targetY = this.route[0].y;
                                    this.safetyNetTarget = nearest;
                                    this.safetyNetTriggerIndex = Math.max(0, (pathToDetour.length || 1) - 1);
                                    break;
                                }
                            }
                            if (this.routeIndex >= this.route.length) {
                                this.angle = this.type === 'top' ? -Math.PI / 2 : Math.PI / 2;
                                this.state = 'PARKED';
                                this.timer = Math.random() * 3 + 1.5;
                                this.parkedTime = 0; // reset when re-entering PARKED
                                if (this.type === 'top' && !this.hasBlock && !topBlocks.some(b => b.active)) {
                                    this.timer = 999999;
                                }
                            } else {
                                this.targetX = this.route[this.routeIndex].x;
                                this.targetY = this.route[this.routeIndex].y;
                            }
                        }
                        if (this.type === 'bottom' && this.hasBlock && this.routeIndex < this.route.length - 1) {
                            const candidates = [];
                            for (const b of bottomBlocks) {
                                if (b.active || b.reserved) continue;
                                const dist = Math.hypot((b.x + BLOCK_SIZE / 2) - this.x, (b.y + BLOCK_SIZE / 2) - this.y);
                                if (dist <= 5 * BLOCK_SIZE) candidates.push(b);
                            }
                            if (candidates.length > 0) {
                                const chosen = candidates[Math.floor(Math.random() * candidates.length)];
                                // Reserve — other trucks skip this block, but it stays visually
                                // absent from the quarry (active=false) until the LOADING timer completes.
                                chosen.reserved = true;
                                this.depositTarget = chosen;
                                this.state = 'APPROACHING';
                                this.approachBudget = 3 * BLOCK_SIZE; // drive up to 3 blocks further
                            }
                        }
                        if (this.type === 'top' && !this.hasBlock && this.routeIndex < this.route.length - 1) {
                            const candidates = [];
                            for (const b of topBlocks) {
                                if (!b.active || b.reserved) continue;
                                const dist = Math.hypot((b.x + BLOCK_SIZE / 2) - this.x, (b.y + BLOCK_SIZE / 2) - this.y);
                                if (dist <= 5 * BLOCK_SIZE) candidates.push(b);
                            }
                            if (candidates.length > 0) {
                                const chosen = candidates[Math.floor(Math.random() * candidates.length)];
                                // Reserve — other trucks skip, but block stays visually in the quarry
                                // (active=true) until LOADING timer completes.
                                chosen.reserved = true;
                                this.pickupTarget = chosen;
                                this.state = 'APPROACHING';
                                this.approachBudget = 3 * BLOCK_SIZE; // drive up to 3 blocks further
                            }
                        }
                        break;
                    case 'APPROACHING':
                        // Continue driving along the current route, consuming up to approachBudget
                        // distance (2 blocks = 36px). Stop when budget is spent OR the truck reaches
                        // its current waypoint — whichever happens first.
                        {
                            const prevX = this.x;
                            const prevY = this.y;
                            const reached = this.moveToTarget(dt);
                            const moved = Math.hypot(this.x - prevX, this.y - prevY);
                            this.approachBudget -= moved;
                            if (reached || this.approachBudget <= 0) {
                                // Stop here — enter LOADING. Block only leaves/enters quarry when timer completes.
                                this.state = 'LOADING';
                                this.timer = 1.0;
                            }
                        }
                        break;
                    case 'LOADING':
                        this.timer -= dt;
                        if (this.timer <= 0) {
                            // Timer complete — NOW the block visibly transfers.
                            if (this.depositTarget) {
                                this.depositTarget.active = true; // appears in quarry
                                this.depositTarget.reserved = false;
                                this.depositTarget = null;
                                this.hasBlock = false;
                            }
                            if (this.pickupTarget) {

                }
                ctx.restore();
                // Base border
                ctx.strokeStyle = '#222';
                ctx.lineWidth = 1;
                ctx.strokeRect(baseLeft, baseTop, 26, baseH);
                // 2. STATIC YELLOW VERTICAL ARM (above base, below ball joint)
                ctx.fillStyle = '#f1c40f';
                ctx.fillRect(this.baseX - 4, this.baseY - baseH - staticArmLen, 8, staticArmLen);
                ctx.strokeStyle = '#555555';
                ctx.lineWidth = 1.2;
                ctx.strokeRect(this.baseX - 4, this.baseY - baseH - staticArmLen, 8, staticArmLen);
                // 3. ROTATING BOOM + EXTENSION (pivots from pivotX, pivotY)
                ctx.save();
                ctx.translate(this.pivotX, this.pivotY);
                ctx.rotate(this.currentAngle);
                // Grey rotating boom
                ctx.fillStyle = '#7f8c8d';
                ctx.fillRect(0, -armW / 2, rotatingLen, armW);
                ctx.strokeStyle = '#555';
                ctx.lineWidth = 1;
                ctx.strokeRect(0, -armW / 2, rotatingLen, armW);
                // Extension segment (when arm is longer than rotatingLen)
                if (extension > 0) {
                    ctx.fillStyle = '#95a5a6';
                    ctx.fillRect(rotatingLen, -extW / 2, extension, extW);
                    ctx.strokeRect(rotatingLen, -extW / 2, extension, extW);
                }
                ctx.restore();
                // 4. BALL JOINT — drawn after boom so it sits on top visually
                ctx.fillStyle = '#555555';
                ctx.beginPath();
                ctx.arc(this.pivotX, this.pivotY, ballR, 0, Math.PI * 2);
                ctx.fill();
                // 5. CARRIED BLOCK — drawn before cross so cross paints over it
                if (this.isCarrying) {
                    const bSize = 13;
                    ctx.fillStyle = COLORS.quarryMain;
                    ctx.fillRect(this.hookX - bSize / 2, this.hookY - bSize / 2, bSize, bSize);
                    ctx.fillStyle = COLORS.quarryMid;
                    ctx.fillRect(this.hookX - bSize / 2 + 2, this.hookY - bSize / 2 + 2, bSize - 4, bSize - 4);
                    ctx.fillStyle = COLORS.quarryDeep;
                    ctx.fillRect(this.hookX - 1.5, this.hookY - 1.5, 3, 3);
                }
                // 6. CROSS HEAD — always drawn last so it sits on top of carried block and everything else
                this.drawCross();
            }
            drawCross() {
                const crossScale = 0.36;
                ctx.save();
                ctx.translate(this.hookX, this.hookY);
                ctx.rotate(Math.PI / 4);
                ctx.scale(crossScale, crossScale);
                ctx.fillStyle = '#f1c40f';
                ctx.fillRect(-20, -3, 40, 6);
                ctx.strokeStyle = '#000000';
                ctx.lineWidth = 1.5;
                ctx.strokeRect(-20, -3, 40, 6);
                ctx.fillRect(-3, -20, 6, 40);
                ctx.strokeRect(-3, -20, 6, 40);
                ctx.fillStyle = '#000000';
                ctx.beginPath(); ctx.moveTo(-20, -3); ctx.lineTo(-26, 0); ctx.lineTo(-20, 3); ctx.closePath(); ctx.fill();
                ctx.beginPath(); ctx.moveTo( 20, -3); ctx.lineTo( 26, 0); ctx.lineTo( 20, 3); ctx.closePath(); ctx.fill();
                ctx.beginPath(); ctx.moveTo(-3, -20); ctx.lineTo(0, -26); ctx.lineTo(3, -20); ctx.closePath(); ctx.fill();
                ctx.beginPath(); ctx.moveTo(-3, 20); ctx.lineTo(0, 26); ctx.lineTo(3, 20); ctx.closePath(); ctx.fill();
                ctx.restore();
            }
        }
        function getPosition(dist) {
            let d = dist % TOTAL_TRACK_LENGTH;
            if (d < 0) d += TOTAL_TRACK_LENGTH;
            if (d < STRAIGHT_LENGTH) return { x: LEFT_CX + d, y: TOP_Y, angle: 0 };
            d -= STRAIGHT_LENGTH;
            if (d < Math.PI * CURVE_RADIUS) {
                const theta = -Math.PI / 2 + (d / CURVE_RADIUS);
                return { x: RIGHT_CX + CURVE_RADIUS * Math.cos(theta), y: CENTER_Y + CURVE_RADIUS * Math.sin(theta), angle: theta + Math.PI / 2 };
            }
            d -= Math.PI * CURVE_RADIUS;
            if (d < STRAIGHT_LENGTH) return { x: RIGHT_CX - d, y: BOTTOM_Y, angle: Math.PI };
            d -= STRAIGHT_LENGTH;
            const theta = Math.PI / 2 + (d / CURVE_RADIUS);
            return { x: LEFT_CX + CURVE_RADIUS * Math.cos(theta), y: CENTER_Y + CURVE_RADIUS * Math.sin(theta), angle: theta + Math.PI / 2 };
        }
        function drawForkliftPaths() {
            ctx.save();
            ctx.strokeStyle = COLORS.forkliftPath;
            ctx.lineWidth = 2;
            ctx.setLineDash([5, 6]);
            const spineX = STATION_X + 41;
            const parkingX = STATION_X + (STATION_WIDTH - PARKING_WIDTH) / 2;
            const spotSpacing = PARKING_WIDTH / 5;
            const topStationCY = TOP_Y - 72;
            const topParkingLaneY = topParkingY + PARKING_HEIGHT / 2;
            const topStorageInX = TOP_STORAGE_X + STORAGE_WIDTH / 2;
            ctx.beginPath();
            ctx.moveTo(topStorageInX, topStationCY);
            ctx.lineTo(spineX, topStationCY);
            ctx.moveTo(spineX, topStationCY);
            ctx.lineTo(spineX, topParkingLaneY);
            ctx.moveTo(parkingX + spotSpacing * 0.5, topParkingLaneY);
            ctx.lineTo(parkingX + spotSpacing * 4.5, topParkingLaneY);
            for (let i = 0; i < 5; i++) {
                const bx = parkingX + spotSpacing * 0.5 + i * spotSpacing;
                ctx.moveTo(bx, topParkingLaneY);
                ctx.lineTo(bx, topParkingLaneY - 6);
            }
            ctx.stroke();
            const botStationCY = BOTTOM_Y + 48;
            const botParkingLaneY = bottomParkingY + PARKING_HEIGHT / 2;
            const botStorageInX = BOTTOM_STORAGE_X + STORAGE_WIDTH / 2;
            ctx.beginPath();
            ctx.moveTo(botStorageInX, botStationCY);
            ctx.lineTo(spineX, botStationCY);
            ctx.moveTo(spineX, botStationCY);
            ctx.lineTo(spineX, botParkingLaneY);
            ctx.moveTo(parkingX + spotSpacing * 0.5, botParkingLaneY);
            ctx.lineTo(parkingX + spotSpacing * 4.5, botParkingLaneY);
            for (let i = 0; i < 5; i++) {
                const bx = parkingX + spotSpacing * 0.5 + i * spotSpacing;
                ctx.moveTo(bx, botParkingLaneY);
                ctx.lineTo(bx, botParkingLaneY + 6);
            }
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.restore();
        }
        function drawRoads() {
            const parkingX = STATION_X + (STATION_WIDTH - PARKING_WIDTH) / 2;
            ctx.lineJoin = 'round';
            ctx.lineCap = 'square';
            ctx.strokeStyle = COLORS.parkingAsphalt;
            ctx.lineWidth = 20;
            ctx.beginPath();
            ctx.moveTo(parkingX + PARKING_WIDTH - 10, TOP_ROAD_Y);
            ctx.lineTo(topCol3X, TOP_ROAD_Y);
            ctx.lineTo(topCol3X, topRow14Y);
            ctx.lineTo(topCol13X, topRow14Y);
            ctx.lineTo(topCol13X, TOP_ROAD_Y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(topCol3X, topMiddleRowY);
            ctx.lineTo(topCol13X, topMiddleRowY);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(parkingX + 10, botRow4Y);
            ctx.lineTo(botCol3X, botRow4Y);
            ctx.lineTo(botCol3X, botRow14Y);
            ctx.lineTo(botCol13X, botRow14Y);
            ctx.lineTo(botCol13X, botRow4Y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(botCol3X, botMiddleRowY);
            ctx.lineTo(botCol13X, botMiddleRowY);
            ctx.stroke();
            ctx.strokeStyle = COLORS.parkingLine;
            ctx.lineWidth = 2;
            ctx.setLineDash([8, 8]);
            ctx.beginPath();
            ctx.moveTo(parkingX, TOP_ROAD_Y);
            ctx.lineTo(topCol3X, TOP_ROAD_Y);
            ctx.lineTo(topCol3X, topRow14Y);
            ctx.lineTo(topCol13X, topRow14Y);
            ctx.lineTo(topCol13X, TOP_ROAD_Y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(topCol3X, topMiddleRowY);
            ctx.lineTo(topCol13X, topMiddleRowY);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(parkingX + PARKING_WIDTH, botRow4Y);
            ctx.lineTo(botCol3X, botRow4Y);
            ctx.lineTo(botCol3X, botRow14Y);
            ctx.lineTo(botCol13X, botRow14Y);
            ctx.lineTo(botCol13X, botRow4Y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(botCol3X, botMiddleRowY);
            ctx.lineTo(botCol13X, botMiddleRowY);
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.lineJoin = 'miter';
            ctx.lineCap = 'butt';
        }
        function drawQuarryBlocks() {
            const drawBlocks = (blocks) => {
                for (let b of blocks) {
                    if (b.active) {
                        ctx.fillStyle = COLORS.quarryMain;
                        ctx.fillRect(b.x, b.y, BLOCK_SIZE, BLOCK_SIZE);
                        ctx.fillStyle = COLORS.quarryMid;
                        ctx.fillRect(b.x + 3, b.y + 3, BLOCK_SIZE - 6, BLOCK_SIZE - 6);
                        ctx.fillStyle = COLORS.quarryDeep;
                        ctx.fillRect(b.x + 7, b.y + 7, BLOCK_SIZE - 14, BLOCK_SIZE - 14);
                    } else {
                        ctx.fillStyle = COLORS.quarryDeep;
                        ctx.fillRect(b.x, b.y, BLOCK_SIZE, BLOCK_SIZE);
                    }
                    ctx.strokeStyle = COLORS.quarryOutline;
                    ctx.lineWidth = 2;
                    ctx.strokeRect(b.x, b.y, BLOCK_SIZE, BLOCK_SIZE);
                }
            };
            drawBlocks(topBlocks);
            drawBlocks(bottomBlocks);
        }
        function drawStations() {
            const parkingX = STATION_X + (STATION_WIDTH - PARKING_WIDTH) / 2;
            const spotSpacing = PARKING_WIDTH / 5;
            const lineHeight = 21;
            ctx.fillStyle = COLORS.stationPlatform;
            ctx.fillRect(STATION_X, TOP_Y - 30, STATION_WIDTH, 26);
            ctx.fillStyle = COLORS.stationBuilding;
            ctx.fillRect(STATION_X, TOP_Y - 30 - 78, STATION_WIDTH, 78);
            ctx.fillStyle = COLORS.parkingAsphalt;
            ctx.fillRect(parkingX, topParkingY, PARKING_WIDTH, PARKING_HEIGHT);
            ctx.strokeStyle = COLORS.parkingLine;
            ctx.lineWidth = 3;
            let lineTopY = topParkingY + (PARKING_HEIGHT - lineHeight) / 2;
            let lineBotY = topParkingY + PARKING_HEIGHT;
            for (let i = 1; i < 5; i++) {
                ctx.beginPath();
                ctx.moveTo(parkingX + i * spotSpacing, lineTopY);
                ctx.lineTo(parkingX + i * spotSpacing, lineBotY);
                ctx.stroke();
            }
            ctx.setLineDash([5, 5]);
            ctx.strokeStyle = '#e0e0e0';
            ctx.lineWidth = 3;
            ctx.strokeRect(TOP_FORKLIFT_HOME_X - 10, TOP_FORKLIFT_HOME_Y - 18, 24, 38);
            ctx.setLineDash([]);
            ctx.fillStyle = COLORS.stationPlatform;
            ctx.fillRect(STATION_X, BOTTOM_Y + 4, STATION_WIDTH, 26);
            ctx.fillStyle = COLORS.stationBuilding;
            ctx.fillRect(STATION_X, BOTTOM_Y + 4 + 26, STATION_WIDTH, 78);
            ctx.fillStyle = COLORS.parkingAsphalt;
            ctx.fillRect(parkingX, bottomParkingY, PARKING_WIDTH, PARKING_HEIGHT);
            lineTopY = bottomParkingY;
            lineBotY = bottomParkingY + (PARKING_HEIGHT - lineHeight) / 2 + lineHeight;
            for (let i = 1; i < 5; i++) {
                ctx.beginPath();
                ctx.moveTo(parkingX + i * spotSpacing, lineTopY);
                ctx.lineTo(parkingX + i * spotSpacing, lineBotY);
                ctx.stroke();
            }
            ctx.setLineDash([5, 5]);
            ctx.strokeRect(BOTTOM_FORKLIFT_HOME_X - 14, BOTTOM_FORKLIFT_HOME_Y - 20, 24, 38);
            ctx.setLineDash([]);
        }
        function drawStorages() {
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 4;
            ctx.strokeRect(TOP_STORAGE_X, TOP_STORAGE_Y, STORAGE_WIDTH, STORAGE_HEIGHT);
            ctx.fillStyle = '#222222';
            ctx.fillRect(TOP_STORAGE_X + 4, TOP_STORAGE_Y + 4, STORAGE_WIDTH - 8, STORAGE_HEIGHT - 8);
            ctx.strokeRect(BOTTOM_STORAGE_X, BOTTOM_STORAGE_Y, STORAGE_WIDTH, STORAGE_HEIGHT);
            ctx.fillRect(BOTTOM_STORAGE_X + 4, BOTTOM_STORAGE_Y + 4, STORAGE_WIDTH - 8, STORAGE_HEIGHT - 8);
            const cols = 5;
            const cellStep = 14;
            for (let i = 0; i < topStorageCount; i++) {
                const sx = TOP_STORAGE_X + 5 + (i % cols) * cellStep;
                const sy = TOP_STORAGE_Y + 5 + Math.floor(i / cols) * cellStep;
                ctx.fillStyle = COLORS.quarryMain;
                ctx.fillRect(sx, sy, 13, 13);
                ctx.fillStyle = COLORS.quarryMid;
                ctx.fillRect(sx + 2, sy + 2, 9, 9);
                ctx.fillStyle = COLORS.quarryDeep;
                ctx.fillRect(sx + 5, sy + 5, 3, 3);
            }
            for (let i = 0; i < bottomStorageCount; i++) {
                const sx = BOTTOM_STORAGE_X + 5 + (i % cols) * cellStep;
                const sy = BOTTOM_STORAGE_Y + 5 + Math.floor(i / cols) * cellStep;
                ctx.fillStyle = COLORS.quarryMain;
                ctx.fillRect(sx, sy, 13, 13);
                ctx.fillStyle = COLORS.quarryMid;
                ctx.fillRect(sx + 2, sy + 2, 9, 9);
                ctx.fillStyle = COLORS.quarryDeep;
                ctx.fillRect(sx + 5, sy + 5, 3, 3);
            }
        }
        function drawRails() {
            ctx.lineWidth = 26;
            ctx.strokeStyle = COLORS.trackBed;
            ctx.beginPath();
            ctx.moveTo(LEFT_CX, TOP_Y);
            ctx.lineTo(RIGHT_CX, TOP_Y);
            ctx.arc(RIGHT_CX, CENTER_Y, CURVE_RADIUS, -Math.PI / 2, Math.PI / 2);
            ctx.lineTo(LEFT_CX, BOTTOM_Y);
            ctx.arc(LEFT_CX, CENTER_Y, CURVE_RADIUS, Math.PI / 2, 3 * Math.PI / 2);
            ctx.stroke();
            ctx.lineWidth = 4;
            ctx.strokeStyle = COLORS.rail;
            ctx.beginPath();
            ctx.moveTo(LEFT_CX, TOP_Y - 8);
            ctx.lineTo(RIGHT_CX, TOP_Y - 8);
            ctx.moveTo(LEFT_CX, TOP_Y + 8);
            ctx.lineTo(RIGHT_CX, TOP_Y + 8);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(RIGHT_CX, BOTTOM_Y - 8);
            ctx.lineTo(LEFT_CX, BOTTOM_Y - 8);
            ctx.moveTo(RIGHT_CX, BOTTOM_Y + 8);
            ctx.lineTo(LEFT_CX, BOTTOM_Y + 8);
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(RIGHT_CX, CENTER_Y, CURVE_RADIUS - 8, -Math.PI / 2, Math.PI / 2);
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(RIGHT_CX, CENTER_Y, CURVE_RADIUS + 8, -Math.PI / 2, Math.PI / 2);
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(LEFT_CX, CENTER_Y, CURVE_RADIUS - 8, Math.PI / 2, 3 * Math.PI / 2);
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(LEFT_CX, CENTER_Y, CURVE_RADIUS + 8, Math.PI / 2, 3 * Math.PI / 2);
            ctx.stroke();
        }
        function drawEngine(x, y, angle) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle);
            ctx.fillStyle = COLORS.engineWheel;
            ctx.fillRect(-17, -12, 9, 6);
            ctx.fillRect(6, -12, 9, 6);
            ctx.fillRect(-17, 6, 9, 6);
            ctx.fillRect(6, 6, 9, 6);
            ctx.fillStyle = COLORS.engineBody;
            ctx.fillRect(-TRAIN_LENGTH / 2, -TRAIN_WIDTH / 2, TRAIN_LENGTH, TRAIN_WIDTH);
            ctx.fillStyle = COLORS.engineFront;
            ctx.fillRect(TRAIN_LENGTH / 2 - 11, -TRAIN_WIDTH / 2 + 2, 11, TRAIN_WIDTH - 4);
            ctx.restore();
        }
        function drawCarriage(x, y, angle, hasBlock) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle);
            ctx.fillStyle = COLORS.carriageWheel;
            ctx.fillRect(-CARRIAGE_LENGTH / 2 + 6, -13, 8, 5);
            ctx.fillRect(CARRIAGE_LENGTH / 2 - 14, -13, 8, 5);
            ctx.fillRect(-CARRIAGE_LENGTH / 2 + 6, 8, 8, 5);
            ctx.fillRect(CARRIAGE_LENGTH / 2 - 14, 8, 8, 5);
            ctx.fillStyle = COLORS.carriageBody;
            ctx.fillRect(-CARRIAGE_LENGTH / 2, -CARRIAGE_WIDTH / 2, CARRIAGE_LENGTH, CARRIAGE_WIDTH);
            ctx.fillStyle = COLORS.carriageInner;
            ctx.fillRect(-(CARRIAGE_LENGTH - 7) / 2, -(CARRIAGE_WIDTH - 5) / 2, CARRIAGE_LENGTH - 7, CARRIAGE_WIDTH - 5);
            if (hasBlock) {
                ctx.fillStyle = COLORS.quarryMain;
                ctx.fillRect(-6, -6, 13, 13);
                ctx.fillStyle = COLORS.quarryMid;
                ctx.fillRect(-4, -4, 9, 9);
                ctx.fillStyle = COLORS.quarryDeep;
                ctx.fillRect(-1, -1, 3, 3);
            }
            ctx.restore();
        }
        let lastTime = 0;
        function animate(timestamp) {
            if (!lastTime) lastTime = timestamp;
            let dt = (timestamp - lastTime) / 1000;
            if (dt > 0.1) dt = 0.1;
            lastTime = timestamp;
            let d = distance % TOTAL_TRACK_LENGTH;
            let dist1 = (STOP_DIST_1 - d + TOTAL_TRACK_LENGTH) % TOTAL_TRACK_LENGTH;
            let dist2 = (STOP_DIST_2 - d + TOTAL_TRACK_LENGTH) % TOTAL_TRACK_LENGTH;
            let closestDist = Math.min(dist1, dist2);
            if (closestDist < BRAKE_DISTANCE && trainState !== 'STOPPED' && trainState !== 'ACCELERATING') {
                trainState = 'DECELERATING';
                currentSpeed = Math.max(8, baseSpeed * Math.pow(closestDist / BRAKE_DISTANCE, 0.78));
                if (closestDist < 2) {
                    currentSpeed = 0;
                    trainState = 'STOPPED';
                    trainAtStation = (dist1 < dist2) ? 'top' : 'bottom';
                    trainStopTimer = 999;
                }
            } else if (trainState === 'STOPPED') {
                let readyToDepart = false;
                if (trainAtStation === 'top') {
                    const isFullyLoaded = trainBlocks.every(b => b);
                    const craneReady = cranes[0].isReady();
                    readyToDepart = isFullyLoaded && craneReady;
                } else if (trainAtStation === 'bottom') {
                    const isFullyEmptied = !trainBlocks.some(b => b);
                    const craneReady = cranes[1].isReady();
                    readyToDepart = isFullyEmptied && craneReady;
                }
                if (readyToDepart) {
                    trainState = 'ACCELERATING';
                    trainAtStation = null;
                }
            } else if (trainState === 'ACCELERATING') {
                currentSpeed = Math.min(baseSpeed, currentSpeed + ACCELERATION_RATE * dt);
                if (currentSpeed >= baseSpeed) {
                    currentSpeed = baseSpeed;
                    trainState = 'MOVING';
                    trainAtStation = null;
                }
            }
            distance += currentSpeed * dt;
            for (let t of trucks) t.update(dt);
            for (let f of forklifts) f.update(dt);
            for (let c of cranes) c.update(dt);
            ctx.clearRect(0, 0, WIDTH, HEIGHT);
            ctx.fillStyle = COLORS.grass;
            ctx.fillRect(0, 0, WIDTH, HEIGHT);
            drawRoads();
            drawQuarryBlocks();
            drawStorages();
            drawStations();
            for (let t of trucks) t.draw();
            for (let f of forklifts) f.draw();
            drawRails();
            const enginePos = getPosition(distance);
            const carriage1Pos = getPosition(distance - CARRIAGE_SEPARATION);
            const carriage2Pos = getPosition(distance - CARRIAGE_SEPARATION * 2);
            const carriage3Pos = getPosition(distance - CARRIAGE_SEPARATION * 3);
            const carriage4Pos = getPosition(distance - CARRIAGE_SEPARATION * 4);
            const carriage5Pos = getPosition(distance - CARRIAGE_SEPARATION * 5);
            drawCarriage(carriage5Pos.x, carriage5Pos.y, carriage5Pos.angle, trainBlocks[4]);
            drawCarriage(carriage4Pos.x, carriage4Pos.y, carriage4Pos.angle, trainBlocks[3]);
            drawCarriage(carriage3Pos.x, carriage3Pos.y, carriage3Pos.angle, trainBlocks[2]);
            drawCarriage(carriage2Pos.x, carriage2Pos.y, carriage2Pos.angle, trainBlocks[1]);
            drawCarriage(carriage1Pos.x, carriage1Pos.y, carriage1Pos.angle, trainBlocks[0]);
            drawEngine(enginePos.x, enginePos.y, enginePos.angle);
            for (let c of cranes) c.draw();
            for (let c of cranes) c.drawCross();
            requestAnimationFrame(animate);
        }
        window.onload = () => {
            initSim();
            requestAnimationFrame(animate);
        };
    </script>
</body>
