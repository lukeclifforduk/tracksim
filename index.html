<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Train & Truck SIM</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        body { margin: 0; padding: 0; background: #0a1f0a; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; image-rendering: pixelated; }
        canvas { border: 12px solid #222; box-shadow: 0 0 0 16px #1a3a1a; image-rendering: pixelated; background: #0a1f0a; }
    </style>
</head>
<body>
    <canvas id="canvas" width="1200" height="700"></canvas>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        // Canvas & track constants
        const WIDTH = 1200;
        const HEIGHT = 700;
        const CENTER_X = 600;
        const CENTER_Y = 350;
        const STRAIGHT_LENGTH = 410;
        const CURVE_RADIUS = 128;
        const LEFT_CX = CENTER_X - STRAIGHT_LENGTH / 2;
        const RIGHT_CX = CENTER_X + STRAIGHT_LENGTH / 2;
        const TOP_Y = CENTER_Y - CURVE_RADIUS;
        const BOTTOM_Y = CENTER_Y + CURVE_RADIUS;
        const TOTAL_TRACK_LENGTH = 2 * STRAIGHT_LENGTH + 2 * Math.PI * CURVE_RADIUS;
        // Train & carriage dimensions
        const TRAIN_LENGTH = 42;
        const TRAIN_WIDTH = 20;
        const CARRIAGE_LENGTH = 26;
        const CARRIAGE_WIDTH = 22;
        const CARRIAGE_SEPARATION = 36;
        // Train Speed and State
        let baseSpeed = 265;
        let currentSpeed = baseSpeed;
        let trainState = 'MOVING';
        let trainStopTimer = 0;
        let distance = 120;
        let trainAtStation = null;
        const STOP_DIST_1 = 310;
        const STOP_DIST_2 = STOP_DIST_1 + STRAIGHT_LENGTH + Math.PI * CURVE_RADIUS;
        const BRAKE_DISTANCE = 185;
        const ACCELERATION_RATE = 135;
        // Station & Parking settings
        const STATION_X = 529;
        const STATION_WIDTH = 142;
        const PARKING_WIDTH = 110;
        const PARKING_HEIGHT = 55;
        const topParkingY = TOP_Y - 30 - 78 - PARKING_HEIGHT - 4;
        const TOP_ROAD_Y = topParkingY + PARKING_HEIGHT / 2;
        const bottomParkingY = BOTTOM_Y + 4 + 26 + 78 + 6;
        const BOTTOM_ROAD_Y = bottomParkingY + PARKING_HEIGHT / 2;
        // Storage areas
        const STORAGE_WIDTH = 92;
        const STORAGE_HEIGHT = 98;
        const TOP_STORAGE_X = STATION_X - 108;
        const TOP_STORAGE_Y = TOP_Y - 128;
        const BOTTOM_STORAGE_X = STATION_X + STATION_WIDTH + 18;
        const BOTTOM_STORAGE_Y = BOTTOM_Y + 29;
        const STORAGE_CAPACITY = 20;
        let topStorageCount = 0;
        let bottomStorageCount = 0;
        let trainBlocks = [false, false, false, false, false];
        // Quarry settings
        const BLOCK_SIZE = 18;
        const QUARRY_MAX_ROWS = 18;
        const BOTTOM_QUARRY_MAX_ROWS = 18;
        const QUARRY_OFFSET_X = 12;
        const QUARRY_OFFSET_Y = TOP_ROAD_Y - 81;
        const BOTTOM_QUARRY_OFFSET_X = WIDTH - 12 - BLOCK_SIZE;
        const BOTTOM_QUARRY_OFFSET_Y = BOTTOM_ROAD_Y + 45 + BLOCK_SIZE;
        // PERMANENT TOP QUARRY LAYOUT (unchanged)
        const TOP_QUARRY_COLS_PER_ROW = [18, 19, 19, 18, 17, 18, 17, 16, 15, 15, 14, 13, 12, 12, 11, 10, 9, 4];
        // Colors
        const COLORS = {
            grass: '#2e8b57', trackBed: '#2c2c2c', rail: '#e8e8e8',
            engineBody: '#1e90ff', engineFront: '#ff4757', engineWheel: '#1c2526',
            carriageBody: '#a8b0b8', carriageInner: '#5f6a72', carriageWheel: '#1c2526',
            quarryMain: '#d4c3a8', quarryMid: '#b9a98f', quarryDeep: '#9e8a6f', quarryOutline: '#5c5340',
            stationBuilding: '#7a7a8a', stationPlatform: '#a8a8b8',
            parkingAsphalt: '#3f3f3f', parkingLine: '#e0e0e0',
            truckCab: '#e69900', truckTrailer: '#cc5500', truckWindow: '#add8e6',
            forkliftBody: '#ffcc00', forkliftForks: '#bbbbbb',
            craneBase: '#555555', craneArm: '#333333',
            forkliftPath: 'rgba(230, 230, 230, 0.35)'
        };
        const topBlocks = [];
        const bottomBlocks = [];
        const trucks = [];
        let forklifts = [];
        let cranes = [];
        const TOP_FORKLIFT_HOME_X = STATION_X + 41;
        const TOP_FORKLIFT_HOME_Y = TOP_Y - 72;
        const BOTTOM_FORKLIFT_HOME_X = STATION_X + 41;
        const BOTTOM_FORKLIFT_HOME_Y = BOTTOM_Y + 48;
        // Road coordinates used by trucks
        const topRow4Y = TOP_ROAD_Y;
        const topRow14Y = QUARRY_OFFSET_Y + 14 * BLOCK_SIZE + 9;
        const topMiddleRowY = QUARRY_OFFSET_Y + 9 * BLOCK_SIZE + 9;
        const topCol3X = QUARRY_OFFSET_X + 3 * BLOCK_SIZE + 9;
        const topCol13X = QUARRY_OFFSET_X + 13 * BLOCK_SIZE + 9;
        // BOTTOM QUARRY ROAD – true mirror of top quarry (same row indices 4, 9, 14)
        // Row 4 is the outer horizontal (connects to parking road) - aligns with BOTTOM_ROAD_Y
        // Row 14 is the inner horizontal (far from station)
        // Row 9 is the middle shortcut; verticals at col 3 and col 13 span rows 4..14
        const botRow4Y = BOTTOM_ROAD_Y; // outer horizontal at the parking road edge
        const botRow14Y = BOTTOM_QUARRY_OFFSET_Y - 14 * BLOCK_SIZE + 9; // inner horizontal
        const botMiddleRowY = BOTTOM_QUARRY_OFFSET_Y - 9 * BLOCK_SIZE + 9; // middle shortcut
        const botCol3X = BOTTOM_QUARRY_OFFSET_X - 3 * BLOCK_SIZE + 9;
        const botCol13X = BOTTOM_QUARRY_OFFSET_X - 13 * BLOCK_SIZE + 9;
        function isTopRoadBlock(row, col) {
            if (row === 4 && col >= 3) return true;
            if (row === 14 && col >= 3 && col <= 13) return true;
            if (row === 9 && col >= 3 && col <= 13) return true;
            if (col === 3 && row >= 4 && row <= 14) return true;
            if (col === 13 && row >= 4 && row <= 14) return true;
            return false;
        }
        function isBottomRoadBlock(row, col) {
            if (row === 4 && col >= 3) return true; // outer horizontal (connects to parking)
            if (row === 14 && col >= 3 && col <= 13) return true; // inner horizontal (far)
            if (row === 9 && col >= 3 && col <= 13) return true; // middle shortcut
            if (col === 3 && row >= 4 && row <= 14) return true; // left vertical
            if (col === 13 && row >= 4 && row <= 14) return true; // right vertical
            return false;
        }
        function initSim() {
            topBlocks.length = 0;
            bottomBlocks.length = 0;
            trucks.length = 0;
            forklifts.length = 0;
            cranes.length = 0;
            // Top Quarry – permanent exact layout (unchanged)
            for (let row = 0; row < QUARRY_MAX_ROWS; row++) {
                const numCols = TOP_QUARRY_COLS_PER_ROW[row];
                for (let col = 0; col < numCols; col++) {
                    if (isTopRoadBlock(row, col)) continue;
                    topBlocks.push({ x: QUARRY_OFFSET_X + col * BLOCK_SIZE, y: QUARRY_OFFSET_Y + row * BLOCK_SIZE, active: true });
                }
            }
            // Bottom Quarry – exact mirrored layout with your requested road changes
            for (let row = 0; row < BOTTOM_QUARRY_MAX_ROWS; row++) {
                const numCols = TOP_QUARRY_COLS_PER_ROW[row];
                for (let col = 0; col < numCols; col++) {
                    if (isBottomRoadBlock(row, col)) continue;
                    bottomBlocks.push({
                        x: BOTTOM_QUARRY_OFFSET_X - col * BLOCK_SIZE,
                        y: BOTTOM_QUARRY_OFFSET_Y - row * BLOCK_SIZE,
                        active: false
                    });
                }
            }
            for (let i = 0; i < 5; i++) {
                trucks.push(new Truck('top', i));
                trucks.push(new Truck('bottom', i));
            }
            topStorageCount = 0;
            bottomStorageCount = 0;
            trainBlocks = [false, false, false, false, false];
            trainAtStation = null;
            forklifts = [new Forklift('top'), new Forklift('bottom')];
            cranes = [new Crane('top'), new Crane('bottom')];
        }
        class Truck {
            constructor(type, index) {
                this.type = type;
                this.index = index;
                this.state = 'PARKED';
                this.timer = Math.random() * 4 + 1;
                this.scanTimer = 0;
                const spotSpacing = PARKING_WIDTH / 5;
                const parkingX = STATION_X + (STATION_WIDTH - PARKING_WIDTH) / 2;
                this.parkX = parkingX + spotSpacing * 0.5 + index * spotSpacing;
                if (this.type === 'top') {
                    this.parkY = topParkingY + PARKING_HEIGHT / 2;
                    this.angle = Math.PI / 2;
                } else {
                    this.parkY = bottomParkingY + PARKING_HEIGHT / 2;
                    this.angle = -Math.PI / 2;
                }
                this.x = this.parkX;
                this.y = this.parkY;
                this.route = [];
                this.routeIndex = 0;
                this.hasBlock = false;
                this.speed = 65;
            }
            update(dt) {
                switch (this.state) {
                    case 'PARKED':
                        this.timer -= dt;
                        if (this.timer <= 0) {
                            if (this.type === 'top') {
                                if (this.hasBlock) { this.timer = 0.5; return; }
                                if (topStorageCount >= STORAGE_CAPACITY) { this.timer = 1.0; return; }
                            }
                            if (this.type === 'bottom' && !this.hasBlock) { this.timer = 0.8; return; }
                            this.state = 'DRIVING';
                            if (this.type === 'top') {
                                const useShortcut = Math.random() < 0.5;
                                if (useShortcut) {
                                    this.route = [
                                        {x: topCol13X, y: topRow4Y},
                                        {x: topCol3X, y: topRow4Y},
                                        {x: topCol3X, y: topMiddleRowY},
                                        {x: topCol13X, y: topMiddleRowY},
                                        {x: topCol13X, y: topRow4Y},
                                        {x: this.parkX, y: this.parkY}
                                    ];
                                } else {
                                    this.route = [
                                        {x: topCol13X, y: topRow4Y},
                                        {x: topCol3X, y: topRow4Y},
                                        {x: topCol3X, y: topRow14Y},
                                        {x: topCol13X, y: topRow14Y},
                                        {x: topCol13X, y: topRow4Y},
                                        {x: this.parkX, y: this.parkY}
                                    ];
                                }
                            } else {
                                const useShortcut = Math.random() < 0.5;
                                if (useShortcut) {
                                    this.route = [
                                        {x: botCol13X, y: botRow4Y},
                                        {x: botCol3X, y: botRow4Y},
                                        {x: botCol3X, y: botMiddleRowY},
                                        {x: botCol13X, y: botMiddleRowY},
                                        {x: botCol13X, y: botRow4Y},
                                        {x: this.parkX, y: this.parkY}
                                    ];
                                } else {
                                    this.route = [
                                        {x: botCol13X, y: botRow4Y},
                                        {x: botCol3X, y: botRow4Y},
                                        {x: botCol3X, y: botRow14Y},
                                        {x: botCol13X, y: botRow14Y},
                                        {x: botCol13X, y: botRow4Y},
                                        {x: this.parkX, y: this.parkY}
                                    ];
                                }
                            }
                            this.routeIndex = 0;
                            this.targetX = this.route[0].x;
                            this.targetY = this.route[0].y;
                        }
                        break;
                    case 'DRIVING':
                        if (this.moveToTarget(dt)) {
                            this.routeIndex++;
                            if (this.routeIndex >= this.route.length) {
                                this.angle = this.type === 'top' ? Math.PI / 2 : -Math.PI / 2;
                                this.state = 'PARKED';
                                this.timer = Math.random() * 3 + 1.5;
                            } else {
                                this.targetX = this.route[this.routeIndex].x;
                                this.targetY = this.route[this.routeIndex].y;
                            }
                        }
                        if (this.type === 'bottom' && this.hasBlock && this.routeIndex >= 1 && this.routeIndex <= 3) {
                            let candidates = [];
                            let nearest = null;
                            let nearestDist = Infinity;
                            for (let b of bottomBlocks) {
                                if (b.active) continue;
                                const dist = Math.hypot((b.x + BLOCK_SIZE / 2) - this.x, (b.y + BLOCK_SIZE / 2) - this.y);
                                if (dist <= 5 * BLOCK_SIZE) candidates.push(b);
                                if (dist < nearestDist) { nearestDist = dist; nearest = b; }
                            }
                            let chosen = null;
                            if (candidates.length > 0) chosen = candidates[Math.floor(Math.random() * candidates.length)];
                            else if (nearest) chosen = nearest;
                            if (chosen) { chosen.active = true; this.hasBlock = false; }
                        }
                        if (this.type === 'top' && !this.hasBlock && this.routeIndex >= 1 && this.routeIndex <= 4) {
                            this.scanTimer -= dt;
                            if (this.scanTimer <= 0) {
                                this.scanTimer = 0.2;
                                let closest = null;
                                let minDist = 120;
                                for (let b of topBlocks) {
                                    if (b.active) {
                                        const dist = Math.hypot(b.x + BLOCK_SIZE/2 - this.x, b.y + BLOCK_SIZE/2 - this.y);
                                        if (dist <= minDist) { minDist = dist; closest = b; }
                                    }
                                }
                                if (closest) {
                                    closest.active = false;
                                    this.hasBlock = true;
                                    this.state = 'LOADING';
                                    this.timer = 1.0;
                                }
                            }
                        }
                        break;
                    case 'LOADING':
                        this.timer -= dt;
                        if (this.timer <= 0) this.state = 'DRIVING';
                        break;
                }
            }
            moveToTarget(dt) {
                let blocked = false;
                for (let ot of trucks) {
                    if (ot.type !== this.type || ot === this) continue;
                    if (ot.state !== 'LOADING') continue;
                    const dx = ot.x - this.x;
                    const dy = ot.y - this.y;
                    const distToOther = Math.hypot(dx, dy);
                    if (distToOther < 42 && distToOther > 8) {
                        const dot = Math.cos(this.angle) * dx + Math.sin(this.angle) * dy;
                        if (dot > 10) { blocked = true; break; }
                    }
                }
                if (blocked) return false;
                const dx = this.targetX - this.x;
                const dy = this.targetY - this.y;
                const dist = Math.hypot(dx, dy);
                if (dist < 2) {
                    this.x = this.targetX;
                    this.y = this.targetY;
                    return true;
                }
                this.angle = Math.atan2(dy, dx);
                const move = Math.min(this.speed * dt, dist);
                this.x += Math.cos(this.angle) * move;
                this.y += Math.sin(this.angle) * move;
                return false;
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                ctx.fillStyle = COLORS.truckTrailer;
                ctx.fillRect(-22, -7, 16, 14);
                ctx.fillStyle = '#444';
                ctx.fillRect(-6, -2, 4, 4);
                ctx.fillStyle = COLORS.truckCab;
                ctx.fillRect(-2, -5, 10, 10);
                ctx.fillStyle = COLORS.truckWindow;
                ctx.fillRect(4, -3, 3, 6);
                ctx.fillStyle = COLORS.engineWheel;
                ctx.fillRect(-18, -9, 6, 2);
                ctx.fillRect(-18, 7, 6, 2);
                ctx.fillRect(0, -7, 6, 2);
                ctx.fillRect(0, 5, 6, 2);
                if (this.hasBlock) {
                    ctx.fillStyle = COLORS.quarryMain;
                    ctx.fillRect(-19, -5, 10, 10);
                    ctx.fillStyle = COLORS.quarryMid;
                    ctx.fillRect(-17, -3, 6, 6);
                }
                ctx.restore();
            }
        }
        class Forklift {
            constructor(type) {
                this.type = type;
                this.state = 'HOME';
                this.idleTimer = 0;
                this.carrying = false;
                this.speed = 62;
                this.nextTask = null;
                this.targetTruck = null;
                if (type === 'top') {
                    this.homeX = TOP_FORKLIFT_HOME_X;
                    this.homeY = TOP_FORKLIFT_HOME_Y;
                    this.homeAngle = Math.PI / 2;
                } else {
                    this.homeX = BOTTOM_FORKLIFT_HOME_X;
                    this.homeY = BOTTOM_FORKLIFT_HOME_Y;
                    this.homeAngle = -Math.PI / 2;
                }
                this.x = this.homeX;
                this.y = this.homeY;
                this.angle = this.homeAngle;
                this.path = [];
                this.pathIndex = 0;
                this.departureAngle = 0;
            }
            buildPathTo(destX, destY, destAngle) {
                const path = [];
                const spineX = STATION_X + 41;
                const topStationCY = TOP_Y - 72;
                const botStationCY = BOTTOM_Y + 48;
                const topParkingLaneY = topParkingY + PARKING_HEIGHT / 2;
                const botParkingLaneY = bottomParkingY + PARKING_HEIGHT / 2;
                if (this.type === 'top') {
                    const destIsStorage = destX < STATION_X;
                    const destIsParking = destY < TOP_Y - 50 && destX >= STATION_X - 5;
                    path.push({x: spineX, y: topStationCY});
                    if (destIsStorage) {
                        path.push({x: destX, y: topStationCY});
                        path.push({x: destX, y: destY});
                    } else if (destIsParking) {
                        path.push({x: spineX, y: topParkingLaneY});
                        path.push({x: destX, y: topParkingLaneY});
                        path.push({x: destX, y: destY});
                    } else {
                        path.push({x: destX, y: destY});
                    }
                } else {
                    const destIsStorage = destX > STATION_X + STATION_WIDTH;
                    const destIsParking = destY > BOTTOM_Y + 90 && destX <= STATION_X + STATION_WIDTH + 5;
                    path.push({x: spineX, y: botStationCY});
                    if (destIsStorage) {
                        path.push({x: destX, y: botStationCY});
                        path.push({x: destX, y: destY});
                    } else if (destIsParking) {
                        path.push({x: spineX, y: botParkingLaneY});
                        path.push({x: destX, y: botParkingLaneY});
                        path.push({x: destX, y: destY});
                    } else {
                        path.push({x: destX, y: destY});
                    }
                }
                const cleaned = [];
                for (const p of path) {
                    if (cleaned.length === 0 || Math.hypot(p.x - cleaned[cleaned.length - 1].x, p.y - cleaned[cleaned.length - 1].y) > 2) cleaned.push(p);
                }
                this.path = cleaned;
                this.pathIndex = 0;
                this.departureAngle = destAngle;
            }
            update(dt) {
                if (this.state === 'HOME' || this.state === 'IDLE') {
                    if (this.state === 'IDLE' && this.idleTimer > 0) {
                        this.idleTimer -= dt;
                        return;
                    }
                    this.findNextTask();
                } else if (this.state === 'MOVING') {
                    if (this.followPath(dt)) this.arriveAtTarget();
                } else if (this.state === 'WORKING') {
                    this.timer -= dt;
                    if (this.timer <= 0) this.completeWork();
                } else if (this.state === 'GOING_HOME') {
                    if (this.followPath(dt)) {
                        this.x = this.homeX;
                        this.y = this.homeY;
                        this.angle = this.homeAngle;
                        this.state = 'HOME';
                    }
                }
            }
            findNextTask() {
                if (this.type === 'top') {
                    if (topStorageCount >= STORAGE_CAPACITY) { this.goHomeIfNotThere(); return; }
                    for (let t of trucks) {
                        if (t.type === 'top' && t.state === 'PARKED' && t.hasBlock) {
                            this.targetTruck = t;
                            this.nextTask = 'UNLOAD_TRUCK';
                            this.buildPathTo(t.x, t.y, Math.PI / 2);
                            this.state = 'MOVING';
                            return;
                        }
                    }
                    this.goHomeIfNotThere();
                } else {
                    if (bottomStorageCount <= 0) { this.goHomeIfNotThere(); return; }
                    let hasEmptyTruck = trucks.some(t => t.type === 'bottom' && t.state === 'PARKED' && !t.hasBlock);
                    if (!hasEmptyTruck) { this.goHomeIfNotThere(); return; }
                    for (let t of trucks) {
                        if (t.type === 'bottom' && t.state === 'PARKED' && !t.hasBlock) {
                            this.targetTruck = t;
                            this.nextTask = 'PICK_STORAGE';
                            this.buildPathTo(BOTTOM_STORAGE_X + 43, BOTTOM_STORAGE_Y + 24, -Math.PI / 2);
                            this.state = 'MOVING';
                            return;
                        }
                    }
                    this.goHomeIfNotThere();
                }
            }
            goHomeIfNotThere() {
                const atHome = Math.abs(this.x - this.homeX) < 3 && Math.abs(this.y - this.homeY) < 3;
                if (atHome) { this.state = 'HOME'; this.angle = this.homeAngle; return; }
                this.buildPathTo(this.homeX, this.homeY, this.homeAngle);
                this.state = 'GOING_HOME';
            }
            followPath(dt) {
                if (this.pathIndex >= this.path.length) return true;
                const wp = this.path[this.pathIndex];
                const dx = wp.x - this.x;
                const dy = wp.y - this.y;
                const dist = Math.hypot(dx, dy);
                if (dist < 3) {
                    this.x = wp.x;
                    this.y = wp.y;
                    this.pathIndex++;
                    if (this.pathIndex >= this.path.length) return true;
                    return false;
                }
                this.angle = Math.atan2(dy, dx);
                const move = Math.min(this.speed * dt, dist);
                this.x += Math.cos(this.angle) * move;
                this.y += Math.sin(this.angle) * move;
                return false;
            }
            arriveAtTarget() {
                this.state = 'WORKING';
                this.timer = 0.75;
            }
            completeWork() {
                if (this.type === 'top') {
                    if (this.nextTask === 'UNLOAD_TRUCK') {
                        if (this.targetTruck && this.targetTruck.hasBlock) {
                            this.targetTruck.hasBlock = false;
                            this.carrying = true;
                        }
                        this.targetTruck = null;
                        this.nextTask = 'DROP_STORAGE';
                        this.buildPathTo(TOP_STORAGE_X + STORAGE_WIDTH / 2 - 6, TOP_STORAGE_Y + STORAGE_HEIGHT / 2, Math.PI);
                        this.state = 'MOVING';
                    } else if (this.nextTask === 'DROP_STORAGE') {
                        if (this.carrying) topStorageCount = Math.min(STORAGE_CAPACITY, topStorageCount + 1);
                        this.carrying = false;
                        this.nextTask = null;
                        this.state = 'IDLE';
                        this.idleTimer = 0.35;
                        this.angle = this.departureAngle;
                    }
                } else {
                    if (this.nextTask === 'PICK_STORAGE') {
                        if (bottomStorageCount > 0) {
                            bottomStorageCount--;
                            this.carrying = true;
                        }
                        let truck = null;
                        let minDist = 999;
                        for (let t of trucks) {
                            if (t.type === 'bottom' && t.state === 'PARKED' && !t.hasBlock) {
                                const d = Math.hypot(t.x - this.x, t.y - this.y);
                                if (d < minDist) { minDist = d; truck = t; }
                            }
                        }
                        if (truck) {
                            this.targetTruck = truck;
                            this.nextTask = 'DELIVER_TRUCK';
                            this.buildPathTo(truck.x, truck.y, -Math.PI / 2);
                            this.state = 'MOVING';
                        } else {
                            if (this.carrying) { bottomStorageCount++; this.carrying = false; }
                            this.state = 'IDLE';
                            this.idleTimer = 0.35;
                            this.angle = this.departureAngle;
                        }
                    } else if (this.nextTask === 'DELIVER_TRUCK') {
                        if (this.targetTruck && this.targetTruck.state === 'PARKED' && !this.targetTruck.hasBlock && this.carrying) {
                            this.targetTruck.hasBlock = true;
                            this.targetTruck.timer = 0.2;
                        } else if (this.carrying) {
                            bottomStorageCount = Math.min(STORAGE_CAPACITY, bottomStorageCount + 1);
                        }
                        this.carrying = false;

                    currentSpeed = 0;
                    trainState = 'STOPPED';
                    trainAtStation = (dist1 < dist2) ? 'top' : 'bottom';
                    trainStopTimer = 999;
                }
            } else if (trainState === 'STOPPED') {
                let readyToDepart = false;
                if (trainAtStation === 'top') {
                    const isFullyLoaded = trainBlocks.every(b => b);
                    const craneReady = cranes[0].isReady();
                    readyToDepart = isFullyLoaded && craneReady;
                } else if (trainAtStation === 'bottom') {
                    const isFullyEmptied = !trainBlocks.some(b => b);
                    const craneReady = cranes[1].isReady();
                    readyToDepart = isFullyEmptied && craneReady;
                }
                if (readyToDepart) {
                    trainState = 'ACCELERATING';
                    trainAtStation = null;
                }
            } else if (trainState === 'ACCELERATING') {
                currentSpeed = Math.min(baseSpeed, currentSpeed + ACCELERATION_RATE * dt);
                if (currentSpeed >= baseSpeed) {
                    currentSpeed = baseSpeed;
                    trainState = 'MOVING';
                    trainAtStation = null;
                }
            }
            distance += currentSpeed * dt;
            for (let t of trucks) t.update(dt);
            for (let f of forklifts) f.update(dt);
            for (let c of cranes) c.update(dt);
            ctx.clearRect(0, 0, WIDTH, HEIGHT);
            ctx.fillStyle = COLORS.grass;
            ctx.fillRect(0, 0, WIDTH, HEIGHT);
            drawRoads();
            drawForkliftPaths();
            drawQuarryBlocks();
            drawStations();
            drawStorages();
            for (let t of trucks) t.draw();
            for (let f of forklifts) f.draw();
            for (let c of cranes) c.draw();
            drawRails();
            const enginePos = getPosition(distance);
            const carriage1Pos = getPosition(distance - CARRIAGE_SEPARATION);
            const carriage2Pos = getPosition(distance - CARRIAGE_SEPARATION * 2);
            const carriage3Pos = getPosition(distance - CARRIAGE_SEPARATION * 3);
            const carriage4Pos = getPosition(distance - CARRIAGE_SEPARATION * 4);
            const carriage5Pos = getPosition(distance - CARRIAGE_SEPARATION * 5);
            drawCarriage(carriage5Pos.x, carriage5Pos.y, carriage5Pos.angle, trainBlocks[4]);
            drawCarriage(carriage4Pos.x, carriage4Pos.y, carriage4Pos.angle, trainBlocks[3]);
            drawCarriage(carriage3Pos.x, carriage3Pos.y, carriage3Pos.angle, trainBlocks[2]);
            drawCarriage(carriage2Pos.x, carriage2Pos.y, carriage2Pos.angle, trainBlocks[1]);
            drawCarriage(carriage1Pos.x, carriage1Pos.y, carriage1Pos.angle, trainBlocks[0]);
            drawEngine(enginePos.x, enginePos.y, enginePos.angle);
            requestAnimationFrame(animate);
        }
        window.onload = () => {
            initSim();
            requestAnimationFrame(animate);
        };
    </script>
</body>
</html>
