<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Test Town</title>
  <style>
    body { margin: 0; background: #222; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; image-rendering: pixelated; }
    canvas { display: block; image-rendering: pixelated; }
  </style>
</head>
<body>
<canvas id="c" width="1200" height="750"></canvas>
<script>
'use strict';

// ── Constants ──────────────────────────────────────────────────────────────
const W = 1200, H = 750;
const GRID = 18;
const WALK_SPEED = 28;
const CAR_SPEED  = 50;

// Town footprint: X=0-270, Y=444-750
const TX = 0,   TY = 444;
const TW = 270, TH = 306;

// Bakery block: X=0-126 (fixed), Y=TY to TY+126 (but interior shifted)
const BAKERY_X = 0,   BAKERY_Y = TY;
const BAKERY_W = 126, BAKERY_H = 126;

// Road Y coordinates
const MAIN_Y  = TY + 126;  // 570
const CRES1_Y = MAIN_Y + 54;
const CRES2_Y = CRES1_Y + 54;
const CRES3_Y = CRES2_Y + 54;

// Road X coordinates – FULL ROAD NETWORK SHIFTED RIGHT BY ONE GRID UNIT
const WPERIM_X = 0;
const SPINE_X  = 144;
const EPERIM_X = 270;
const NORTH_X  = 144;

// Left-hand traffic lane offset
const LANE = 4;

// Road centre lines
const MAIN_CY  = MAIN_Y  + GRID / 2;
const CRES1_CY = CRES1_Y + GRID / 2;
const CRES2_CY = CRES2_Y + GRID / 2;
const CRES3_CY = CRES3_Y + GRID / 2;
const WPERIM_CX = WPERIM_X + GRID / 2;
const SPINE_CX  = SPINE_X  + GRID / 2;
const EPERIM_CX = EPERIM_X + GRID / 2;

// Residential rows (houses shifted right by one grid)
const ROWS = [
  { gardenY: MAIN_Y + GRID, houseY: MAIN_Y + GRID*2, crescentY: CRES1_Y },
  { gardenY: CRES1_Y + GRID, houseY: CRES1_Y + GRID*2, crescentY: CRES2_Y },
  { gardenY: CRES2_Y + GRID, houseY: CRES2_Y + GRID*2, crescentY: CRES3_Y },
];

const BLDG_XS = [36, 72, 108, 162, 198, 234];
let ROW_VARIANTS = [];

function genRowVariants() {
  const v = ['drv', 'drv', 'drv', 'drv', 'drv', 'drv'];
  const eligible = [1, 2, 3, 4].sort(() => Math.random() - 0.5);
  const count = 1 + Math.floor(Math.random() * 2);
  const placed = [];
  for (const pos of eligible) {
    if (!placed.some(q => Math.abs(q - pos) <= 1)) {
      v[pos] = 'std';
      placed.push(pos);
      if (placed.length >= count) break;
    }
  }
  return v;
}

function initVariants() {
  ROW_VARIANTS = [genRowVariants(), genRowVariants(), genRowVariants()];
}

// ── Colour palettes ───────────────────────────────────────────────────────
const PALETTE = ['#b25a3c','#c9a043','#6a8e5a','#3d7c8c','#5a6a8e','#8e3d4a','#6a4d7a','#d9c9a3','#4a6e4a','#a87a4a','#c46a3a','#7a8e3c','#4a7a9e','#9e5a3c','#6e4a8e','#b89060','#3c6e5a','#8e7a3c','#5a3c6e','#7a9e7a','#c4824a','#4a6e8e','#8e4a5a','#6e8e4a','#a84a6a','#5a7a4a','#9e7a5a','#4a5a8e','#8e6a4a','#6a4a3c'];
const BED_PALETTE = ['#e8b89a','#f0d890','#b8d4a8','#90c4d8','#b0b8d8','#d8a0a8','#b8a0d0','#f4ecd8','#98c298','#d4b898','#f0c098','#c4d898','#90bcd8','#d8a888','#b898d8','#e8d0a8','#90bca8','#d8c890','#a890c0','#c0d8c0','#f0c098','#90b8d8','#d898a8','#b8d898','#e098b8','#a8c498','#d8c0a8','#9098c8','#d8b898','#b898a0'];

// ── Sprites ────────────────────────────────────────────────────────────────
const PERSON_BASE = [['_','P','P','P','_'],['_','P','P','P','_'],['_','P','P','P','_'],['_','S','S','S','_'],['_','S','S','S','_'],['_','S','S','S','_'],['_','B','B','B','_'],['_','B','B','B','_']];
const PERSON_WALK = [['_','P','P','P','_'],['_','P','P','P','_'],['_','P','P','P','_'],['_','S','S','S','_'],['_','S','S','S','_'],['_','S','S','S','_'],['_','B','B','B','_'],['B','_','_','_','B']];

const CAR_BASE = [['_','_','K','K','_','_','_','_','_','K','K','_','_','_'],['D','B','B','B','B','B','B','B','B','B','B','B','D','_'],['D','B','B','B','B','B','B','B','B','B','B','B','D','_'],['D','B','B','B','B','B','B','B','W','W','W','W','D','_'],['D','B','B','B','B','B','B','B','W','W','W','W','D','_'],['D','B','B','B','B','B','B','B','W','W','W','W','D','_'],['D','B','B','B','B','B','B','B','B','B','B','B','D','_'],['D','B','B','B','B','B','B','B','B','B','B','B','D','_'],['_','_','K','K','_','_','_','_','_','K','K','_','_','_']];

function rotateSprite(s) {
  const rows = s.length, cols = s[0].length;
  const out = Array.from({length: cols}, () => Array(rows).fill('_'));
  for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++) out[c][rows - 1 - r] = s[r][c];
  return out;
}
const CAR_E = CAR_BASE;
const CAR_S = rotateSprite(CAR_E);
const CAR_W = rotateSprite(CAR_S);
const CAR_N = rotateSprite(CAR_W);
const CAR_SPRITES = { E: CAR_E, S: CAR_S, W: CAR_W, N: CAR_N };

// ── Canvas ─────────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// ── Global state ───────────────────────────────────────────────────────────
let homes = [], people = [], BUILDING_BOXES = [], PED_NODES = [], ALL_NODES = [], lastT = null;
let bakery = null;

// ── FPS tracking ──────────────────────────────────────────────────────────
let _fps = 60, _fpsTimer = 0, _fpsFrames = 0;
function updateFps(dt) {
  _fpsFrames++; _fpsTimer += dt;
  if (_fpsTimer >= 0.5) { _fps = Math.round(_fpsFrames / _fpsTimer); _fpsFrames = 0; _fpsTimer = 0; }
}

// ── Animation loop ────────────────────────────────────────────────────────
function animate(ts) {
  const dt = lastT === null ? 0 : Math.min((ts - lastT) / 1000, 0.1);
  lastT = ts;
  updateFps(dt);
  update(dt);
  draw();
  requestAnimationFrame(animate);
}

// ── Draw helpers ───────────────────────────────────────────────────────────
function dashedLine(x1, y1, x2, y2) {
  ctx.save();
  ctx.strokeStyle = '#e0e0e0'; ctx.lineWidth = 1; ctx.setLineDash([6, 6]);
  ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
  ctx.setLineDash([]); ctx.restore();
}

function road(x, y, w, h, cx, cy, cx2, cy2) {
  ctx.fillStyle = '#3f3f3f';
  ctx.fillRect(x, y, w, h);
  if (cx !== undefined) dashedLine(cx, cy, cx2 !== undefined ? cx2 : cx, cy2 !== undefined ? cy2 : cy);
}

// ── Draw: grass ────────────────────────────────────────────────────────────
function drawGrass() {
  ctx.fillStyle = '#2e8b57';
  ctx.fillRect(0, 0, W, H);
}

// ── Draw: all roads (fully shifted) ────────────────────────────────────────
function drawRoads() {
  road(NORTH_X, 0, GRID, MAIN_Y, SPINE_CX, 0, SPINE_CX, MAIN_Y);
  road(TX, MAIN_Y, W, GRID, TX, MAIN_CY, W, MAIN_CY);
  road(WPERIM_X, MAIN_Y, GRID, CRES3_Y + GRID - MAIN_Y, WPERIM_CX, MAIN_Y, WPERIM_CX, CRES3_Y + GRID);
  road(EPERIM_X, MAIN_Y, GRID, CRES3_Y + GRID - MAIN_Y, EPERIM_CX, MAIN_Y, EPERIM_CX, CRES3_Y + GRID);
  road(SPINE_X, MAIN_Y, GRID, CRES3_Y + GRID - MAIN_Y, SPINE_CX, MAIN_Y, SPINE_CX, CRES3_Y + GRID);
  road(TX, CRES1_Y, TW, GRID, TX, CRES1_CY, TX + TW, CRES1_CY);
  road(TX, CRES2_Y, TW, GRID, TX, CRES2_CY, TX + TW, CRES2_CY);
  road(TX, CRES3_Y, TW, GRID, TX, CRES3_CY, TX + TW, CRES3_CY);
}

// ── Bakery building constants (NEW LAYOUT: door row fixed, everything else shifted up 1 block + new internal floor row) ──────────────────────────
function bkRowY(r) { 
  // Door row (r=0) stays at original position
  // All other rows shifted up by GRID and one extra internal floor row inserted
  if (r === 0) return MAIN_Y - GRID;
  return MAIN_Y - (r + 2) * GRID; // +2 because we inserted one row and shifted everything up
}

function bkColX(c) { return (c - 1) * GRID; }

const BK_FULL_X = 0;
const BK_FULL_Y = MAIN_Y - 11 * GRID; // extended up by one extra row
const BK_FULL_W = 8 * GRID;
const BK_FULL_H = 11 * GRID; // interior now 7 rows + yard 4 rows

const BK_INT_Y = MAIN_Y - 7 * GRID; // interior now 7 rows high
const BK_INT_H = 7 * GRID;

const BK_YARD_Y = MAIN_Y - 11 * GRID;
const BK_YARD_H = 4 * GRID;

// Key locations (adjusted for new row numbering)
const BK_OVEN1_X = bkColX(8), BK_OVEN1_Y = bkRowY(4);  // ovens now on row 4 (shifted)
const BK_OVEN2_X = bkColX(8), BK_OVEN2_Y = bkRowY(3);
const BK_JIGGER_HOME_X = bkColX(8) + 9, BK_JIGGER_HOME_Y = bkRowY(6) + 9; // jigger home on new top interior row
const BK_LANE1_CX = bkColX(5) + 9;
const BK_LANE2_CX = bkColX(7) + 9;
const BK_SERVER_X = bkColX(6) + 9, BK_SERVER_Y = bkRowY(2) + 9; // server post on display row
const BK_BAKER_ENTRY_X = bkColX(4) + 9, BK_BAKER_ENTRY_Y = bkRowY(0) + 9;

// ── Storage cells – NEW LAYOUT ─────────────────────────────────────────────
// Top storage row (row 6, closest to trucks): only columns 1-4 are storage, columns 5-8 are internal floor
const BK_STORAGE_CELLS = [];
// Row 6 (top storage, closest to trucks): cols 1-4 only
for (let c = 1; c <= 4; c++) {
  BK_STORAGE_CELLS.push({ x: bkColX(c), y: bkRowY(6), cx: bkColX(c)+9, cy: bkRowY(6)+9, row: 6, col: c, isStorage: true });
}
// Rows 3-5: full storage (cols 1-5)
for (let r = 3; r <= 5; r++) {
  for (let c = 1; c <= 5; c++) {
    BK_STORAGE_CELLS.push({ x: bkColX(c), y: bkRowY(r), cx: bkColX(c)+9, cy: bkRowY(r)+9, row: r, col: c, isStorage: true });
  }
}
// Row 2: display row (bread V cells) – not storage
// Row 1: new internal bakery floor row – no storage
// Row 0: doors

// Bread display V cells (row 2)
const BK_V_CELLS = [];
for (let c = 1; c <= 6; c++) BK_V_CELLS.push({ x: bkColX(c), y: bkRowY(2), col: c, active: c <= 5 });

// Tables & chairs in door row (row 0)
const BK_FURNITURE = [
  // Left side: chair table chair
  { type: 'chair', x: bkColX(1) + 4, y: bkRowY(0) + 10 },
  { type: 'table', x: bkColX(2) + 4, y: bkRowY(0) + 8 },
  { type: 'chair', x: bkColX(3) + 4, y: bkRowY(0) + 10 },
  // Doors (cols 4-5)
  // Right side: chair table chair
  { type: 'chair', x: bkColX(6) + 4, y: bkRowY(0) + 10 },
  { type: 'table', x: bkColX(7) + 4, y: bkRowY(0) + 8 },
  { type: 'chair', x: bkColX(8) + 4, y: bkRowY(0) + 10 }
];

// Truck definitions (standard asphalt with tarmac lanes)
const BK_TRUCK_DEFS = [
  { x: bkColX(4), y: bkRowY(10), w: GRID, h: 4*GRID, palletCols: 1, palletRows: 4, large: true },
  { x: bkColX(6), y: bkRowY(10), w: GRID, h: 4*GRID, palletCols: 1, palletRows: 4, large: true },
  { x: bkColX(8), y: bkRowY(9), w: GRID, h: 3*GRID, palletCols: 1, palletRows: 3, large: false }
];

// ── Draw: public area (bakery interior + redesigned truck yard) ───────────
function drawPublicArea() {
  if (!bakery) return;

  // Truck yard tarmac (full asphalt surface with generous lanes)
  ctx.fillStyle = '#3c3c3c';
  ctx.fillRect(bkColX(4), BK_YARD_Y, 5 * GRID, BK_YARD_H);

  // Asphalt bay markings with tarmac space between trucks
  ctx.strokeStyle = '#707070'; ctx.lineWidth = 1;
  ctx.strokeRect(bkColX(4) + 1, bkRowY(10) + 1, GRID - 2, 4*GRID - 2);
  ctx.strokeRect(bkColX(6) + 1, bkRowY(10) + 1, GRID - 2, 4*GRID - 2);
  ctx.strokeRect(bkColX(8) + 1, bkRowY(9) + 1, GRID - 2, 3*GRID - 2);

  // Extra tarmac lanes for jigger movement
  ctx.fillStyle = '#4a4a4a';
  ctx.fillRect(bkColX(5) + 2, BK_YARD_Y + 2, GRID - 4, BK_YARD_H - 4);
  ctx.fillRect(bkColX(7) + 2, BK_YARD_Y + 2, GRID - 4, BK_YARD_H - 4);

  // Dividing wall
  ctx.fillStyle = '#8b7355';
  ctx.fillRect(bkColX(4) - 2, BK_INT_Y, 3, BK_INT_H);

  // Building interior floor (now 7 rows high)
  ctx.fillStyle = '#d4c49a';
  ctx.fillRect(bkColX(1), BK_INT_Y, 8 * GRID, BK_INT_H);

  // Storage cells (only valid storage cells)
  for (const sc of bakery.storageGrid) {
    if (!sc.isStorage) continue;
    const count = sc.flourCount || 0;
    ctx.fillStyle = count > 0 ? '#c8a868' : '#bca87a';
    ctx.fillRect(sc.x + 1, sc.y + 1, GRID - 2, GRID - 2);
    if (count > 0) {
      ctx.fillStyle = '#d4b88a';
      ctx.fillRect(sc.x + 2.5, sc.y + 2.5, GRID - 5, GRID - 5);
      ctx.strokeStyle = '#6b5238'; ctx.lineWidth = 2;
      ctx.strokeRect(sc.x + 1, sc.y + 1, GRID - 2, GRID - 2);
      // Draw individual flour blocks (up to 4)
      for (let i = 0; i < count; i++) {
        const fx = sc.x + 4 + (i % 2) * 6;
        const fy = sc.y + 4 + Math.floor(i / 2) * 6;
        ctx.fillStyle = '#f8f8f8';
        ctx.fillRect(fx, fy, 2, 3);
        ctx.fillStyle = '#e0e0e0';
        ctx.fillRect(fx + 0.5, fy + 0.5, 1, 2);
      }
    } else {
      ctx.strokeStyle = '#a8946a';
      ctx.strokeRect(sc.x + 1, sc.y + 1, GRID - 2, GRID - 2);
    }
  }

  // Bread display V cells (row 2)
  for (const vc of BK_V_CELLS) {
    ctx.fillStyle = '#b89050';
    ctx.fillRect(vc.x + 1, vc.y + 1, GRID - 2, GRID - 2);
    ctx.strokeStyle = '#7a5a28';
    ctx.strokeRect(vc.x + 1, vc.y + 1, GRID - 2, GRID - 2);
    if (vc.active) {
      const vcIdx = vc.col - 1;
      for (let si = 0; si < 4; si++) {
        const slotIdx = vcIdx * 4 + si;
        if (slotIdx < bakery.breadCount) {
          const sx = vc.x + 2 + (si % 2) * 7;
          const sy = vc.y + 2 + Math.floor(si / 2) * 7;
          ctx.fillStyle = '#d4a044';
          ctx.fillRect(sx, sy, 6, 6);
          ctx.fillStyle = '#f0c060';
          ctx.fillRect(sx + 1, sy + 1, 3, 2);
        }
      }
    }
  }

  // New internal bakery floor row (row 1) – plain floor
  ctx.fillStyle = '#d4c49a';
  ctx.fillRect(bkColX(1), bkRowY(1), 8 * GRID, GRID);

  // Furniture in door row (row 0)
  ctx.fillStyle = '#8b5a30';
  for (const f of BK_FURNITURE) {
    if (f.type === 'table') {
      ctx.fillRect(f.x, f.y, 10, 8);
      ctx.strokeStyle = '#5a3a1a'; ctx.lineWidth = 2;
      ctx.strokeRect(f.x, f.y, 10, 8);
    } else if (f.type === 'chair') {
      ctx.fillRect(f.x + 2, f.y + 2, 6, 8);
      ctx.fillStyle = '#5a3a1a';
      ctx.fillRect(f.x + 3, f.y + 6, 4, 2);
      ctx.fillStyle = '#8b5a30';
    }
  }

  // Doors (row 0)
  ctx.fillStyle = '#7a4a28';
  ctx.fillRect(bkColX(4) + 2, bkRowY(0) + 2, GRID - 4, GRID - 4);
  ctx.fillRect(bkColX(5) + 2, bkRowY(0) + 2, GRID - 4, GRID - 4);
  ctx.strokeStyle = '#5a3a1a';
  ctx.strokeRect(bkColX(4) + 2, bkRowY(0) + 2, GRID - 4, GRID - 4);
  ctx.strokeRect(bkColX(5) + 2, bkRowY(0) + 2, GRID - 4, GRID - 4);

  // Ovens (on shifted rows)
  for (let i = 0; i < 2; i++) {
    const ov = bakery.ovens[i];
    if (ov.baking) {
      const alpha = 0.25 + 0.2 * Math.sin(ov.glowPhase);
      const grd = ctx.createRadialGradient(ov.x + 9, ov.y + 9, 2, ov.x + 9, ov.y + 9, 16);
      grd.addColorStop(0, `rgba(255,140,0,${alpha + 0.3})`);
      grd.addColorStop(1, 'rgba(255,80,0,0)');
      ctx.fillStyle = grd;
      ctx.fillRect(ov.x - 7, ov.y - 7, GRID + 14, GRID + 14);
    }
    ctx.fillStyle = '#5a3520';
    ctx.fillRect(ov.x + 1, ov.y + 1, GRID - 2, GRID - 2);
    ctx.fillStyle = ov.baking ? '#ff6000' : '#1a0a00';
    ctx.fillRect(ov.x + 4, ov.y + 4, GRID - 8, GRID - 8);
    ctx.strokeStyle = '#8b5a30';
    ctx.strokeRect(ov.x + 1, ov.y + 1, GRID - 2, GRID - 2);
    if (ov.loafReady) {
      ctx.fillStyle = '#c4803a';
      ctx.fillRect(ov.x + 3, ov.y - 5, GRID - 6, 5);
      ctx.fillStyle = '#e8a050';
      ctx.fillRect(ov.x + 5, ov.y - 4, GRID - 10, 2);
    }
  }

  // Building outline
  ctx.strokeStyle = '#5a4a36'; ctx.lineWidth = 2;
  ctx.strokeRect(bkColX(1), BK_INT_Y, 8 * GRID, BK_INT_H);

  drawBakeryTrucks();
  drawJigger();
}

function drawBakeryTrucks() {
  if (!bakery) return;
  for (let ti = 0; ti < bakery.trucks.length; ti++) {
    const tr = bakery.trucks[ti];
    const def = BK_TRUCK_DEFS[ti];
    ctx.fillStyle = tr.large ? '#4a6080' : '#607080';
    ctx.fillRect(tr.x, tr.y, tr.w, tr.h);
    ctx.fillStyle = tr.large ? '#3a5070' : '#506070';
    ctx.fillRect(tr.x, tr.y, tr.w, Math.min(8, tr.h));
    ctx.fillStyle = '#9ad6e8';
    ctx.fillRect(tr.x + 2, tr.y + 2, tr.w - 4, 4);
    ctx.fillStyle = '#6a8090';
    ctx.fillRect(tr.x, tr.y + tr.h - 4, tr.w, 4);
    const palW = tr.w / def.palletCols;
    const palH = tr.h / def.palletRows;
    let idx = 0;
    for (let pr = def.palletRows - 1; pr >= 0; pr--) {
      for (let pc = 0; pc < def.palletCols; pc++) {
        const px = tr.x + pc * palW + 1;
        const py = tr.y + (tr.h - (pr + 1) * palH) + 1;
        if (tr.pallets[idx]) {
          ctx.fillStyle = '#d4b88a';
          ctx.fillRect(px, py, palW - 2, palH - 2);
          ctx.strokeStyle = '#6b5238'; ctx.lineWidth = 1;
          ctx.strokeRect(px, py, palW - 2, palH - 2);
          // Draw 4 flour blocks on pallet
          for (let i = 0; i < 4; i++) {
            const fx = px + 2 + (i % 2) * 6;
            const fy = py + 2 + Math.floor(i / 2) * 6;
            ctx.fillStyle = '#f8f8f8';
            ctx.fillRect(fx, fy, 2, 3);
            ctx.fillStyle = '#e0e0e0';
            ctx.fillRect(fx + 0.5, fy + 0.5, 1, 2);
          }
        }
        idx++;
      }
    }
    ctx.strokeStyle = '#2a3a4a';
    ctx.strokeRect(tr.x, tr.y, tr.w, tr.h);
  }
}

function drawJigger() {
  if (!bakery) return;
  const jg = bakery.jigger;
  const jx = Math.floor(jg.x), jy = Math.floor(jg.y);
  ctx.save();
  ctx.translate(jx, jy);
  const rot = { N: -Math.PI/2, S: Math.PI/2, E: 0, W: Math.PI }[jg.heading] || 0;
  ctx.rotate(rot);
  ctx.fillStyle = '#cc2222';
  ctx.fillRect(4, -3, 7, 2);
  ctx.fillRect(4, 1, 7, 2);
  ctx.fillStyle = '#dd3333';
  ctx.fillRect(-4, -3, 8, 6);
  ctx.fillStyle = '#bb1111';
  ctx.fillRect(-8, -1, 4, 2);
  ctx.fillRect(-10, -4, 2, 3);
  ctx.fillRect(-10, 1, 2, 3);
  if (jg.palletLoaded) {
    ctx.fillStyle = '#d4b88a';
    ctx.fillRect(-4, -5, 8, 10);
    ctx.strokeStyle = '#6b5238';
    ctx.strokeRect(-4, -5, 8, 10);
    // Draw 4 flour blocks on jigger pallet
    for (let i = 0; i < 4; i++) {
      const fx = -3 + (i % 2) * 6;
      const fy = -3 + Math.floor(i / 2) * 6;
      ctx.fillStyle = '#f8f8f8';
      ctx.fillRect(fx, fy, 2, 3);
      ctx.fillStyle = '#e0e0e0';
      ctx.fillRect(fx + 0.5, fy + 0.5, 1, 2);
    }
  }
  ctx.restore();
}

// ── Remaining draw functions (unchanged except road shift) ────────────────
function drawParkingBays() {
  for (let ri = 0; ri < 3; ri++) {
    const cy = ROWS[ri].crescentY;
    for (let bi = 0; bi < BLDG_XS.length; bi++) {
      if (ROW_VARIANTS[ri][bi] !== 'std') continue;
      const bx = BLDG_XS[bi];
      for (let half = 0; half < 2; half++) {
        const hx = bx + half * 18;
        ctx.fillStyle = '#505050';
        ctx.fillRect(hx + 1, cy + 1, 16, 8);
        ctx.strokeStyle = '#e0e0e0';
        ctx.strokeRect(hx + 1, cy + 1, 16, 8);
      }
    }
  }
}

function drawGardens() {
  for (const h of homes) {
    const { gardenRect: g, gate, variant, half } = h;

    ctx.fillRect(g.x, g.y, g.w, g.h);

}

function drawHouses() {
  for (const h of homes) {
    const { houseRect: hr, doorX, doorY } = h;

    ctx.strokeRect(hr.hx, hr.hy, hr.hw, hr.hh);
    ctx.fillStyle = '#c4956a';
    ctx.fillRect(hr.hx, hr.hy, hr.hw, 3);

function drawBed(h) {
  ctx.fillStyle = h.bedColor;
  ctx.fillRect(h.bedX, h.bedY, 6, 8);

  ctx.fillRect(h.bedX, h.bedY, 6, 3);
}

function drawPersonSprite(px, py, skin, walking, sleeping) {
  const sprite = walking ? PERSON_WALK : PERSON_BASE;
  const drawX = Math.floor(px - 2), drawY = Math.floor(py - 4);
  const dim = sleeping ? 0.7 : 1.0;
  function dc(hex) {
    const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    return `rgb(${Math.floor(r*dim)},${Math.floor(g*dim)},${Math.floor(b*dim)})`;
  }
  const cm = { P: dc(skin.headColor), S: dc(skin.shirtColor), B: dc('#1a1a1a') };
  for (let r = 0; r < sprite.length; r++)
    for (let c = 0; c < sprite[r].length; c++) {
      const k = sprite[r][c]; if (k === '_') continue;
      ctx.fillStyle = cm[k]; ctx.fillRect(drawX+c, drawY+r, 1, 1);
    }
}

function drawCarSprite(cx, cy, heading, carColor, moving = false) {
  const sprite = CAR_SPRITES[heading] || CAR_SPRITES['E'];
  const sw = sprite[0].length, sh = sprite.length;
  let drawX = Math.floor(cx - sw/2), drawY = Math.floor(cy - sh/2);
  if (moving) {
    if (heading === 'E') drawY -= LANE;
    else if (heading === 'W') drawY += LANE;
    else if (heading === 'S') drawX += LANE;
    else if (heading === 'N') drawX -= LANE;
  }
  const cr = parseInt(carColor.slice(1,3),16), cg = parseInt(carColor.slice(3,5),16), cb = parseInt(carColor.slice(5,7),16);
  const darker = `rgb(${Math.floor(cr*0.6)},${Math.floor(cg*0.6)},${Math.floor(cb*0.6)})`;
  const cm = { B: carColor, D: darker, K: '#111111', W: '#9ad6e8' };
  for (let row = 0; row < sh; row++)
    for (let col = 0; col < sw; col++) {
      const k = sprite[row][col]; if (k === '_') continue;
      ctx.fillStyle = cm[k]; ctx.fillRect(drawX+col, drawY+row, 1, 1);
    }
}

function drawHUD() {
  const counts = {};

  const order = ['AT_HOME','SLEEPING','PACE','EXIT_HOUSE','WANDER','INTERACT','RETURN','ENTER_CAR','DRIVE','PARK_CAR'];

    lines.push(`Baker:  ${bakery.baker.bkState.replace('_',' ')}`);

  }
  const fw = 160, lh = 12, pad = 6;

  lines.forEach((l, i) => ctx.fillText(l, W - fw, 4 + pad + (i+1)*lh - 2));
}

function drawPeople() {
  for (const p of people) {
    if (!p.visible) continue;
    const walking = ['EXIT_HOUSE','WANDER','RETURN','PACE'].includes(p.state);
    drawPersonSprite(p.x, p.y, p.skin, walking && p.legFrame !== 2, p.state === 'SLEEPING');

const JIGGER_PUSH_STATES = new Set(['APPROACH_TRUCK','LOAD_PAUSE','CARRY_TO_STORAGE','DROP_PAUSE','RETURN_TO_LANE']);
const JIGGER_PUSH_OFFSET = { N:[0,7], S:[0,-7], E:[-7,0], W:[7,0] };

function drawBakeryActors() {

    if (isPushing) {

    const walking = !idleStates.has(actor.bkState) && actor.legFrame !== 2;

    const ix = Math.floor(drawX), iy = Math.floor(drawY);

      ctx.fillRect(ix - 3, iy - 10, 6, 4);
      ctx.fillStyle = '#e8a050';
      ctx.fillRect(ix - 2, iy - 9, 3, 2);

}

// ── Build homes (shifted) ─────────────────────────────────────────────────
function buildHomes() {
  homes = []; BUILDING_BOXES = [];
  let id = 0;
  for (let ri = 0; ri < 3; ri++) {
    const row = ROWS[ri];
    for (let bi = 0; bi < BLDG_XS.length; bi++) {
      const bx = BLDG_XS[bi];
      const variant = ROW_VARIANTS[ri][bi];
      BUILDING_BOXES.push({ x: bx, y: row.gardenY, w: 36, h: 36, bldgKey: `${ri}_${bi}` });
      for (let half = 0; half < 2; half++) {
        const hx = bx + half * 18;
        const hy = row.houseY;
        const gx = bx + half * 18;
        const gy = row.gardenY;
        const doorX = hx + 7, doorY = hy;
        const gate = { x: gx + 7, y: gy - 1, w: 4, h: 3 };
        const bedCorner = (bi + half) % 2;
        const bedX = bedCorner === 0 ? hx + 1 : hx + 11;
        const bedY = hy + 2;
        let parkingX, parkingY;
        if (variant === 'drv') {
          const dvx = half === 0 ? hx : hx + 9;
          parkingX = dvx - 5;
          parkingY = gy + 3;
        } else {
          parkingX = hx;
          parkingY = row.crescentY - 2;
        }
        const parkingHeading = variant === 'drv' ? 'S' : 'E';
        homes.push({
          id, rowIdx: ri, bldgInRow: bi, half, variant,
          houseRect: { hx, hy, hw: 18, hh: 18 },
          gardenRect: { x: gx, y: gy, w: 18, h: 18 },
          gate, doorX, doorY, bedX, bedY,
          parkingX, parkingY, parkingHeading,
          color: PALETTE[id % PALETTE.length],
          bedColor: BED_PALETTE[id % BED_PALETTE.length],
        });
        id++;
      }
    }
  }
}

// ── Geometry helpers (unchanged) ──────────────────────────────────────────
function distToRoads(x, y) {
  let min = Infinity;
  const ROAD_RECTS = [
    { x: NORTH_X, y: 0, w: GRID, h: MAIN_Y },
    { x: 0, y: MAIN_Y, w: W, h: GRID },
    { x: WPERIM_X, y: MAIN_Y, w: GRID, h: CRES3_Y + GRID - MAIN_Y },
    { x: EPERIM_X, y: MAIN_Y, w: GRID, h: CRES3_Y + GRID - MAIN_Y },
    { x: SPINE_X, y: MAIN_Y, w: GRID, h: CRES3_Y + GRID - MAIN_Y },
    { x: TX, y: CRES1_Y, w: TW, h: GRID },
    { x: TX, y: CRES2_Y, w: TW, h: GRID },
    { x: TX, y: CRES3_Y, w: TW, h: GRID },
  ];
  for (const r of ROAD_RECTS) {
    const cx = Math.max(r.x, Math.min(x, r.x + r.w));
    const cy = Math.max(r.y, Math.min(y, r.y + r.h));
    const d = Math.hypot(x - cx, y - cy);
    if (d < min) min = d;
  }
  return min;
}

function makeAxisAligned(startX, startY, waypoints) {
  const out = [];
  let cx = startX, cy = startY;
  for (const wp of waypoints) {
    if (Math.abs(wp.x - cx) > 0.5 && Math.abs(wp.y - cy) > 0.5) out.push({ x: wp.x, y: cy });
    out.push({ x: wp.x, y: wp.y });
    cx = wp.x; cy = wp.y;
  }
  return out;
}

function buildStreetNodes() {
  PED_NODES = []; ALL_NODES = [];
  for (let x = 0; x <= TW; x += GRID) { const n = { x, y: MAIN_CY }; PED_NODES.push(n); ALL_NODES.push(n); }
  for (let x = TW + GRID; x <= 900; x += GRID) { const n = { x, y: MAIN_CY }; PED_NODES.push(n); ALL_NODES.push(n); }
  for (let y = MAIN_CY - GRID; y >= 0; y -= GRID) ALL_NODES.push({ x: SPINE_CX, y });
  const carYs = [CRES1_CY, CRES2_CY, CRES3_CY];
  for (const cy of carYs) for (let x = 0; x <= TW; x += GRID) ALL_NODES.push({ x, y: cy });
  for (let y = MAIN_CY; y <= CRES3_CY + GRID; y += GRID) ALL_NODES.push({ x: SPINE_CX, y });
  for (let y = MAIN_CY; y <= CRES3_CY + GRID; y += GRID) ALL_NODES.push({ x: WPERIM_CX, y });
  for (let y = MAIN_CY; y <= CRES3_CY + GRID; y += GRID) ALL_NODES.push({ x: EPERIM_CX, y });
  for (let gx = 0; gx <= TW + 10 * GRID; gx += GRID) {
    for (let gy = 0; gy <= H; gy += GRID) {
      const onResBldg = BUILDING_BOXES.some(b => gx >= b.x && gx < b.x + b.w && gy >= b.y && gy < b.y + b.h);
      const onBakBldg = gx >= BK_FULL_X && gx < BK_FULL_X + BK_FULL_W && gy >= BK_FULL_Y && gy < BK_FULL_Y + BK_FULL_H;
      if (onResBldg || onBakBldg) continue;
      if (distToRoads(gx, gy) <= 8 * GRID) PED_NODES.push({ x: gx, y: gy });
    }
  }
}

function insideForeignBuilding(x, y, homeId) {
  if (x >= BK_FULL_X && x < BK_FULL_X + BK_FULL_W && y >= BK_FULL_Y && y < BK_FULL_Y + BK_FULL_H) return true;
  const h = homes[homeId];
  for (const box of BUILDING_BOXES) {
    if (box.bldgKey === `${h.rowIdx}_${h.bldgInRow}`) continue;
    if (x >= box.x && x < box.x + box.w && y >= box.y && y < box.y + box.h) return true;
  }
  return false;
}

function segCrossesBox(x1, y1, x2, y2, rx, ry, rw, rh) {
  function inside(x, y) { return x >= rx && x <= rx+rw && y >= ry && y <= ry+rh; }
  if (inside(x1, y1) || inside(x2, y2)) return true;
  function segSeg(ax,ay,bx,by,cx,cy,dx,dy) {
    const dax=bx-ax,day=by-ay,dcx=dx-cx,dcy=dy-cy;
    const d = dax*dcy - day*dcx; if (Math.abs(d)<1e-10) return false;
    const t = ((cx-ax)*dcy-(cy-ay)*dcx)/d;
    const s = ((cx-ax)*day-(cy-ay)*dax)/d;
    return t>=0&&t<=1&&s>=0&&s<=1;
  }
  return segSeg(x1,y1,x2,y2, rx,ry, rx+rw,ry) || segSeg(x1,y1,x2,y2, rx+rw,ry, rx+rw,ry+rh) || segSeg(x1,y1,x2,y2, rx+rw,ry+rh, rx,ry+rh) || segSeg(x1,y1,x2,y2, rx,ry+rh, rx,ry);
}

function pathClearForPed(x1, y1, x2, y2, homeId) {
  const h = homes[homeId];
  for (const box of BUILDING_BOXES) {
    if (box.bldgKey === `${h.rowIdx}_${h.bldgInRow}`) continue;
    if (segCrossesBox(x1, y1, x2, y2, box.x, box.y, box.w, box.h)) return false;
  }
  return !segCrossesBox(x1, y1, x2, y2, BK_FULL_X, BK_FULL_Y, BK_FULL_W, BK_FULL_H);
}

function randomPedNode(homeId, fromX, fromY) {
  for (let i = 0; i < 50; i++) {
    const n = PED_NODES[Math.floor(Math.random() * PED_NODES.length)];
    if (insideForeignBuilding(n.x, n.y, homeId)) continue;
    if (!pathClearForPed(fromX, fromY, n.x, n.y, homeId)) continue;
    return n;
  }
  const ms = PED_NODES.filter(n => Math.abs(n.y - MAIN_CY) < 1 && pathClearForPed(fromX, fromY, n.x, n.y, homeId));
  return ms.length ? ms[Math.floor(Math.random() * ms.length)] : PED_NODES[0];
}

// ── Drive paths ───────────────────────────────────────────────────────────
function exitRoadCY(h) {
  if (h.variant === 'drv') return h.rowIdx === 0 ? MAIN_CY : h.rowIdx === 1 ? CRES1_CY : CRES2_CY;
  return h.rowIdx === 0 ? CRES1_CY : h.rowIdx === 1 ? CRES2_CY : CRES3_CY;
}
function buildDrivePath(p) {
  const h = homes[p.homeId];
  const roadCY = exitRoadCY(h);
  const raw = [{ x: h.parkingX + 9, y: roadCY }, { x: SPINE_CX, y: roadCY }, { x: SPINE_CX, y: MAIN_CY }];
  const extra = 2 + Math.floor(Math.random() * 4);
  for (let i = 0; i < extra; i++) raw.push({ x: Math.round(Math.random() * (900 / GRID)) * GRID, y: MAIN_CY });
  return makeAxisAligned(p.car.x, p.car.y, raw);
}
function buildReturnDrivePath(p, destX, destY) {
  const h = homes[p.homeId];
  const roadCY = exitRoadCY(h);
  const raw = [{ x: SPINE_CX, y: MAIN_CY }, { x: SPINE_CX, y: roadCY }, { x: destX, y: roadCY }, { x: destX, y: destY }];
  return makeAxisAligned(p.car.x, p.car.y, raw);
}

// ── People ────────────────────────────────────────────────────────────────
function buildPeople() {
  people = [];
  for (const h of homes) {
    const spawnX = h.houseRect.hx + 9, spawnY = h.houseRect.hy + 9;
    people.push({
      id: h.id, homeId: h.id,
      x: spawnX, y: spawnY,
      state: 'AT_HOME', stateTimer: 0,
      path: [], paceIdx: 0,
      car: { x: h.parkingX + 9, y: h.parkingY + 6, parked: true, heading: h.parkingHeading, speed: CAR_SPEED },
      skin: { headColor: '#f4c2a1', shirtColor: h.color, carColor: h.color },
      legFrame: 0, moveDist: 0,
      tiredness: 0, tirednessTimer: 0, sleepOnReturn: false,
      visible: true, interactPartner: null, interactCooldown: 0,
    });
  }
}

// ── State machine (unchanged) ─────────────────────────────────────────────
function stepToward(obj, tx, ty, speed, dt) {
  const dx = tx - obj.x, dy = ty - obj.y;
  const dist = Math.hypot(dx, dy);
  if (dist < speed * dt + 0.5) { obj.x = tx; obj.y = ty; return true; }
  obj.x += (dx / dist) * speed * dt;
  obj.y += (dy / dist) * speed * dt;
  return false;
}

function carEffectiveSpeed(car) {
  for (const p of people) {
    if (!p.visible || ['AT_HOME','SLEEPING','PACE'].includes(p.state)) continue;
    const d = Math.hypot(p.x - car.x, p.y - car.y);
    if (d < 9) return 0;
    if (d < 18) return CAR_SPEED * 0.15;
  }
  return CAR_SPEED;
}

function updatePerson(p, dt) {
  const h = homes[p.homeId];
  if (p.interactCooldown > 0) p.interactCooldown = Math.max(0, p.interactCooldown - dt);
  if (p.state !== 'AT_HOME' && p.state !== 'SLEEPING') {
    p.tirednessTimer += dt;
    if (p.tirednessTimer >= 1) {
      p.tirednessTimer -= 1;
      p.tiredness = Math.min(100, p.tiredness + Math.floor(Math.random() * 3));
    }
    if (p.tiredness >= 100 && !p.sleepOnReturn) {
      p.sleepOnReturn = true;
      if (p.state === 'WANDER') startReturn(p, h);
    }
  }
  const px0 = p.x, py0 = p.y;
  switch (p.state) {
    case 'AT_HOME':
      p.x = h.houseRect.hx + 9; p.y = h.houseRect.hy + 9;
      if (Math.random() < 0.003) startExit(p, h);
      else if (Math.random() < 0.004) startPace(p, h);
      else if (Math.random() < 0.0015) startSleep(p, h);
      break;
    case 'SLEEPING':
      stepToward(p, h.bedX + 3, h.bedY + 4, WALK_SPEED, dt);
      p.stateTimer -= dt;
      if (p.stateTimer <= 0) { p.state = 'AT_HOME'; p.x = h.houseRect.hx + 9; p.y = h.houseRect.hy + 9; }
      break;
    case 'PACE':
      if (p.path.length === 0) { p.state = 'AT_HOME'; break; }
      const wp = p.path[0];
      if (stepToward(p, wp.x, wp.y, WALK_SPEED * 0.5, dt)) p.path.shift();
      break;
    case 'EXIT_HOUSE':
      if (p.path.length === 0) {
        if (Math.random() < 0.40 && p.car.parked) {
          p.state = 'ENTER_CAR';
          p.path = [{ x: h.parkingX + 9, y: h.parkingY + 6 }];
        } else {
          p.state = 'WANDER';
          p.path = [randomPedNode(p.homeId, p.x, p.y)];
        }
      } else if (stepToward(p, p.path[0].x, p.path[0].y, WALK_SPEED, dt)) p.path.shift();
      break;
    case 'WANDER':
      if (p.path.length === 0) {
        if (Math.random() < 0.02) { startReturn(p, h); break; }
        p.path = [randomPedNode(p.homeId, p.x, p.y)];
      } else if (stepToward(p, p.path[0].x, p.path[0].y, WALK_SPEED, dt)) p.path.shift();
      if (p.state === 'WANDER' && !p.interactPartner && p.interactCooldown === 0) {
        for (const q of people) {
          if (q === p || q.state !== 'WANDER' || q.interactPartner || q.interactCooldown > 0) continue;
          if (Math.hypot(q.x - p.x, q.y - p.y) < 12 && Math.random() < 0.007) {
            const dur = 4 + Math.random() * 3;
            p.state = 'INTERACT'; p.stateTimer = dur; p.interactPartner = q;
            q.state = 'INTERACT'; q.stateTimer = dur; q.interactPartner = p;
            p.path = []; q.path = [];
            break;
          }
        }
      }
      break;
    case 'INTERACT':
      p.stateTimer -= dt;
      if (p.stateTimer <= 0) {
        p.state = 'WANDER'; p.interactPartner = null;
        p.interactCooldown = 1.0;
        p.path = [randomPedNode(p.homeId, p.x, p.y)];
      }
      break;
    case 'RETURN':
      if (p.path.length === 0) {
        p.x = h.houseRect.hx + 9; p.y = h.houseRect.hy + 9;
        if (p.sleepOnReturn) { p.sleepOnReturn = false; startSleep(p, h); }
        else p.state = 'AT_HOME';
      } else if (stepToward(p, p.path[0].x, p.path[0].y, WALK_SPEED, dt)) p.path.shift();
      break;
    case 'ENTER_CAR':
      if (p.path.length === 0) {
        p.visible = false;
        p.car.parked = false;
        p.car.x = h.parkingX + 9; p.car.y = h.parkingY + 6;
        p.state = 'DRIVE';
        p.path = buildDrivePath(p);
      } else if (stepToward(p, p.path[0].x, p.path[0].y, WALK_SPEED, dt)) p.path.shift();
      break;
    case 'DRIVE':
      if (p.path.length === 0) {
        p.state = 'PARK_CAR';
        p.path = buildReturnDrivePath(p, h.parkingX + 9, h.parkingY + 6);
      } else {
        const spd = carEffectiveSpeed(p.car);
        const wp = p.path[0];
        const dx = wp.x - p.car.x, dy = wp.y - p.car.y;
        p.car.heading = Math.abs(dx) > Math.abs(dy) ? (dx > 0 ? 'E' : 'W') : (dy > 0 ? 'S' : 'N');
        if (stepToward(p.car, wp.x, wp.y, spd, dt)) p.path.shift();
      }
      break;
    case 'PARK_CAR':
      if (p.path.length === 0) {
        p.car.parked = true; p.car.heading = h.parkingHeading;
        p.car.x = h.parkingX + 9; p.car.y = h.parkingY + 6;
        p.x = h.parkingX + 9; p.y = h.parkingY + 6;
        p.visible = true;
        p.state = 'RETURN';
        p.path = [{ x: h.gate.x + 2, y: h.gate.y + 1 }, { x: h.doorX + 1, y: h.doorY + 2 }];
      } else {
        const spd = carEffectiveSpeed(p.car);
        const wp = p.path[0];
        const dx = wp.x - p.car.x, dy = wp.y - p.car.y;
        p.car.heading = Math.abs(dx) > Math.abs(dy) ? (dx > 0 ? 'E' : 'W') : (dy > 0 ? 'S' : 'N');
        if (stepToward(p.car, wp.x, wp.y, spd, dt)) p.path.shift();
      }
      break;
  }
  p.moveDist += Math.hypot(p.x - px0, p.y - py0);
  if (p.moveDist >= 4) { p.legFrame = (p.legFrame + 1) % 3; p.moveDist -= 4; }
}

function startExit(p, h) { p.state = 'EXIT_HOUSE';
  const gx = h.gate.x + 2, gy = h.gate.y + 1;
  const roadAboveY = h.rowIdx === 0 ? MAIN_CY : h.rowIdx === 1 ? CRES1_CY : CRES2_CY;
  p.path = [{ x: h.doorX + 1, y: h.doorY + 2 }, { x: gx, y: gy }, { x: gx, y: roadAboveY }];
}

function startReturn(p, h) {
  p.state = 'RETURN';
  const gx = h.gate.x + 2, gy = h.gate.y + 1;
  const roadAboveY = h.rowIdx === 0 ? MAIN_CY : h.rowIdx === 1 ? CRES1_CY : CRES2_CY;
  const roadYs = [MAIN_CY, CRES1_CY, CRES2_CY, CRES3_CY];
  let nearRoadY = MAIN_CY, minD = Infinity;
  for (const ry of roadYs) { const d = Math.abs(p.y - ry); if (d < minD) { minD = d; nearRoadY = ry; } }
  const raw = [{ x: SPINE_CX, y: nearRoadY }, { x: SPINE_CX, y: roadAboveY }, { x: gx, y: roadAboveY }, { x: gx, y: gy }, { x: h.doorX + 1, y: h.doorY + 2 }];
  p.path = raw.filter((wp, i) => i === 0 || Math.abs(wp.x - raw[i-1].x) > 0.5 || Math.abs(wp.y - raw[i-1].y) > 0.5);
}

function startSleep(p, h) { p.state = 'SLEEPING'; p.stateTimer = 8 + Math.random() * 12; p.tiredness = 0; p.tirednessTimer = 0; }
function startPace(p, h) { p.state = 'PACE'; const cx = h.houseRect.hx + 9, cy = h.houseRect.hy + 9; p.path = [{ x: h.doorX + 1, y: h.doorY + 3 }, { x: h.bedX + 3, y: h.bedY + 4 }, { x: cx, y: cy }]; }

// ── Bakery walk path ───────────────────────────────────────────────────────
function walkToBakeryPath(h) {
  const gx = h.gate.x + 2, gy = h.gate.y + 1;
  const roadAboveY = h.rowIdx === 0 ? MAIN_CY : h.rowIdx === 1 ? CRES1_CY : CRES2_CY;
  return makeAxisAligned(h.houseRect.hx + 9, h.houseRect.hy + 9, [
    { x: h.doorX + 1, y: h.doorY + 2 },
    { x: gx, y: gy },
    { x: gx, y: roadAboveY },
    { x: SPINE_CX, y: roadAboveY },
    { x: SPINE_CX, y: MAIN_CY },
    { x: BK_BAKER_ENTRY_X, y: MAIN_CY },
    { x: BK_BAKER_ENTRY_X, y: BK_BAKER_ENTRY_Y },
  ]);
}

// ── Bakery init (NEW flour/pallet mechanics) ─────────────────────────────────
function initBakery() {
  const trucks = BK_TRUCK_DEFS.map((def, i) => ({
    ...def,
    pallets: Array(def.palletCols * def.palletRows).fill(true), // full pallets with 4 flour each
    id: i,
  }));

  // Storage grid with flourCount (0-4)
  const storageGrid = BK_STORAGE_CELLS.map(sc => ({ ...sc, flourCount: sc.isStorage ? 0 : 0 }));

  const pool = [...Array(homes.length).keys()].sort(() => Math.random() - 0.5);
  const [jiggIdx, bakerIdx, serverIdx] = pool;

  function makeActor(homeIdx, role, extraWaypoints) {
    const h = homes[homeIdx];
    const basePath = walkToBakeryPath(h);
    let fullPath = [...basePath];
    let lastX = BK_BAKER_ENTRY_X, lastY = BK_BAKER_ENTRY_Y;
    for (const wp of extraWaypoints) {
      if (Math.abs(wp.x - lastX) > 0.5 && Math.abs(wp.y - lastY) > 0.5) fullPath.push({ x: wp.x, y: lastY });
      fullPath.push({ x: wp.x, y: wp.y });
      lastX = wp.x; lastY = wp.y;
    }
    return {
      role, homeIdx,
      x: h.houseRect.hx + 9, y: h.houseRect.hy + 9,
      skin: { headColor: '#f4c2a1', shirtColor: h.color },
      path: fullPath,
      legFrame: 0, moveDist: 0,
      bkState: 'WALK_TO_BAKERY',
      stateTimer: 0,
      carrying: null,
      visible: true,
    };
  }

  const jiggWorker = makeActor(jiggIdx, 'jigger_worker', [
    { x: BK_JIGGER_HOME_X, y: BK_BAKER_ENTRY_Y },
    { x: BK_JIGGER_HOME_X, y: BK_JIGGER_HOME_Y },
  ]);
  jiggWorker.currentTruck = 0;
  jiggWorker.currentPallet = trucks[0].pallets.length - 1;
  jiggWorker.delivered = 0;
  jiggWorker.targetStorage = null;

  const baker = makeActor(bakerIdx, 'baker', []);
  baker.nextOven = 0;
  baker.floursDeposited = 0;
  baker.targetStorage = null;

  const server = makeActor(serverIdx, 'server', [
    { x: BK_SERVER_X, y: BK_BAKER_ENTRY_Y },
    { x: BK_SERVER_X, y: BK_SERVER_Y },
  ]);
  server.targetOven = -1;

  bakery = {
    trucks, storageGrid,
    ovens: [
      { x: BK_OVEN1_X, y: BK_OVEN1_Y, baking: false, timer: 0, loafReady: false, glowPhase: 0 },
      { x: BK_OVEN2_X, y: BK_OVEN2_Y, baking: false, timer: 0, loafReady: false, glowPhase: 0 },
    ],
    breadCount: 0,
    jiggWorker, baker, server,
    jigger: { x: BK_JIGGER_HOME_X, y: BK_JIGGER_HOME_Y, heading: 'N', palletLoaded: false },
  };
}

function moveActor(actor, dt) {
  if (actor.path.length === 0) return true;
  const px0 = actor.x, py0 = actor.y;
  const wp = actor.path[0];
  if (stepToward(actor, wp.x, wp.y, WALK_SPEED, dt)) actor.path.shift();
  actor.moveDist += Math.hypot(actor.x - px0, actor.y - py0);
  if (actor.moveDist >= 4) { actor.legFrame = (actor.legFrame + 1) % 3; actor.moveDist -= 4; }
  return actor.path.length === 0;
}

function updateBakery(dt) {
  if (!bakery) return;
  for (const ov of bakery.ovens) {
    if (ov.baking) {
      ov.glowPhase += dt * 4;
      if (!ov.loafReady) { ov.timer -= dt; if (ov.timer <= 0) ov.loafReady = true; }
    }
  }
  updateJiggerWorker(dt);
  updateBakerActor(dt);
  updateServerActor(dt);
}

// ── Jigger worker (moves full pallets with 4 flour) ───────────────────────
function updateJiggerWorker(dt) {
  const w = bakery.jiggWorker;
  const jg = bakery.jigger;

  switch (w.bkState) {
    case 'WALK_TO_BAKERY':
      if (moveActor(w, dt)) { w.bkState = 'AT_JIGGER'; w.stateTimer = 0.4; }
      break;
    case 'AT_JIGGER':
      w.stateTimer -= dt;
      jg.x = w.x; jg.y = w.y;
      if (w.stateTimer <= 0) w.bkState = 'FIND_PALLET';
      break;
    case 'FIND_PALLET':
      if (w.delivered >= 20) { w.bkState = 'JIGGER_IDLE'; break; }
      const emptyStorage = bakery.storageGrid.find(s => s.isStorage && s.flourCount === 0);
      if (!emptyStorage) { w.stateTimer = 0.5; w.bkState = 'WAIT_STORAGE'; break; }
      let found = false;
      outer: for (let ti = w.currentTruck; ti < bakery.trucks.length; ti++) {
        const tr = bakery.trucks[ti];
        const startPi = (ti === w.currentTruck) ? w.currentPallet : tr.pallets.length - 1;
        for (let pi = startPi; pi >= 0; pi--) {
          if (tr.pallets[pi]) {
            w.currentTruck = ti;
            w.currentPallet = pi;
            found = true;
            break outer;
          }
        }
        w.currentTruck = ti + 1;
        if (ti + 1 < bakery.trucks.length) w.currentPallet = bakery.trucks[ti + 1].pallets.length - 1;
      }
      if (!found) { w.bkState = 'JIGGER_IDLE'; break; }
      w.targetStorage = emptyStorage;
      const def = BK_TRUCK_DEFS[w.currentTruck];
      const tr = bakery.trucks[w.currentTruck];
      const palW = tr.w / def.palletCols;
      const palH = tr.h / def.palletRows;
      const pi = w.currentPallet;
      const pr = (def.palletRows - 1) - Math.floor(pi / def.palletCols);
      const pc = pi % def.palletCols;
      const palCY = tr.y + (tr.h - (pr + 1) * palH) + palH / 2;
      const palCX = tr.x + pc * palW + palW / 2;
      w._palCX = palCX; w._palCY = palCY;
      if (w.currentTruck === 0) w._laneX = BK_LANE1_CX;
      else if (w.currentTruck === 1) w._laneX = BK_LANE2_CX;
      else w._laneX = tr.x + tr.w / 2;
      w.path = makeAxisAligned(w.x, w.y, [{ x: w._laneX, y: w.y }, { x: w._laneX, y: palCY }]);
      w.bkState = 'APPROACH_TRUCK';
      break;
    case 'WAIT_STORAGE':
      w.stateTimer -= dt;
      jg.x = w.x; jg.y = w.y;
      if (w.stateTimer <= 0) w.bkState = 'FIND_PALLET';
      break;
    case 'APPROACH_TRUCK':
      if (w.path.length > 0) {
        const wp = w.path[0];
        const dx = wp.x - w.x, dy = wp.y - w.y;
        jg.heading = Math.abs(dx) > Math.abs(dy) ? (dx > 0 ? 'E' : 'W') : (dy > 0 ? 'S' : 'N');
      }
      const done = moveActor(w, dt);
      jg.x = w.x; jg.y = w.y;
      if (done) {
        jg.heading = (w.currentTruck <= 1) ? 'W' : 'N';
        w.stateTimer = 0.7;
        w.bkState = 'LOAD_PAUSE';
      }
      break;
    case 'LOAD_PAUSE':
      w.stateTimer -= dt;
      jg.x = w.x; jg.y = w.y;
      if (w.stateTimer <= 0) {
        bakery.trucks[w.currentTruck].pallets[w.currentPallet] = false;
        jg.palletLoaded = true;
        jg.heading = (w.currentTruck <= 1) ? 'E' : 'S';
        const st = w.targetStorage;
        w.path = makeAxisAligned(w.x, w.y, [
          { x: w._laneX, y: BK_INT_Y + 9 },
          { x: st.cx, y: BK_INT_Y + 9 },
          { x: st.cx, y: st.cy },
        ]);
        w.bkState = 'CARRY_TO_STORAGE';
      }
      break;
    case 'CARRY_TO_STORAGE':
      if (w.path.length > 0) {
        const wp = w.path[0];
        const dx = wp.x - w.x, dy = wp.y - w.y;
        jg.heading = Math.abs(dx) > Math.abs(dy) ? (dx > 0 ? 'E' : 'W') : (dy > 0 ? 'S' : 'N');
      }
      const done2 = moveActor(w, dt);
      jg.x = w.x; jg.y = w.y;
      if (done2) { jg.heading = 'S'; w.stateTimer = 0.7; w.bkState = 'DROP_PAUSE'; }
      break;
    case 'DROP_PAUSE':
      w.stateTimer -= dt;
      jg.x = w.x; jg.y = w.y;
      if (w.stateTimer <= 0) {
        w.targetStorage.flourCount = 4; // full pallet deposited
        jg.palletLoaded = false;
        w.delivered++;
        w.currentPallet--;
        if (w.currentPallet < 0 && w.currentTruck + 1 < bakery.trucks.length) {
          w.currentTruck++;
          w.currentPallet = bakery.trucks[w.currentTruck].pallets.length - 1;
        }
        w.path = [{ x: w._laneX, y: w.y }];
        w.bkState = 'RETURN_TO_LANE';
      }
      break;
    case 'RETURN_TO_LANE':
      const done3 = moveActor(w, dt);
      jg.x = w.x; jg.y = w.y;
      if (done3) w.bkState = 'FIND_PALLET';
      break;
    case 'JIGGER_IDLE':
      jg.x = BK_JIGGER_HOME_X; jg.y = BK_JIGGER_HOME_Y; jg.heading = 'N';
      break;
  }
}

// ── Baker (takes ONE flour at a time from pallets) ────────────────────────
function updateBakerActor(dt) {
  const b = bakery.baker;
  switch (b.bkState) {
    case 'WALK_TO_BAKERY':
      if (moveActor(b, dt)) b.bkState = 'FIND_FLOUR';
      break;
    case 'FIND_FLOUR':
      if (b.floursDeposited >= 20) { b.bkState = 'BAKER_IDLE'; break; }
      const targetOv = bakery.ovens[b.nextOven];
      if (targetOv.baking) { b.stateTimer = 0.5; b.bkState = 'WAIT_OVEN'; break; }
      let nearest = null, nearD = Infinity;
      for (const sc of bakery.storageGrid) {
        if (!sc.isStorage || sc.flourCount <= 0) continue;
        const d = (sc.cx - b.x) ** 2 + (sc.cy - b.y) ** 2;
        if (d < nearD) { nearD = d; nearest = sc; }
      }
      if (!nearest) { b.stateTimer = 0.5; b.bkState = 'WAIT_FLOUR'; break; }
      b.targetStorage = nearest;
      b.path = makeAxisAligned(b.x, b.y, [{ x: nearest.cx, y: b.y }, { x: nearest.cx, y: nearest.cy }]);
      b.bkState = 'WALK_TO_FLOUR';
      break;
    case 'WAIT_OVEN':
    case 'WAIT_FLOUR':
      b.stateTimer -= dt;
      if (b.stateTimer <= 0) b.bkState = 'FIND_FLOUR';
      break;
    case 'WALK_TO_FLOUR':
      if (moveActor(b, dt)) { b.stateTimer = 0.4; b.bkState = 'PICK_FLOUR'; }
      break;
    case 'PICK_FLOUR':
      b.stateTimer -= dt;
      if (b.stateTimer <= 0) {
        if (b.targetStorage && b.targetStorage.flourCount > 0) {
          b.targetStorage.flourCount--;
          b.carrying = 'flour';
          const ov = bakery.ovens[b.nextOven];
          b.path = makeAxisAligned(b.x, b.y, [{ x: ov.x + 9, y: b.y }, { x: ov.x + 9, y: ov.y + 9 }]);
          b.bkState = 'WALK_TO_OVEN';
        } else {
          b.bkState = 'FIND_FLOUR';
        }
      }
      break;
    case 'WALK_TO_OVEN':
      if (moveActor(b, dt)) { b.stateTimer = 0.4; b.bkState = 'DEPOSIT_FLOUR'; }
      break;
    case 'DEPOSIT_FLOUR':
      b.stateTimer -= dt;
      if (b.stateTimer <= 0) {
        b.carrying = null;
        const ov = bakery.ovens[b.nextOven];
        ov.baking = true; ov.timer = 3.0; ov.glowPhase = 0; ov.loafReady = false;
        b.nextOven = (b.nextOven + 1) % 2;
        b.floursDeposited++;
        b.bkState = 'FIND_FLOUR';
      }
      break;
    case 'BAKER_IDLE': break;
  }
}

// ── Server (unchanged) ─────────────────────────────────────────────────────
function updateServerActor(dt) {
  const s = bakery.server;
  switch (s.bkState) {
    case 'WALK_TO_BAKERY':
      if (moveActor(s, dt)) s.bkState = 'AT_POST';
      break;
    case 'AT_POST':
      if (bakery.breadCount >= 20) { s.bkState = 'SERVER_IDLE'; break; }
      for (let i = 0; i < 2; i++) {
        if (bakery.ovens[i].loafReady) {
          s.targetOven = i;
          const ov = bakery.ovens[i];
          s.path = makeAxisAligned(s.x, s.y, [{ x: ov.x + 9, y: s.y }, { x: ov.x + 9, y: ov.y + 9 }]);
          s.bkState = 'WALK_TO_OVEN';
          break;
        }
      }
      break;
    case 'WALK_TO_OVEN':
      if (moveActor(s, dt)) { s.stateTimer = 0.4; s.bkState = 'PICK_LOAF'; }
      break;
    case 'PICK_LOAF':
      s.stateTimer -= dt;
      if (s.stateTimer <= 0) {
        const ov = bakery.ovens[s.targetOven];
        ov.loafReady = false; ov.baking = false;
        s.carrying = 'loaf';
        const vcIdx = Math.floor(bakery.breadCount / 4);
        if (vcIdx >= 5) { s.bkState = 'SERVER_IDLE'; break; }
        const vc = BK_V_CELLS[vcIdx];
        s.path = makeAxisAligned(s.x, s.y, [{ x: vc.x + 9, y: s.y }, { x: vc.x + 9, y: vc.y + 9 }]);
        s.bkState = 'WALK_TO_SLOT';
      }
      break;
    case 'WALK_TO_SLOT':
      if (moveActor(s, dt)) { s.stateTimer = 0.3; s.bkState = 'PLACE_LOAF'; }
      break;
    case 'PLACE_LOAF':
      s.stateTimer -= dt;
      if (s.stateTimer <= 0) {
        s.carrying = null;
        bakery.breadCount++;
        s.path = makeAxisAligned(s.x, s.y, [{ x: BK_SERVER_X, y: s.y }, { x: BK_SERVER_X, y: BK_SERVER_Y }]);
        s.bkState = 'RETURN_TO_POST';
      }
      break;
    case 'RETURN_TO_POST':
      if (moveActor(s, dt)) s.bkState = 'AT_POST';
      break;
    case 'SERVER_IDLE': break;
  }
}

function update(dt) {
  for (const p of people) updatePerson(p, dt);
  updateBakery(dt);
}

// ── Init ──────────────────────────────────────────────────────────────────
initVariants();
buildHomes();
buildStreetNodes();
buildPeople();
initBakery();
requestAnimationFrame(animate);
</script>
