<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Test Town</title>
  <style>
    body { margin: 0; background: #222; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; image-rendering: pixelated; }
    canvas { display: block; image-rendering: pixelated; }
  </style>
</head>
<body>
<canvas id="c" width="1200" height="750"></canvas>
<script>
'use strict';

// ── Constants ──────────────────────────────────────────────────────────────
const W = 1200, H = 750;
const GRID = 18;
const WALK_SPEED = 28;
const CAR_SPEED  = 50;

// Town footprint: X=0-270, Y=444-750 (flush corner, 17 rows × 15 cols)
// 17 rows: 7 bakery rows + 1 main street + 3×(garden+house+crescent) = 17
const TX = 0,   TY = 444;
const TW = 270, TH = 306;

// Bakery block: X=0-126, Y=TY to TY+126 (7 rows × 7 cols)
const BAKERY_X = 0,   BAKERY_Y = TY;
const BAKERY_W = 126, BAKERY_H = 126;   // 7×7 grid units

// Road Y coordinates (top of each 18px road strip)
const MAIN_Y  = TY + 126;  // 570 — main E-W street (bottom of bakery block)
const CRES1_Y = MAIN_Y + 54;   // 624 — Crescent 1
const CRES2_Y = CRES1_Y + 54;  // 678 — Crescent 2
const CRES3_Y = CRES2_Y + 54;  // 732 — Crescent 3 (south loop, = H-18 = canvas bottom)

// Road X coordinates (left edge of each 18px road strip)
const WPERIM_X = 0;    // West perimeter
const SPINE_X  = 144;  // Central spine (moved right by 1 grid unit to align with shifted residential area)
const EPERIM_X = 252;  // East perimeter
const NORTH_X  = 144;  // North entry (same as spine, moved right by 1 grid unit)

// Left-hand traffic lane offset (visual only, pixels from road centre)
const LANE = 4;

// Road centre lines (for waypoints)
const MAIN_CY  = MAIN_Y  + GRID / 2;   // 579
const CRES1_CY = CRES1_Y + GRID / 2;   // 633
const CRES2_CY = CRES2_Y + GRID / 2;   // 687
const CRES3_CY = CRES3_Y + GRID / 2;   // 741
const WPERIM_CX = WPERIM_X + GRID / 2; //   9
const SPINE_CX  = SPINE_X  + GRID / 2; // 153
const EPERIM_CX = EPERIM_X + GRID / 2; // 261

// Residential rows
const ROWS = [
  { gardenY: MAIN_Y + GRID, houseY: MAIN_Y + GRID*2, crescentY: CRES1_Y },
  { gardenY: CRES1_Y + GRID, houseY: CRES1_Y + GRID*2, crescentY: CRES2_Y },
  { gardenY: CRES2_Y + GRID, houseY: CRES2_Y + GRID*2, crescentY: CRES3_Y },
];

// 6 buildings per row, bilateral symmetric about X=144 (shifted right by 1 grid unit)
const BLDG_XS = [36, 72, 108, 162, 198, 234];
// Per-row variant arrays; positions 0&5 always 'drv', 1-4 random
// drv = driveway parking, std = road bay parking
let ROW_VARIANTS = [];

function genRowVariants() {
  const v = ['drv', 'drv', 'drv', 'drv', 'drv', 'drv'];
  // Only inner positions eligible; outer buildings (0 & 5) always drv
  // Place 1 or 2 non-adjacent std bays so a single isolated bay is valid
  const eligible = [1, 2, 3, 4].sort(() => Math.random() - 0.5);
  const count = 1 + Math.floor(Math.random() * 2);  // 1 or 2 per row
  const placed = [];
  for (const pos of eligible) {
    if (!placed.some(q => Math.abs(q - pos) <= 1)) {
      v[pos] = 'std';
      placed.push(pos);
      if (placed.length >= count) break;
    }
  }
  return v;
}

function initVariants() {
  ROW_VARIANTS = [genRowVariants(), genRowVariants(), genRowVariants()];
}

// ── Colour palettes (30 entries each) ─────────────────────────────────────
// PALETTE: shirt/car colour per resident (earthy, muted)
const PALETTE = [
  '#b25a3c','#c9a043','#6a8e5a','#3d7c8c','#5a6a8e',
  '#8e3d4a','#6a4d7a','#d9c9a3','#4a6e4a','#a87a4a',
  '#c46a3a','#7a8e3c','#4a7a9e','#9e5a3c','#6e4a8e',
  '#b89060','#3c6e5a','#8e7a3c','#5a3c6e','#7a9e7a',
  '#c4824a','#4a6e8e','#8e4a5a','#6e8e4a','#a84a6a',
  '#5a7a4a','#9e7a5a','#4a5a8e','#8e6a4a','#6a4a3c',
];
// BED_PALETTE: matching bed linen colour per resident (lighter/softer tonal match)
const BED_PALETTE = [
  '#e8b89a','#f0d890','#b8d4a8','#90c4d8','#b0b8d8',
  '#d8a0a8','#b8a0d0','#f4ecd8','#98c298','#d4b898',
  '#f0c098','#c4d898','#90bcd8','#d8a888','#b898d8',
  '#e8d0a8','#90bca8','#d8c890','#a890c0','#c0d8c0',
  '#f0c098','#90b8d8','#d898a8','#b8d898','#e098b8',
  '#a8c498','#d8c0a8','#9098c8','#d8b898','#b898a0',
];

// ── Sprites ────────────────────────────────────────────────────────────────
// Person: 5×8px  P=head, S=shirt(palette), B=black
// Both frames are identical height (8 rows) so alternating them causes no vertical shift
const PERSON_BASE = [
  ['_','P','P','P','_'],['_','P','P','P','_'],['_','P','P','P','_'],
  ['_','S','S','S','_'],['_','S','S','S','_'],['_','S','S','S','_'],
  ['_','B','B','B','_'],['_','B','B','B','_'],
];
const PERSON_WALK = [
  ['_','P','P','P','_'],['_','P','P','P','_'],['_','P','P','P','_'],
  ['_','S','S','S','_'],['_','S','S','S','_'],['_','S','S','S','_'],
  ['_','B','B','B','_'],['B','_','_','_','B'],
];

// Car: 14×9px  B=body(palette), D=darker body shade, K=wheel/black, W=windshield
const CAR_BASE = [
  ['_','_','K','K','_','_','_','_','_','K','K','_','_','_'],
  ['D','B','B','B','B','B','B','B','B','B','B','B','D','_'],
  ['D','B','B','B','B','B','B','B','B','B','B','B','D','_'],
  ['D','B','B','B','B','B','B','B','W','W','W','W','D','_'],
  ['D','B','B','B','B','B','B','B','W','W','W','W','D','_'],
  ['D','B','B','B','B','B','B','B','W','W','W','W','D','_'],
  ['D','B','B','B','B','B','B','B','B','B','B','B','D','_'],
  ['D','B','B','B','B','B','B','B','B','B','B','B','D','_'],
  ['_','_','K','K','_','_','_','_','_','K','K','_','_','_'],
];

function rotateSprite(s) {
  const rows = s.length, cols = s[0].length;
  const out = Array.from({length: cols}, () => Array(rows).fill('_'));
  for (let r = 0; r < rows; r++)
    for (let c = 0; c < cols; c++)
      out[c][rows - 1 - r] = s[r][c];
  return out;
}
const CAR_E = CAR_BASE;
const CAR_S = rotateSprite(CAR_E);
const CAR_W = rotateSprite(CAR_S);
const CAR_N = rotateSprite(CAR_W);
const CAR_SPRITES = { E: CAR_E, S: CAR_S, W: CAR_W, N: CAR_N };

// ── Canvas ─────────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

// ── Global state ───────────────────────────────────────────────────────────
let homes  = [];
let people = [];
let BUILDING_BOXES = [];
let PED_NODES = [];
let ALL_NODES = [];
let lastT  = null;

// ── Bakery state ───────────────────────────────────────────────────────────
let bakery = null;

// ── FPS tracking ──────────────────────────────────────────────────────────
let _fps = 60, _fpsTimer = 0, _fpsFrames = 0;
function updateFps(dt) {
  _fpsFrames++;
  _fpsTimer += dt;
  if (_fpsTimer >= 0.5) { _fps = Math.round(_fpsFrames / _fpsTimer); _fpsFrames = 0; _fpsTimer = 0; }
}

// ── Animation loop ────────────────────────────────────────────────────────
function animate(ts) {
  const dt = lastT === null ? 0 : Math.min((ts - lastT) / 1000, 0.1);
  lastT = ts;
  updateFps(dt);
  update(dt);
  draw();
  requestAnimationFrame(animate);
}

// ── Draw helpers ───────────────────────────────────────────────────────────
function dashedLine(x1, y1, x2, y2) {
  ctx.save();
  ctx.strokeStyle = '#e0e0e0';
  ctx.lineWidth = 1;
  ctx.setLineDash([6, 6]);
  ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
  ctx.setLineDash([]); ctx.restore();
}

function road(x, y, w, h, cx, cy, cx2, cy2) {
  ctx.fillStyle = '#3f3f3f';
  ctx.fillRect(x, y, w, h);
  if (cx !== undefined) dashedLine(cx, cy, cx2 !== undefined ? cx2 : cx, cy2 !== undefined ? cy2 : cy);
}

// ── Draw: grass ────────────────────────────────────────────────────────────
function drawGrass() {
  ctx.fillStyle = '#2e8b57';
  ctx.fillRect(0, 0, W, H);
}

// ── Draw: all roads ────────────────────────────────────────────────────────
function drawRoads() {
  // North entry (X=144-162, Y=0-448)
  road(NORTH_X, 0, GRID, MAIN_Y, SPINE_CX, 0, SPINE_CX, MAIN_Y);
  // Main E-W street (full width + east exit to canvas edge)
  road(TX, MAIN_Y, W, GRID, TX, MAIN_CY, W, MAIN_CY);
  // West perimeter (X=0-18, Y=448-628)
  road(WPERIM_X, MAIN_Y, GRID, CRES3_Y + GRID - MAIN_Y, WPERIM_CX, MAIN_Y, WPERIM_CX, CRES3_Y + GRID);
  // East perimeter (X=252-270, Y=448-628)
  road(EPERIM_X, MAIN_Y, GRID, CRES3_Y + GRID - MAIN_Y, EPERIM_CX, MAIN_Y, EPERIM_CX, CRES3_Y + GRID);
  // Central spine (X=144-162, Y=448-628)
  road(SPINE_X, MAIN_Y, GRID, CRES3_Y + GRID - MAIN_Y, SPINE_CX, MAIN_Y, SPINE_CX, CRES3_Y + GRID);
  // Crescent 1 (full width, Y=502-520)
  road(TX, CRES1_Y, TW, GRID, TX, CRES1_CY, TX + TW, CRES1_CY);
  // Crescent 2 (full width, Y=556-574)
  road(TX, CRES2_Y, TW, GRID, TX, CRES2_CY, TX + TW, CRES2_CY);
  // Crescent 3 / south loop (full width, Y=610-628)
  road(TX, CRES3_Y, TW, GRID, TX, CRES3_CY, TX + TW, CRES3_CY);
}

// ── Bakery building constants (10 rows × 8 cols) ──────────────────────────
// Row 0 is adjacent to road (bottom), row 9 is at top; col 1 = X=0.
// bkRowY(r) = pixel Y of the TOP of that row.
// bkColX(c) = pixel X of the LEFT of that column (c is 1-indexed).
function bkRowY(r) { return MAIN_Y - (r + 1) * GRID; }
function bkColX(c) { return (c - 1) * GRID; }

// Full bakery footprint (cols 1-8 = X:0-144, rows 0-9 = Y:390-570)
const BK_FULL_X = 0,          BK_FULL_Y = MAIN_Y - 10 * GRID;
const BK_FULL_W = 8 * GRID,   BK_FULL_H = 10 * GRID;
// Building interior (rows 0-5): Y 462-570
const BK_INT_Y = MAIN_Y - 6 * GRID, BK_INT_H = 6 * GRID;
// Truck yard (rows 6-9): Y 390-462
const BK_YARD_Y = MAIN_Y - 10 * GRID, BK_YARD_H = 4 * GRID;

// Key cell top-left corners
const BK_OVEN1_X  = bkColX(8), BK_OVEN1_Y  = bkRowY(3);  // col 8, row 3
const BK_OVEN2_X  = bkColX(8), BK_OVEN2_Y  = bkRowY(2);  // col 8, row 2
// Jigger rest position L — centre of col 8, row 5
const BK_JIGGER_HOME_X = bkColX(8) + 9, BK_JIGGER_HOME_Y = bkRowY(5) + 9;
// T lane centre-X for jigger travel
const BK_LANE1_CX = bkColX(5) + 9;  // col 5
const BK_LANE2_CX = bkColX(7) + 9;  // col 7
// Server post — col 6, row 2 centre
const BK_SERVER_X = bkColX(6) + 9, BK_SERVER_Y = bkRowY(2) + 9;
// Baker spawn point inside bakery — col 4, row 0 (just inside door)
const BK_BAKER_ENTRY_X = bkColX(4) + 9, BK_BAKER_ENTRY_Y = bkRowY(0) + 9;

// Storage cells: cols 1-5, rows 2-5 = 20 cells
const BK_STORAGE_CELLS = [];
for (let r = 2; r <= 5; r++)
  for (let c = 1; c <= 5; c++)
    BK_STORAGE_CELLS.push({ x: bkColX(c), y: bkRowY(r), cx: bkColX(c)+9, cy: bkRowY(r)+9, row: r, col: c });

// Bread display V cells: row 1, cols 1-6
const BK_V_CELLS = [];
for (let c = 1; c <= 6; c++)
  BK_V_CELLS.push({ x: bkColX(c), y: bkRowY(1), col: c, active: c <= 5 });

// Truck definitions: { x, y, w, h, palletCols, palletRows }
// Large trucks: cols 4-5 and cols 6-7, rows 6-9 (4 deep × 2 wide = 8 pallets each)
// Small trucks: col 8 split into two 9px halves, rows 6-8 (3 deep × 1 wide = 3 pallets each)
const BK_TRUCK_DEFS = [
  { x: bkColX(4), y: bkRowY(9), w: 2*GRID, h: 4*GRID, palletCols: 2, palletRows: 4, large: true  },
  { x: bkColX(6), y: bkRowY(9), w: 2*GRID, h: 4*GRID, palletCols: 2, palletRows: 4, large: true  },
  { x: bkColX(8),     y: bkRowY(8), w: 9, h: 3*GRID, palletCols: 1, palletRows: 3, large: false },
  { x: bkColX(8) + 9, y: bkRowY(8), w: 9, h: 3*GRID, palletCols: 1, palletRows: 3, large: false },
];

// ── Proximity and exclusion geometry ──────────────────────────────────────
const ROAD_RECTS = [
  { x: NORTH_X,  y: 0,       w: GRID, h: MAIN_Y },
  { x: 0,        y: MAIN_Y,  w: W,    h: GRID },
  { x: WPERIM_X, y: MAIN_Y,  w: GRID, h: CRES3_Y + GRID - MAIN_Y },
  { x: EPERIM_X, y: MAIN_Y,  w: GRID, h: CRES3_Y + GRID - MAIN_Y },
  { x: SPINE_X,  y: MAIN_Y,  w: GRID, h: CRES3_Y + GRID - MAIN_Y },
  { x: TX,       y: CRES1_Y, w: TW,   h: GRID },
  { x: TX,       y: CRES2_Y, w: TW,   h: GRID },
  { x: TX,       y: CRES3_Y, w: TW,   h: GRID },
];
const TRACK_ZONES = [];
const PUBLIC_WALK_RECTS = [];  // bakery interior is role-access only, not public
const GRASS_RADIUS = 8 * GRID;

function drawPublicArea() {
  if (!bakery) return;

  // ── Truck yard tarmac (rows 6-9, cols 4-8): Y=390-462, X=54-144 ──────────
  ctx.fillStyle = '#3c3c3c';
  ctx.fillRect(bkColX(4), BK_YARD_Y, 5 * GRID, BK_YARD_H);

  // P bay markings: cols 4, 6, 8 at rows 6-9 (white lines between bays)
  ctx.strokeStyle = '#707070'; ctx.lineWidth = 1;
  // Large truck A bay lines (cols 4-5)
  for (let r = 6; r <= 9; r++) {
    ctx.strokeRect(bkColX(4) + 1, bkRowY(r) + 1, 2*GRID - 2, GRID - 2);
  }
  // Large truck B bay lines (cols 6-7)
  for (let r = 6; r <= 9; r++) {
    ctx.strokeRect(bkColX(6) + 1, bkRowY(r) + 1, 2*GRID - 2, GRID - 2);
  }
  // Small truck bay lines (col 8, rows 6-8)
  for (let r = 6; r <= 8; r++) {
    ctx.strokeRect(bkColX(8) + 1, bkRowY(r) + 1, GRID - 2, GRID - 2);
  }

  // ── Dividing wall between interior (cols 1-3) and yard (cols 4-8) ────────
  ctx.fillStyle = '#8b7355';
  ctx.fillRect(bkColX(4) - 2, BK_INT_Y, 3, BK_INT_H);

  // ── Building interior floor (cols 1-8, rows 0-5) ─────────────────────────
  // Structural B cells: background
  ctx.fillStyle = '#d4c49a';
  ctx.fillRect(bkColX(1), BK_INT_Y, 8 * GRID, BK_INT_H);

  // Storage cells (cols 1-5, rows 2-5) — show flour pallets
  for (const sc of bakery.storageGrid) {
    ctx.fillStyle = sc.hasPallet ? '#c8a868' : '#bca87a';
    ctx.fillRect(sc.x + 1, sc.y + 1, GRID - 2, GRID - 2);
    if (sc.hasPallet) {
      // Pallet visual: stacked sacks
      ctx.fillStyle = '#e8d090';
      ctx.fillRect(sc.x + 3, sc.y + 3, GRID - 6, GRID - 6);
      ctx.strokeStyle = '#a0803a'; ctx.lineWidth = 1;
      ctx.strokeRect(sc.x + 3, sc.y + 3, GRID - 6, GRID - 6);
    } else {
      ctx.strokeStyle = '#a8946a'; ctx.lineWidth = 1;
      ctx.strokeRect(sc.x + 1, sc.y + 1, GRID - 2, GRID - 2);
    }
  }

  // Bread display V cells (row 1, cols 1-6) — filled with bread slots
  for (const vc of BK_V_CELLS) {
    ctx.fillStyle = '#b89050';
    ctx.fillRect(vc.x + 1, vc.y + 1, GRID - 2, GRID - 2);
    ctx.strokeStyle = '#7a5a28'; ctx.lineWidth = 1;
    ctx.strokeRect(vc.x + 1, vc.y + 1, GRID - 2, GRID - 2);
    if (vc.active) {
      // Draw bread items in 2×2 sub-grid within this V cell
      const vcIdx = vc.col - 1;  // 0-indexed
      for (let si = 0; si < 4; si++) {
        const slotIdx = vcIdx * 4 + si;
        if (slotIdx < bakery.breadCount) {
          const sx = vc.x + 2 + (si % 2) * 7;
          const sy = vc.y + 2 + Math.floor(si / 2) * 7;
          ctx.fillStyle = '#d4a044';
          ctx.fillRect(sx, sy, 6, 6);
          ctx.fillStyle = '#f0c060';
          ctx.fillRect(sx + 1, sy + 1, 3, 2);
        }
      }
    }
  }

  // Oven glow (drawn before oven rect so it sits behind)
  for (let i = 0; i < 2; i++) {
    const ov = bakery.ovens[i];
    if (ov.baking) {
      const alpha = 0.25 + 0.2 * Math.sin(ov.glowPhase);
      const grd = ctx.createRadialGradient(ov.x + 9, ov.y + 9, 2, ov.x + 9, ov.y + 9, 16);
      grd.addColorStop(0, `rgba(255,140,0,${alpha + 0.3})`);
      grd.addColorStop(1, 'rgba(255,80,0,0)');
      ctx.fillStyle = grd;
      ctx.fillRect(ov.x - 7, ov.y - 7, GRID + 14, GRID + 14);
    }
  }

  // Oven cells (col 8, rows 3 and 2)
  for (let i = 0; i < 2; i++) {
    const ov = bakery.ovens[i];
    ctx.fillStyle = '#5a3520';
    ctx.fillRect(ov.x + 1, ov.y + 1, GRID - 2, GRID - 2);
    // Oven door (dark arc approximated as rect)
    ctx.fillStyle = ov.baking ? '#ff6000' : '#1a0a00';
    ctx.fillRect(ov.x + 4, ov.y + 4, GRID - 8, GRID - 8);
    ctx.strokeStyle = '#8b5a30'; ctx.lineWidth = 1;
    ctx.strokeRect(ov.x + 1, ov.y + 1, GRID - 2, GRID - 2);
    // Loaf on top when ready
    if (ov.loafReady) {
      ctx.fillStyle = '#c4803a';
      ctx.fillRect(ov.x + 3, ov.y - 5, GRID - 6, 5);
      ctx.fillStyle = '#e8a050';
      ctx.fillRect(ov.x + 5, ov.y - 4, GRID - 10, 2);
    }
  }

  // Row 0 — building row at road level (B B B D D B B B)
  // Doors at cols 4-5
  ctx.fillStyle = '#7a4a28';
  ctx.fillRect(bkColX(4) + 2, bkRowY(0) + 2, GRID - 4, GRID - 4);
  ctx.fillRect(bkColX(5) + 2, bkRowY(0) + 2, GRID - 4, GRID - 4);
  ctx.strokeStyle = '#5a3a1a'; ctx.lineWidth = 1;
  ctx.strokeRect(bkColX(4) + 2, bkRowY(0) + 2, GRID - 4, GRID - 4);
  ctx.strokeRect(bkColX(5) + 2, bkRowY(0) + 2, GRID - 4, GRID - 4);

  // Windows on north face of building (row 5 = top of interior block)
  ctx.fillStyle = '#9ad6e8';
  ctx.fillRect(bkColX(1) + 3, bkRowY(5) + 4, 12, 8);
  ctx.fillRect(bkColX(2) + 3, bkRowY(5) + 4, 12, 8);
  ctx.fillRect(bkColX(3) + 3, bkRowY(5) + 4, 12, 8);

  // Building outline
  ctx.strokeStyle = '#5a4a36'; ctx.lineWidth = 2;
  ctx.strokeRect(bkColX(1), BK_INT_Y, 8 * GRID, BK_INT_H);

  // Draw trucks
  drawBakeryTrucks();

  // Draw jigger at its current position (drawn after trucks, before people)
  drawJigger();
}

function drawBakeryTrucks() {
  if (!bakery) return;
  for (let ti = 0; ti < bakery.trucks.length; ti++) {
    const tr = bakery.trucks[ti];
    const def = BK_TRUCK_DEFS[ti];
    // Truck body
    ctx.fillStyle = tr.large ? '#4a6080' : '#607080';
    ctx.fillRect(tr.x, tr.y, tr.w, tr.h);
    // Cab (top end, farthest from bakery)
    ctx.fillStyle = tr.large ? '#3a5070' : '#506070';
    ctx.fillRect(tr.x, tr.y, tr.w, Math.min(8, tr.h));
    // Cab windscreen
    ctx.fillStyle = '#9ad6e8';
    ctx.fillRect(tr.x + 2, tr.y + 2, tr.w - 4, 4);
    // Open back (near/bottom, facing bakery) — slightly lighter
    ctx.fillStyle = '#6a8090';
    ctx.fillRect(tr.x, tr.y + tr.h - 4, tr.w, 4);
    // Pallet bays
    const palW = tr.w / def.palletCols;
    const palH = tr.h / def.palletRows;
    // Pallets render from back (bottom) upward: pallet[0] = bottom row
    let idx = 0;
    for (let pr = def.palletRows - 1; pr >= 0; pr--) {
      for (let pc = 0; pc < def.palletCols; pc++) {
        const px = tr.x + pc * palW + 1;
        const py = tr.y + (tr.h - (pr + 1) * palH) + 1;
        const pw = palW - 2, ph = palH - 2;
        if (tr.pallets[idx]) {
          ctx.fillStyle = '#e8d090';
          ctx.fillRect(px, py, pw, ph);
          ctx.strokeStyle = '#a0803a'; ctx.lineWidth = 0.5;
          ctx.strokeRect(px, py, pw, ph);
        }
        idx++;
      }
    }
    // Truck outline
    ctx.strokeStyle = '#2a3a4a'; ctx.lineWidth = 1;
    ctx.strokeRect(tr.x, tr.y, tr.w, tr.h);
  }
}

function drawJigger() {
  if (!bakery) return;
  const jg = bakery.jigger;
  const jx = Math.floor(jg.x), jy = Math.floor(jg.y);
  // Draw based on heading
  // Jigger: forks point in direction of travel (toward truck/storage)
  // Body is ~14px long, 8px wide; forks 4px long; handle (Y-shape) at rear
  ctx.save();
  ctx.translate(jx, jy);
  // Rotate based on heading: N=up, S=down, E=right, W=left
  const rot = { N: -Math.PI/2, S: Math.PI/2, E: 0, W: Math.PI }[jg.heading] || 0;
  ctx.rotate(rot);
  // Forks (front): two thin prongs
  ctx.fillStyle = '#cc2222';
  ctx.fillRect(4, -3, 7, 2);   // top fork
  ctx.fillRect(4, 1,  7, 2);   // bottom fork
  // Body
  ctx.fillStyle = '#dd3333';
  ctx.fillRect(-4, -3, 8, 6);
  // Handle Y-shape (rear): vertical stem + two arms
  ctx.fillStyle = '#bb1111';
  ctx.fillRect(-8, -1, 4, 2);  // stem
  ctx.fillRect(-10, -4, 2, 3); // left arm
  ctx.fillRect(-10, 1,  2, 3); // right arm
  // Pallet on top when loaded
  if (jg.palletLoaded) {
    ctx.fillStyle = '#e8d090';
    ctx.fillRect(-4, -5, 8, 10);
    ctx.strokeStyle = '#a0803a'; ctx.lineWidth = 0.5;
    ctx.strokeRect(-4, -5, 8, 10);
  }
  ctx.restore();
}

// ── Draw: parking bay markings on crescent roads ───────────────────────────
function drawParkingBays() {
  for (let ri = 0; ri < 3; ri++) {
    const cy = ROWS[ri].crescentY;
    for (let bi = 0; bi < BLDG_XS.length; bi++) {
      if (ROW_VARIANTS[ri][bi] !== 'std') continue;
      const bx = BLDG_XS[bi];
      // Two horizontal bays (parallel to road) in top 8px of crescent, one per half
      for (let half = 0; half < 2; half++) {
        const hx = bx + half * 18;
        ctx.fillStyle = '#505050';
        ctx.fillRect(hx + 1, cy + 1, 16, 8);
        ctx.strokeStyle = '#e0e0e0'; ctx.lineWidth = 1;
        ctx.strokeRect(hx + 1, cy + 1, 16, 8);
      }
    }
  }
}

// ── Draw: gardens, fences, driveways ──────────────────────────────────────
function drawGardens() {
  for (const h of homes) {
    const { gardenRect: g, gate, variant, half } = h;
    // Garden fill
    ctx.fillStyle = '#3ca067';
    ctx.fillRect(g.x, g.y, g.w, g.h);
    // Driveway patch for drv homes
    if (variant === 'drv') {
      const dvx = half === 0 ? g.x : g.x + g.w - 9;
      ctx.fillStyle = '#5a5a5a';
      ctx.fillRect(dvx, g.y, 9, g.h);
    }
    // Fence
    ctx.strokeStyle = '#8b6f47'; ctx.lineWidth = 2;
    ctx.strokeRect(g.x, g.y, g.w, g.h);
    // Gate gap (erase top fence segment)
    ctx.fillStyle = '#3f3f3f'; // road colour shows through
    ctx.fillRect(gate.x, gate.y, gate.w, gate.h);
  }
}

// ── Draw: houses ───────────────────────────────────────────────────────────
function drawHouses() {
  for (const h of homes) {
    const { houseRect: hr, doorX, doorY } = h;
    const sleeping = people[h.id] && people[h.id].state === 'SLEEPING';
    // Walls
    ctx.fillStyle = sleeping ? '#705d4a' : '#a0856a';
    ctx.fillRect(hr.hx, hr.hy, hr.hw, hr.hh);
    ctx.strokeStyle = '#5a4a36'; ctx.lineWidth = 2;
    ctx.strokeRect(hr.hx, hr.hy, hr.hw, hr.hh);
    // Roof strip (north face = front)
    ctx.fillStyle = '#c4956a';
    ctx.fillRect(hr.hx, hr.hy, hr.hw, 3);
    // Front door on north face
    ctx.fillStyle = '#7a4a28';
    ctx.fillRect(doorX, doorY, 3, 4);
    // Back door on south face for std homes (road-bay houses face crescent at back)
    if (h.variant === 'std') {
      ctx.fillStyle = '#5a3820';
      ctx.fillRect(doorX, hr.hy + hr.hh - 4, 3, 4);
    }
    // Bed
    drawBed(h);
  }
}

function drawBed(h) {
  ctx.fillStyle = h.bedColor;
  ctx.fillRect(h.bedX, h.bedY, 6, 8);
  ctx.fillStyle = '#f8f4ee';  // pillow always light
  ctx.fillRect(h.bedX, h.bedY, 6, 3);
}

// ── Draw: person sprite ────────────────────────────────────────────────────
function drawPersonSprite(px, py, skin, walking, sleeping) {
  const sprite = walking ? PERSON_WALK : PERSON_BASE;
  const drawX = Math.floor(px - 2), drawY = Math.floor(py - 4);
  const dim = sleeping ? 0.7 : 1.0;
  function dc(hex) {
    const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    return `rgb(${Math.floor(r*dim)},${Math.floor(g*dim)},${Math.floor(b*dim)})`;
  }
  const cm = { P: dc(skin.headColor), S: dc(skin.shirtColor), B: dc('#1a1a1a') };
  for (let r = 0; r < sprite.length; r++)
    for (let c = 0; c < sprite[r].length; c++) {
      const k = sprite[r][c]; if (k === '_') continue;
      ctx.fillStyle = cm[k]; ctx.fillRect(drawX+c, drawY+r, 1, 1);
    }
}

// ── Draw: car sprite ───────────────────────────────────────────────────────
function drawCarSprite(cx, cy, heading, carColor, moving = false) {
  const sprite = CAR_SPRITES[heading] || CAR_SPRITES['E'];
  const sw = sprite[0].length, sh = sprite.length;
  let drawX = Math.floor(cx - sw/2), drawY = Math.floor(cy - sh/2);
  // Left-hand driving: visually offset moving cars onto left side of road.
  // When facing E, left = north = negative Y; W → south = +Y; S → east = +X; N → west = -X
  if (moving) {
    if      (heading === 'E') drawY -= LANE;
    else if (heading === 'W') drawY += LANE;
    else if (heading === 'S') drawX += LANE;
    else if (heading === 'N') drawX -= LANE;
  }
  const cr = parseInt(carColor.slice(1,3),16), cg = parseInt(carColor.slice(3,5),16), cb = parseInt(carColor.slice(5,7),16);
  const darker = `rgb(${Math.floor(cr*0.6)},${Math.floor(cg*0.6)},${Math.floor(cb*0.6)})`;
  const cm = { B: carColor, D: darker, K: '#111111', W: '#9ad6e8' };
  for (let row = 0; row < sh; row++)
    for (let col = 0; col < sw; col++) {
      const k = sprite[row][col]; if (k === '_') continue;
      ctx.fillStyle = cm[k]; ctx.fillRect(drawX+col, drawY+row, 1, 1);
    }
}

// ── Draw: HUD ─────────────────────────────────────────────────────────────
function drawHUD() {
  const counts = {};
  for (const p of people) counts[p.state] = (counts[p.state] || 0) + 1;
  const order = ['AT_HOME','SLEEPING','PACE','EXIT_HOUSE','WANDER','INTERACT','RETURN','ENTER_CAR','DRIVE','PARK_CAR'];
  const lines = [`FPS: ${_fps}`, `People: ${people.length}`].concat(
    order.filter(s => counts[s]).map(s => `${s}: ${counts[s]}`)
  );
  if (bakery) {
    lines.push('──── BAKERY ────');
    lines.push(`Bread: ${bakery.breadCount}/20`);
    lines.push(`Delivered: ${bakery.jiggWorker.delivered}/20`);
    const palletTotal = bakery.storageGrid.filter(s => s.hasPallet).length;
    lines.push(`Storage: ${palletTotal}/20`);
    lines.push(`Jigger: ${bakery.jiggWorker.bkState.replace('_',' ')}`);
    lines.push(`Baker:  ${bakery.baker.bkState.replace('_',' ')}`);
    lines.push(`Server: ${bakery.server.bkState.replace('_',' ')}`);
  }
  const fw = 160, lh = 12, pad = 6;
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(W - fw - 4, 4, fw, lines.length * lh + pad * 2);
  ctx.fillStyle = '#e8e8e8'; ctx.font = '10px monospace';
  lines.forEach((l, i) => ctx.fillText(l, W - fw, 4 + pad + (i+1)*lh - 2));
}

// ── Draw: all people ───────────────────────────────────────────────────────
function drawPeople() {
  for (const p of people) {
    if (!p.visible) continue;
    const walking = ['EXIT_HOUSE','WANDER','RETURN','PACE'].includes(p.state);
    // Cycle: WALK(0) → WALK(1) → BASE(2) → repeat; feet-together appears 1-in-3
    drawPersonSprite(p.x, p.y, p.skin, walking && p.legFrame !== 2, p.state === 'SLEEPING');
    if (p.state === 'INTERACT') {
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(Math.floor(p.x-1), Math.floor(p.y-8), 2, 2);
    }
  }
}

// ── Main draw ──────────────────────────────────────────────────────────────
function draw() {
  drawGrass();
  drawRoads();
  drawPublicArea();   // includes bakery interior, trucks, jigger
  drawGardens();
  drawHouses();
  drawParkingBays();
  // parked cars
  for (const p of people) if (p.car.parked) drawCarSprite(p.car.x, p.car.y, p.car.heading, p.skin.carColor, false);
  drawPeople();
  drawBakeryActors();
  // moving cars
  for (const p of people) if (!p.car.parked) drawCarSprite(p.car.x, p.car.y, p.car.heading, p.skin.carColor, p.state === 'DRIVE' || p.state === 'PARK_CAR');
  drawHUD();
}

const JIGGER_PUSH_STATES = new Set([
  'APPROACH_TRUCK','LOAD_PAUSE','CARRY_TO_STORAGE','DROP_PAUSE','RETURN_TO_LANE'
]);
// Pixel offset from jigger centre to place worker (they push from behind)
const JIGGER_PUSH_OFFSET = { N:[0,7], S:[0,-7], E:[-7,0], W:[7,0] };

function drawBakeryActors() {
  if (!bakery) return;
  for (const actor of [bakery.jiggWorker, bakery.baker, bakery.server]) {
    if (!actor || !actor.visible) continue;

    let drawX = actor.x, drawY = actor.y;
    const isPushing = actor.role === 'jigger_worker' && JIGGER_PUSH_STATES.has(actor.bkState);
    if (isPushing) {
      // Offset worker behind the jigger
      const off = JIGGER_PUSH_OFFSET[bakery.jigger.heading] || [0, 0];
      drawX = bakery.jigger.x + off[0];
      drawY = bakery.jigger.y + off[1];
    }

    const idleStates = new Set(['JIGGER_IDLE','BAKER_IDLE','SERVER_IDLE','AT_POST','AT_JIGGER','WAIT_STORAGE','WAIT_FLOUR','WAIT_OVEN','LOAD_PAUSE','DROP_PAUSE']);
    const walking = !idleStates.has(actor.bkState) && actor.legFrame !== 2;
    drawPersonSprite(drawX, drawY, actor.skin, walking, false);

    // Carried item (above head)
    const ix = Math.floor(drawX), iy = Math.floor(drawY);
    if (actor.carrying === 'flour') {
      ctx.fillStyle = '#f0f0f0';
      ctx.fillRect(ix - 2, iy - 11, 5, 5);
      ctx.strokeStyle = '#c0c0c0'; ctx.lineWidth = 0.5;
      ctx.strokeRect(ix - 2, iy - 11, 5, 5);
    } else if (actor.carrying === 'loaf') {
      ctx.fillStyle = '#c4803a';
      ctx.fillRect(ix - 3, iy - 10, 6, 4);
      ctx.fillStyle = '#e8a050';
      ctx.fillRect(ix - 2, iy - 9, 3, 2);
    }
  }
}

// ── Step 3: buildHomes() ──────────────────────────────────────────────────
function buildHomes() {
  homes = [];
  BUILDING_BOXES = [];
  let id = 0;
  for (let ri = 0; ri < 3; ri++) {
    const row = ROWS[ri];
    for (let bi = 0; bi < BLDG_XS.length; bi++) {
      const bx      = BLDG_XS[bi];
      const variant = ROW_VARIANTS[ri][bi];
      // Register full building bounding box (garden + house) for path rejection
      BUILDING_BOXES.push({ x: bx, y: row.gardenY, w: 36, h: 36, bldgKey: `${ri}_${bi}` });
      for (let half = 0; half < 2; half++) {
        const hx = bx + half * 18;
        const hy = row.houseY;
        const gx = bx + half * 18;
        const gy = row.gardenY;

        // Door on north face of house, centred in half
        const doorX = hx + 7;
        const doorY = hy;        // north face (top edge)

        // Gate: 4px gap in north fence of garden, centred in this half
        const gate = { x: gx + 7, y: gy - 1, w: 4, h: 3 };

        // Bed position — corner rotation by (bldgInRow % 2) XOR half
        const bedCorner = (bi + half) % 2; // 0=top-left, 1=top-right
        const bedX = bedCorner === 0 ? hx + 1 : hx + 11;
        const bedY = hy + 2;

        // Parking — coordinates such that car.x = parkingX+9, car.y = parkingY+6
        let parkingX, parkingY;
        if (variant === 'drv') {
          // S-facing car (9w×14h) centred in 9px driveway strip
          // Driveway: left half = hx..hx+9, right half = hx+9..hx+18
          const dvx = half === 0 ? hx : hx + 9;
          parkingX = dvx - 5;         // car.x = dvx+4 (centre of 9px strip)
          parkingY = gy + 3;          // car.y = gy+9 (centre of 18px deep driveway)
        } else {
          // E-facing car (14w×9h) in top 8px of crescent road, per half (18px wide)
          parkingX = hx;              // car.x = hx+9 (centre of 18px half)
          parkingY = row.crescentY - 2; // car.y = crescentY+4 (centre of top 8px)
        }

        // Parking heading: drv=S (nose in from road above), std=E (parallel to road)
        const parkingHeading = variant === 'drv' ? 'S' : 'E';

        homes.push({
          id, rowIdx: ri, bldgInRow: bi, half, variant,
          houseRect: { hx, hy, hw: 18, hh: 18 },
          gardenRect: { x: gx, y: gy, w: 18, h: 18 },
          gate,
          doorX, doorY,
          bedX, bedY,
          parkingX, parkingY, parkingHeading,
          color:    PALETTE[id % PALETTE.length],
          bedColor: BED_PALETTE[id % BED_PALETTE.length],
        });
        id++;
      }
    }
  }
}

// ── Geometry helpers ──────────────────────────────────────────────────────
function distToRoads(x, y) {
  let min = Infinity;
  for (const r of ROAD_RECTS) {
    const cx = Math.max(r.x, Math.min(x, r.x + r.w));
    const cy = Math.max(r.y, Math.min(y, r.y + r.h));
    const d = Math.hypot(x - cx, y - cy);
    if (d < min) min = d;
  }
  return min;
}
function isInPublicArea(x, y) {
  for (const r of PUBLIC_WALK_RECTS)
    if (x >= r.x && x < r.x + r.w && y >= r.y && y < r.y + r.h) return true;
  return false;
}
function isInTrackZone(x, y) {
  for (const z of TRACK_ZONES)
    if (x >= z.x && x < z.x + z.w && y >= z.y && y < z.y + z.h) return true;
  return false;
}
// Convert arbitrary waypoint list into axis-aligned segments (H-first)
function makeAxisAligned(startX, startY, waypoints) {
  const out = [];
  let cx = startX, cy = startY;
  for (const wp of waypoints) {
    if (Math.abs(wp.x - cx) > 0.5 && Math.abs(wp.y - cy) > 0.5)
      out.push({ x: wp.x, y: cy });  // horizontal leg first
    out.push({ x: wp.x, y: wp.y });
    cx = wp.x; cy = wp.y;
  }
  return out;
}

// ── Step 4a: Street waypoint graph ────────────────────────────────────────
function buildStreetNodes() {
  PED_NODES = [];
  ALL_NODES = [];

  // Main street nodes (pedestrians + cars) — Y=MAIN_CY, X every GRID from 0 to 270
  for (let x = 0; x <= TW; x += GRID) {
    const n = { x, y: MAIN_CY };
    PED_NODES.push(n);
    ALL_NODES.push(n);
  }
  // East exit — ped + car, extended to X=900 for longer drives
  for (let x = TW + GRID; x <= 900; x += GRID) {
    const n = { x, y: MAIN_CY };
    PED_NODES.push(n);
    ALL_NODES.push(n);
  }
  // North road nodes — car only
  for (let y = MAIN_CY - GRID; y >= 0; y -= GRID) ALL_NODES.push({ x: SPINE_CX, y });

  // Crescent roads + perimeter + spine — car only
  const carYs = [CRES1_CY, CRES2_CY, CRES3_CY];
  for (const cy of carYs) {
    for (let x = 0; x <= TW; x += GRID) ALL_NODES.push({ x, y: cy });
  }
  // Vertical spine nodes
  for (let y = MAIN_CY; y <= CRES3_CY + GRID; y += GRID) ALL_NODES.push({ x: SPINE_CX, y });
  // West perimeter
  for (let y = MAIN_CY; y <= CRES3_CY + GRID; y += GRID) ALL_NODES.push({ x: WPERIM_CX, y });
  // East perimeter
  for (let y = MAIN_CY; y <= CRES3_CY + GRID; y += GRID) ALL_NODES.push({ x: EPERIM_CX, y });

  // Grass PED_NODES — any grid point within GRASS_RADIUS of a road, not inside a building/track
  for (let gx = 0; gx <= TW + 10 * GRID; gx += GRID) {
    for (let gy = 0; gy <= H; gy += GRID) {
      if (isInTrackZone(gx, gy)) continue;
      const onResBldg = BUILDING_BOXES.some(b => gx >= b.x && gx < b.x + b.w && gy >= b.y && gy < b.y + b.h);
      const onBakBldg = gx >= BK_FULL_X && gx < BK_FULL_X + BK_FULL_W && gy >= BK_FULL_Y && gy < BK_FULL_Y + BK_FULL_H;
      if (onResBldg || onBakBldg) continue;
      if (distToRoads(gx, gy) <= GRASS_RADIUS || isInPublicArea(gx, gy))
        PED_NODES.push({ x: gx, y: gy });
    }
  }
}

function nearestNode(x, y, nodes) {
  let best = nodes[0], bestD = Infinity;
  for (const n of nodes) {
    const d = (n.x - x) ** 2 + (n.y - y) ** 2;
    if (d < bestD) { bestD = d; best = n; }
  }
  return best;
}

// Check if a point is inside a foreign building/garden (not own home's building)
function insideForeignBuilding(x, y, homeId) {
  // Bakery full footprint — blocked for all town residents
  if (x >= BK_FULL_X && x < BK_FULL_X + BK_FULL_W &&
      y >= BK_FULL_Y && y < BK_FULL_Y + BK_FULL_H) return true;
  const h = homes[homeId];
  for (const box of BUILDING_BOXES) {
    if (box.bldgKey === `${h.rowIdx}_${h.bldgInRow}`) continue; // own building
    if (x >= box.x && x < box.x + box.w && y >= box.y && y < box.y + box.h) return true;
  }
  return false;
}

function safePedNode(x, y, homeId) {
  // Return nearest PED_NODE that isn't inside a foreign building
  let best = null, bestD = Infinity;
  for (const n of PED_NODES) {
    if (insideForeignBuilding(n.x, n.y, homeId)) continue;
    const d = (n.x - x) ** 2 + (n.y - y) ** 2;
    if (d < bestD) { bestD = d; best = n; }
  }
  return best || PED_NODES[0];
}

// Returns true if segment (x1,y1)→(x2,y2) passes through rectangle
function segCrossesBox(x1, y1, x2, y2, rx, ry, rw, rh) {
  function inside(x, y) { return x >= rx && x <= rx+rw && y >= ry && y <= ry+rh; }
  if (inside(x1, y1) || inside(x2, y2)) return true;
  function segSeg(ax,ay,bx,by,cx,cy,dx,dy) {
    const dax=bx-ax,day=by-ay,dcx=dx-cx,dcy=dy-cy;
    const d = dax*dcy - day*dcx; if (Math.abs(d)<1e-10) return false;
    const t = ((cx-ax)*dcy-(cy-ay)*dcx)/d;
    const s = ((cx-ax)*day-(cy-ay)*dax)/d;
    return t>=0&&t<=1&&s>=0&&s<=1;
  }
  return segSeg(x1,y1,x2,y2, rx,ry, rx+rw,ry) ||
         segSeg(x1,y1,x2,y2, rx+rw,ry, rx+rw,ry+rh) ||
         segSeg(x1,y1,x2,y2, rx+rw,ry+rh, rx,ry+rh) ||
         segSeg(x1,y1,x2,y2, rx,ry+rh, rx,ry);
}

// Returns false if the straight-line path from (x1,y1) to (x2,y2) crosses any foreign building
function pathClearForPed(x1, y1, x2, y2, homeId) {
  const h = homes[homeId];
  for (const box of BUILDING_BOXES) {
    if (box.bldgKey === `${h.rowIdx}_${h.bldgInRow}`) continue;
    if (segCrossesBox(x1, y1, x2, y2, box.x, box.y, box.w, box.h)) return false;
  }
  // Bakery is also forbidden (fixed footprint)
  return !segCrossesBox(x1, y1, x2, y2, BK_FULL_X, BK_FULL_Y, BK_FULL_W, BK_FULL_H);
}

function randomPedNode(homeId, fromX, fromY) {
  // Try up to 50 random nodes; reject those inside or path-crossing foreign buildings
  for (let i = 0; i < 50; i++) {
    const n = PED_NODES[Math.floor(Math.random() * PED_NODES.length)];
    if (insideForeignBuilding(n.x, n.y, homeId)) continue;
    if (!pathClearForPed(fromX, fromY, n.x, n.y, homeId)) continue;
    return n;
  }
  // Fallback: nearest main-street node that is path-clear
  const ms = PED_NODES.filter(n => Math.abs(n.y - MAIN_CY) < 1 && pathClearForPed(fromX, fromY, n.x, n.y, homeId));
  return ms.length ? ms[Math.floor(Math.random() * ms.length)] : PED_NODES[0];
}
function randomCarNode() {
  return ALL_NODES[Math.floor(Math.random() * ALL_NODES.length)];
}

// ── Step 4b: Drive path builders ──────────────────────────────────────────
// Road immediately above each row's garden (the road cars exit from for drv homes)
// and the crescent below for std homes.
function exitRoadCY(h) {
  if (h.variant === 'drv')
    return h.rowIdx === 0 ? MAIN_CY : h.rowIdx === 1 ? CRES1_CY : CRES2_CY;
  return h.rowIdx === 0 ? CRES1_CY : h.rowIdx === 1 ? CRES2_CY : CRES3_CY;
}
function buildDrivePath(p) {
  const h   = homes[p.homeId];
  const roadCY = exitRoadCY(h);
  const raw = [
    { x: h.parkingX + 9, y: roadCY },  // exit straight onto road above/below parking
    { x: SPINE_CX,       y: roadCY },  // across to spine
    { x: SPINE_CX,       y: MAIN_CY }, // up/down spine to main street
  ];
  const extra = 2 + Math.floor(Math.random() * 4);  // 2–5 roaming waypoints
  for (let i = 0; i < extra; i++) {
    // Only roam on main street — ensures all axis-aligned legs stay on valid roads
    raw.push({ x: Math.round(Math.random() * (900 / GRID)) * GRID, y: MAIN_CY });
  }
  return makeAxisAligned(p.car.x, p.car.y, raw);
}
function buildReturnDrivePath(p, destX, destY) {
  const h      = homes[p.homeId];
  const roadCY = exitRoadCY(h);
  const raw = [
    { x: SPINE_CX, y: MAIN_CY },  // return to spine at main street
    { x: SPINE_CX, y: roadCY },   // down/up spine to approach road
    { x: destX,    y: roadCY },   // along road to parking column
    { x: destX,    y: destY },    // into parking spot
  ];
  return makeAxisAligned(p.car.x, p.car.y, raw);
}

// ── Step 5: buildPeople() ─────────────────────────────────────────────────
function buildPeople() {
  people = [];
  for (const h of homes) {
    const spawnX = h.houseRect.hx + 9;
    const spawnY = h.houseRect.hy + 9;
    people.push({
      id: h.id, homeId: h.id,
      x: spawnX, y: spawnY,
      state: 'AT_HOME', stateTimer: 0,
      path: [],
      paceIdx: 0,                    // index into PACE waypoint list
      car: { x: h.parkingX + 9, y: h.parkingY + 6, parked: true, heading: h.parkingHeading, speed: CAR_SPEED },
      skin: { headColor: '#f4c2a1', shirtColor: h.color, carColor: h.color },
      legFrame: 0, moveDist: 0,
      tiredness: 0, tirednessTimer: 0, sleepOnReturn: false,
      visible: true,
      interactPartner: null,
      interactCooldown: 0,
    });
  }
}

// ── Step 6: Full state machine ────────────────────────────────────────────
function stepToward(obj, tx, ty, speed, dt) {
  const dx = tx - obj.x, dy = ty - obj.y;
  const dist = Math.hypot(dx, dy);
  if (dist < speed * dt + 0.5) { obj.x = tx; obj.y = ty; return true; }
  obj.x += (dx / dist) * speed * dt;
  obj.y += (dy / dist) * speed * dt;
  return false;
}

// Car–pedestrian yielding: returns effective car speed
function carEffectiveSpeed(car) {
  for (const p of people) {
    if (!p.visible) continue;
    if (['AT_HOME','SLEEPING','PACE'].includes(p.state)) continue;
    const d = Math.hypot(p.x - car.x, p.y - car.y);
    if (d < 9)  return 0;
    if (d < 18) return CAR_SPEED * 0.15;
  }
  return CAR_SPEED;
}

function updatePerson(p, dt) {
  const h = homes[p.homeId];

  // Cooldown tick
  if (p.interactCooldown > 0) p.interactCooldown = Math.max(0, p.interactCooldown - dt);

  // Tiredness — accumulates each second while not at home/asleep; forces return at 100
  if (p.state !== 'AT_HOME' && p.state !== 'SLEEPING') {
    p.tirednessTimer += dt;
    if (p.tirednessTimer >= 1.0) {
      p.tirednessTimer -= 1.0;
      p.tiredness = Math.min(100, p.tiredness + Math.floor(Math.random() * 3)); // 0/1/2 avg 1/s → ~100s
    }
    if (p.tiredness >= 100 && !p.sleepOnReturn) {
      p.sleepOnReturn = true;
      if (p.state === 'WANDER') startReturn(p, h);
    }
  }

  // Snapshot position before state tick (for distance-based leg animation below)
  const px0 = p.x, py0 = p.y;

  switch (p.state) {

    case 'AT_HOME': {
      // Keep inside room
      p.x = h.houseRect.hx + 9; p.y = h.houseRect.hy + 9;
      if (Math.random() < 0.003)  { startExit(p, h); break; }   // 0.3% — leave house
      if (Math.random() < 0.004)  { startPace(p, h); break; }   // 0.4% — pace indoors
      if (Math.random() < 0.0015) { startSleep(p, h); }          // 0.15% — go to sleep
      break;
    }

    case 'SLEEPING': {
      // Move toward bed
      stepToward(p, h.bedX + 3, h.bedY + 4, WALK_SPEED, dt);
      p.stateTimer -= dt;
      if (p.stateTimer <= 0) { p.state = 'AT_HOME'; p.x = h.houseRect.hx + 9; p.y = h.houseRect.hy + 9; }
      break;
    }

    case 'PACE': {
      if (p.path.length === 0) { p.state = 'AT_HOME'; break; }
      const wp = p.path[0];
      if (stepToward(p, wp.x, wp.y, WALK_SPEED * 0.5, dt)) p.path.shift();
      break;
    }

    case 'EXIT_HOUSE': {
      if (p.path.length === 0) {
        if (Math.random() < 0.40 && p.car.parked) {
          p.state = 'ENTER_CAR';
          p.path  = [{ x: h.parkingX + 9, y: h.parkingY + 6 }];
        } else {
          p.state = 'WANDER';
          p.path  = [randomPedNode(p.homeId, p.x, p.y)];
        }
      } else {
        const wp = p.path[0];
        if (stepToward(p, wp.x, wp.y, WALK_SPEED, dt)) p.path.shift();
      }
      break;
    }

    case 'WANDER': {
      if (p.path.length === 0) {
        if (Math.random() < 0.02) { startReturn(p, h); break; }  // 2% — head home
        p.path = [randomPedNode(p.homeId, p.x, p.y)];
      } else {
        const wp = p.path[0];
        if (stepToward(p, wp.x, wp.y, WALK_SPEED, dt)) p.path.shift();
      }
      // Interaction check (0.5%)
      if (p.state === 'WANDER' && !p.interactPartner && p.interactCooldown === 0) {
        for (const q of people) {
          if (q === p || q.state !== 'WANDER' || q.interactPartner || q.interactCooldown > 0) continue;
          if (Math.hypot(q.x - p.x, q.y - p.y) < 12 && Math.random() < 0.007) {
            const dur = 4 + Math.random() * 3;
            p.state = 'INTERACT'; p.stateTimer = dur; p.interactPartner = q;
            q.state = 'INTERACT'; q.stateTimer = dur; q.interactPartner = p;
            p.path = []; q.path = [];
            break;
          }
        }
      }
      break;
    }

    case 'INTERACT': {
      p.stateTimer -= dt;
      if (p.stateTimer <= 0) {
        p.state = 'WANDER'; p.interactPartner = null;
        p.interactCooldown = 1.0;
        p.path = [randomPedNode(p.homeId, p.x, p.y)];
      }
      break;
    }

    case 'RETURN': {
      if (p.path.length === 0) {
        p.x = h.houseRect.hx + 9; p.y = h.houseRect.hy + 9;
        if (p.sleepOnReturn) { p.sleepOnReturn = false; startSleep(p, h); }
        else p.state = 'AT_HOME';
      } else {
        const wp = p.path[0];
        if (stepToward(p, wp.x, wp.y, WALK_SPEED, dt)) p.path.shift();
      }
      break;
    }

    case 'ENTER_CAR': {
      if (p.path.length === 0) {
        p.visible = false;
        p.car.parked = false;
        p.car.x = h.parkingX + 9; p.car.y = h.parkingY + 6;
        p.state = 'DRIVE';
        p.path  = buildDrivePath(p);
      } else {
        const wp = p.path[0];
        if (stepToward(p, wp.x, wp.y, WALK_SPEED, dt)) p.path.shift();
      }
      break;
    }

    case 'DRIVE': {
      if (p.path.length === 0) {
        p.state = 'PARK_CAR';
        p.path  = buildReturnDrivePath(p, h.parkingX + 9, h.parkingY + 6);
      } else {
        const spd = carEffectiveSpeed(p.car);
        const wp  = p.path[0];
        const dx  = wp.x - p.car.x, dy = wp.y - p.car.y;
        if (Math.abs(dx) > Math.abs(dy)) p.car.heading = dx > 0 ? 'E' : 'W';
        else p.car.heading = dy > 0 ? 'S' : 'N';
        if (stepToward(p.car, wp.x, wp.y, spd, dt)) p.path.shift();
      }
      break;
    }

    case 'PARK_CAR': {
      if (p.path.length === 0) {
        p.car.parked = true; p.car.heading = h.parkingHeading;
        p.car.x = h.parkingX + 9; p.car.y = h.parkingY + 6;
        p.x = h.parkingX + 9; p.y = h.parkingY + 6;
        p.visible = true;
        // Person is on own property (driveway or crescent directly below gate).
        // Walk straight to gate then door — no need to route via the road network.
        p.state = 'RETURN';
        p.path = [
          { x: h.gate.x + 2, y: h.gate.y + 1 },
          { x: h.doorX + 1,  y: h.doorY + 2 },
        ];
      } else {
        const spd = carEffectiveSpeed(p.car);
        const wp  = p.path[0];
        const dx  = wp.x - p.car.x, dy = wp.y - p.car.y;
        if (Math.abs(dx) > Math.abs(dy)) p.car.heading = dx > 0 ? 'E' : 'W';
        else p.car.heading = dy > 0 ? 'S' : 'N';
        if (stepToward(p.car, wp.x, wp.y, spd, dt)) p.path.shift();
      }
      break;
    }
  }

  // Leg animation: toggle every 4px traveled — stable, speed-independent
  p.moveDist += Math.hypot(p.x - px0, p.y - py0);
  if (p.moveDist >= 4) { p.legFrame = (p.legFrame + 1) % 3; p.moveDist -= 4; }
}

// ── State transition helpers ───────────────────────────────────────────────
function startExit(p, h) {
  p.state = 'EXIT_HOUSE';
  const gx = h.gate.x + 2, gy = h.gate.y + 1;
  // Road that sits directly above this row's garden (gate faces onto it)
  const roadAboveY = h.rowIdx === 0 ? MAIN_CY : h.rowIdx === 1 ? CRES1_CY : CRES2_CY;
  p.path = [
    { x: h.doorX + 1, y: h.doorY + 2 },
    { x: gx, y: gy },
    { x: gx, y: roadAboveY },
  ];
}

function startReturn(p, h) {
  p.state = 'RETURN';
  const gx = h.gate.x + 2;
  const gy = h.gate.y + 1;
  // Road that approaches this home's garden from above
  const roadAboveY = h.rowIdx === 0 ? MAIN_CY : h.rowIdx === 1 ? CRES1_CY : CRES2_CY;

  // Find the road centreline nearest to the person's current Y position.
  // Moving nearly-horizontally to the spine at that road level keeps the path
  // within the road zone and avoids crossing the building rows between roads.
  const roadYs = [MAIN_CY, CRES1_CY, CRES2_CY, CRES3_CY];
  let nearRoadY = MAIN_CY, minD = Infinity;
  for (const ry of roadYs) { const d = Math.abs(p.y - ry); if (d < minD) { minD = d; nearRoadY = ry; } }

  // Each segment of this path stays on a safe corridor:
  //  current → spine@nearRoad : nearly-horizontal, within road zone
  //  spine@nearRoad → spine@roadAboveY : vertical on spine (X=144, no buildings)
  //  spine@roadAboveY → gx@roadAboveY  : horizontal on access road
  //  gx@roadAboveY → gate              : short step into garden
  //  gate → door
  const raw = [
    { x: SPINE_CX, y: nearRoadY },
    { x: SPINE_CX, y: roadAboveY },
    { x: gx,       y: roadAboveY },
    { x: gx,       y: gy },
    { x: h.doorX + 1, y: h.doorY + 2 },
  ];
  // Remove consecutive duplicate waypoints (degenerate when person is already at spine/road)
  p.path = raw.filter((wp, i) => i === 0 || Math.abs(wp.x - raw[i-1].x) > 0.5 || Math.abs(wp.y - raw[i-1].y) > 0.5);
}

function startSleep(p, h) {
  p.state = 'SLEEPING';
  p.stateTimer = 8 + Math.random() * 12;
  p.tiredness = 0;
  p.tirednessTimer = 0;
}

function startPace(p, h) {
  p.state = 'PACE';
  const cx = h.houseRect.hx + 9, cy = h.houseRect.hy + 9;
  p.path = [
    { x: h.doorX + 1, y: h.doorY + 3 },
    { x: h.bedX + 3,  y: h.bedY + 4 },
    { x: cx, y: cy },
  ];
}

// ── Bakery: walk path from any home to the bakery door ────────────────────
function walkToBakeryPath(h) {
  const gx = h.gate.x + 2, gy = h.gate.y + 1;
  const roadAboveY = h.rowIdx === 0 ? MAIN_CY : h.rowIdx === 1 ? CRES1_CY : CRES2_CY;
  return makeAxisAligned(h.houseRect.hx + 9, h.houseRect.hy + 9, [
    { x: h.doorX + 1,        y: h.doorY + 2 },
    { x: gx,                 y: gy },
    { x: gx,                 y: roadAboveY },
    { x: SPINE_CX,           y: roadAboveY },
    { x: SPINE_CX,           y: MAIN_CY },
    { x: BK_BAKER_ENTRY_X,  y: MAIN_CY },
    { x: BK_BAKER_ENTRY_X,  y: BK_BAKER_ENTRY_Y },
  ]);
}

// ── Bakery: init ──────────────────────────────────────────────────────────
function initBakery() {
  const trucks = BK_TRUCK_DEFS.map((def, i) => ({
    ...def,
    pallets: Array(def.palletCols * def.palletRows).fill(true),
    id: i,
  }));

  const storageGrid = BK_STORAGE_CELLS.map(sc => ({ ...sc, hasPallet: false }));

  // Pick 3 random distinct homes for bakery workers
  const pool = [...Array(homes.length).keys()].sort(() => Math.random() - 0.5);
  const [jiggIdx, bakerIdx, serverIdx] = pool;

  function makeActor(homeIdx, role, extraWaypoints) {
    const h = homes[homeIdx];
    const basePath = walkToBakeryPath(h);
    // Append extra waypoints after the bakery door (axis-align each segment)
    let fullPath = [...basePath];
    let lastX = BK_BAKER_ENTRY_X, lastY = BK_BAKER_ENTRY_Y;
    for (const wp of extraWaypoints) {
      if (Math.abs(wp.x - lastX) > 0.5 && Math.abs(wp.y - lastY) > 0.5)
        fullPath.push({ x: wp.x, y: lastY });
      fullPath.push({ x: wp.x, y: wp.y });
      lastX = wp.x; lastY = wp.y;
    }
    return {
      role, homeIdx,
      x: h.houseRect.hx + 9, y: h.houseRect.hy + 9,
      skin: { headColor: '#f4c2a1', shirtColor: h.color },
      path: fullPath,
      legFrame: 0, moveDist: 0,
      bkState: 'WALK_TO_BAKERY',
      stateTimer: 0,
      carrying: null,
      visible: true,
      _px: 0, _py: 0,
    };
  }

  const jiggWorker = makeActor(jiggIdx, 'jigger_worker', [
    { x: BK_JIGGER_HOME_X, y: BK_BAKER_ENTRY_Y },
    { x: BK_JIGGER_HOME_X, y: BK_JIGGER_HOME_Y },
  ]);
  jiggWorker.currentTruck  = 0;
  jiggWorker.currentPallet = trucks[0].pallets.length - 1;  // start from nearest pallet
  jiggWorker.delivered     = 0;
  jiggWorker.targetStorage = null;

  const baker = makeActor(bakerIdx, 'baker', []);
  baker.nextOven = 0;
  baker.floursDeposited = 0;
  baker.targetStorage = null;

  const server = makeActor(serverIdx, 'server', [
    { x: BK_SERVER_X, y: BK_BAKER_ENTRY_Y },
    { x: BK_SERVER_X, y: BK_SERVER_Y },
  ]);
  server.targetOven = -1;

  bakery = {
    trucks, storageGrid,
    ovens: [
      { x: BK_OVEN1_X, y: BK_OVEN1_Y, baking: false, timer: 0, loafReady: false, glowPhase: 0 },
      { x: BK_OVEN2_X, y: BK_OVEN2_Y, baking: false, timer: 0, loafReady: false, glowPhase: 0 },
    ],
    breadCount: 0,
    jiggWorker, baker, server,
    jigger: { x: BK_JIGGER_HOME_X, y: BK_JIGGER_HOME_Y, heading: 'N', palletLoaded: false },
  };
}

// Move actor one step along path; returns true when path exhausted
function moveActor(actor, dt) {
  if (actor.path.length === 0) return true;
  const px0 = actor.x, py0 = actor.y;
  const wp = actor.path[0];
  if (stepToward(actor, wp.x, wp.y, WALK_SPEED, dt)) actor.path.shift();
  actor.moveDist += Math.hypot(actor.x - px0, actor.y - py0);
  if (actor.moveDist >= 4) { actor.legFrame = (actor.legFrame + 1) % 3; actor.moveDist -= 4; }
  return actor.path.length === 0;
}

// ── Bakery: update orchestrator ───────────────────────────────────────────
function updateBakery(dt) {
  if (!bakery) return;
  for (const ov of bakery.ovens) {
    if (ov.baking) {
      ov.glowPhase += dt * 4;
      if (!ov.loafReady) { ov.timer -= dt; if (ov.timer <= 0) ov.loafReady = true; }
    }
  }
  updateJiggerWorker(dt);
  updateBakerActor(dt);
  updateServerActor(dt);
}

// ── Jigger worker state machine ───────────────────────────────────────────
function updateJiggerWorker(dt) {
  const w  = bakery.jiggWorker;
  const jg = bakery.jigger;

  switch (w.bkState) {

    case 'WALK_TO_BAKERY': {
      const done = moveActor(w, dt);
      if (done) {
        // All walk-to path waypoints consumed (includes walk-to-jigger-home steps)
        w.bkState = 'AT_JIGGER';
        w.stateTimer = 0.4;
      }
      break;
    }

    case 'AT_JIGGER': {
      w.stateTimer -= dt;
      jg.x = w.x; jg.y = w.y;
      if (w.stateTimer <= 0) w.bkState = 'FIND_PALLET';
      break;
    }

    case 'FIND_PALLET': {
      if (w.delivered >= 20) { w.bkState = 'JIGGER_IDLE'; break; }
      const emptyStorage = bakery.storageGrid.find(s => !s.hasPallet);
      if (!emptyStorage) { w.stateTimer = 0.5; w.bkState = 'WAIT_STORAGE'; break; }

      // Scan trucks from current position, taking nearest pallet first (high idx = near)
      let found = false;
      outer: for (let ti = w.currentTruck; ti < bakery.trucks.length; ti++) {
        const tr = bakery.trucks[ti];
        const startPi = (ti === w.currentTruck) ? w.currentPallet : tr.pallets.length - 1;
        for (let pi = startPi; pi >= 0; pi--) {
          if (tr.pallets[pi]) {
            w.currentTruck  = ti;
            w.currentPallet = pi;
            found = true;
            break outer;
          }
        }
        // This truck exhausted — move to next
        w.currentTruck = ti + 1;
        if (ti + 1 < bakery.trucks.length)
          w.currentPallet = bakery.trucks[ti + 1].pallets.length - 1;
      }
      if (!found) { w.bkState = 'JIGGER_IDLE'; break; }
      w.targetStorage = emptyStorage;

      // Compute pallet world centre
      const def = BK_TRUCK_DEFS[w.currentTruck];
      const tr  = bakery.trucks[w.currentTruck];
      const palW = tr.w / def.palletCols;
      const palH = tr.h / def.palletRows;
      const pi   = w.currentPallet;
      // idx mapping: pr = (palletRows-1) - floor(idx/palletCols)  (pr=0 → bottom/near)
      const pr   = (def.palletRows - 1) - Math.floor(pi / def.palletCols);
      const pc   = pi % def.palletCols;
      const palCY = tr.y + (tr.h - (pr + 1) * palH) + palH / 2;
      const palCX = tr.x + pc * palW + palW / 2;
      w._palCX = palCX; w._palCY = palCY;

      // Lane approach X
      if      (w.currentTruck === 0) w._laneX = BK_LANE1_CX;
      else if (w.currentTruck === 1) w._laneX = BK_LANE2_CX;
      else w._laneX = tr.x + tr.w / 2;  // small trucks: direct centre

      w.path = makeAxisAligned(w.x, w.y, [
        { x: w._laneX, y: w.y },
        { x: w._laneX, y: palCY },
      ]);
      w.bkState = 'APPROACH_TRUCK';
      break;
    }

    case 'WAIT_STORAGE': {
      w.stateTimer -= dt;
      jg.x = w.x; jg.y = w.y;
      if (w.stateTimer <= 0) w.bkState = 'FIND_PALLET';
      break;
    }

    case 'APPROACH_TRUCK': {
      if (w.path.length > 0) {
        const wp = w.path[0];
        const dx = wp.x - w.x, dy = wp.y - w.y;
        if (Math.abs(dx) > Math.abs(dy)) jg.heading = dx > 0 ? 'E' : 'W';
        else jg.heading = dy > 0 ? 'S' : 'N';
      }
      const done = moveActor(w, dt);
      jg.x = w.x; jg.y = w.y;
      if (done) {
        // Face toward truck interior
        jg.heading = (w.currentTruck <= 1) ? 'W' : 'N';
        w.stateTimer = 0.7;
        w.bkState = 'LOAD_PAUSE';
      }
      break;
    }

    case 'LOAD_PAUSE': {
      w.stateTimer -= dt;
      jg.x = w.x; jg.y = w.y;
      if (w.stateTimer <= 0) {
        bakery.trucks[w.currentTruck].pallets[w.currentPallet] = false;
        jg.palletLoaded = true;
        jg.heading = (w.currentTruck <= 1) ? 'E' : 'S';
        // Path to storage
        const st = w.targetStorage;
        w.path = makeAxisAligned(w.x, w.y, [
          { x: w._laneX, y: BK_INT_Y + 9 },
          { x: st.cx,    y: BK_INT_Y + 9 },
          { x: st.cx,    y: st.cy },
        ]);
        w.bkState = 'CARRY_TO_STORAGE';
      }
      break;
    }

    case 'CARRY_TO_STORAGE': {
      if (w.path.length > 0) {
        const wp = w.path[0];
        const dx = wp.x - w.x, dy = wp.y - w.y;
        if (Math.abs(dx) > Math.abs(dy)) jg.heading = dx > 0 ? 'E' : 'W';
        else jg.heading = dy > 0 ? 'S' : 'N';
      }
      const done = moveActor(w, dt);
      jg.x = w.x; jg.y = w.y;
      if (done) { jg.heading = 'S'; w.stateTimer = 0.7; w.bkState = 'DROP_PAUSE'; }
      break;
    }

    case 'DROP_PAUSE': {
      w.stateTimer -= dt;
      jg.x = w.x; jg.y = w.y;
      if (w.stateTimer <= 0) {
        w.targetStorage.hasPallet = true;
        jg.palletLoaded = false;
        w.delivered++;
        // Advance to next pallet index
        w.currentPallet--;
        if (w.currentPallet < 0 && w.currentTruck + 1 < bakery.trucks.length) {
          w.currentTruck++;
          w.currentPallet = bakery.trucks[w.currentTruck].pallets.length - 1;
        }
        // Return jigger to lane before picking next
        w.path = [{ x: w._laneX, y: w.y }];
        w.bkState = 'RETURN_TO_LANE';
      }
      break;
    }

    case 'RETURN_TO_LANE': {
      const done = moveActor(w, dt);
      jg.x = w.x; jg.y = w.y;
      if (done) w.bkState = 'FIND_PALLET';
      break;
    }

    case 'JIGGER_IDLE':
      jg.x = BK_JIGGER_HOME_X; jg.y = BK_JIGGER_HOME_Y; jg.heading = 'N';
      break;
  }
}

// ── Baker state machine ───────────────────────────────────────────────────
function updateBakerActor(dt) {
  const b = bakery.baker;
  switch (b.bkState) {

    case 'WALK_TO_BAKERY': {
      if (moveActor(b, dt)) b.bkState = 'FIND_FLOUR';
      break;
    }

    case 'FIND_FLOUR': {
      if (b.floursDeposited >= 20) { b.bkState = 'BAKER_IDLE'; break; }
      // Wait for target oven to not already be baking
      const targetOv = bakery.ovens[b.nextOven];
      if (targetOv.baking) { b.stateTimer = 0.5; b.bkState = 'WAIT_OVEN'; break; }
      // Find nearest storage cell with pallet
      let nearest = null, nearD = Infinity;
      for (const sc of bakery.storageGrid) {
        if (!sc.hasPallet) continue;
        const d = (sc.cx - b.x) ** 2 + (sc.cy - b.y) ** 2;
        if (d < nearD) { nearD = d; nearest = sc; }
      }
      if (!nearest) { b.stateTimer = 0.5; b.bkState = 'WAIT_FLOUR'; break; }
      b.targetStorage = nearest;
      b.path = makeAxisAligned(b.x, b.y, [
        { x: nearest.cx, y: b.y },
        { x: nearest.cx, y: nearest.cy },
      ]);
      b.bkState = 'WALK_TO_FLOUR';
      break;
    }

    case 'WAIT_OVEN':
    case 'WAIT_FLOUR': {
      b.stateTimer -= dt;
      if (b.stateTimer <= 0) b.bkState = 'FIND_FLOUR';
      break;
    }

    case 'WALK_TO_FLOUR': {
      if (moveActor(b, dt)) { b.stateTimer = 0.4; b.bkState = 'PICK_FLOUR'; }
      break;
    }

    case 'PICK_FLOUR': {
      b.stateTimer -= dt;
      if (b.stateTimer <= 0) {
        if (b.targetStorage && b.targetStorage.hasPallet) {
          b.targetStorage.hasPallet = false;
          b.carrying = 'flour';
          const ov = bakery.ovens[b.nextOven];
          b.path = makeAxisAligned(b.x, b.y, [
            { x: ov.x + 9, y: b.y },
            { x: ov.x + 9, y: ov.y + 9 },
          ]);
          b.bkState = 'WALK_TO_OVEN';
        } else {
          b.bkState = 'FIND_FLOUR';  // pallet was taken, retry
        }
      }
      break;
    }

    case 'WALK_TO_OVEN': {
      if (moveActor(b, dt)) { b.stateTimer = 0.4; b.bkState = 'DEPOSIT_FLOUR'; }
      break;
    }

    case 'DEPOSIT_FLOUR': {
      b.stateTimer -= dt;
      if (b.stateTimer <= 0) {
        b.carrying = null;
        const ov = bakery.ovens[b.nextOven];
        ov.baking = true; ov.timer = 3.0; ov.glowPhase = 0; ov.loafReady = false;
        b.nextOven = (b.nextOven + 1) % 2;
        b.floursDeposited++;
        b.bkState = 'FIND_FLOUR';
      }
      break;
    }

    case 'BAKER_IDLE': break;
  }
}

// ── Server state machine ──────────────────────────────────────────────────
function updateServerActor(dt) {
  const s = bakery.server;
  switch (s.bkState) {

    case 'WALK_TO_BAKERY': {
      if (moveActor(s, dt)) s.bkState = 'AT_POST';
      break;
    }

    case 'AT_POST': {
      if (bakery.breadCount >= 20) { s.bkState = 'SERVER_IDLE'; break; }
      for (let i = 0; i < 2; i++) {
        if (bakery.ovens[i].loafReady) {
          s.targetOven = i;
          const ov = bakery.ovens[i];
          s.path = makeAxisAligned(s.x, s.y, [
            { x: ov.x + 9, y: s.y },
            { x: ov.x + 9, y: ov.y + 9 },
          ]);
          s.bkState = 'WALK_TO_OVEN';
          break;
        }
      }
      break;
    }

    case 'WALK_TO_OVEN': {
      if (moveActor(s, dt)) { s.stateTimer = 0.4; s.bkState = 'PICK_LOAF'; }
      break;
    }

    case 'PICK_LOAF': {
      s.stateTimer -= dt;
      if (s.stateTimer <= 0) {
        const ov = bakery.ovens[s.targetOven];
        ov.loafReady = false; ov.baking = false;
        s.carrying = 'loaf';
        const vcIdx = Math.floor(bakery.breadCount / 4);
        if (vcIdx >= 5) { s.bkState = 'SERVER_IDLE'; break; }
        const vc = BK_V_CELLS[vcIdx];
        s.path = makeAxisAligned(s.x, s.y, [
          { x: vc.x + 9, y: s.y },
          { x: vc.x + 9, y: vc.y + 9 },
        ]);
        s.bkState = 'WALK_TO_SLOT';
      }
      break;
    }

    case 'WALK_TO_SLOT': {
      if (moveActor(s, dt)) { s.stateTimer = 0.3; s.bkState = 'PLACE_LOAF'; }
      break;
    }

    case 'PLACE_LOAF': {
      s.stateTimer -= dt;
      if (s.stateTimer <= 0) {
        s.carrying = null;
        bakery.breadCount++;
        s.path = makeAxisAligned(s.x, s.y, [
          { x: BK_SERVER_X, y: s.y },
          { x: BK_SERVER_X, y: BK_SERVER_Y },
        ]);
        s.bkState = 'RETURN_TO_POST';
      }
      break;
    }

    case 'RETURN_TO_POST': {
      if (moveActor(s, dt)) s.bkState = 'AT_POST';
      break;
    }

    case 'SERVER_IDLE': break;
  }
}

// ── Update ────────────────────────────────────────────────────────────────
function update(dt) {
  for (const p of people) updatePerson(p, dt);
  updateBakery(dt);
}

// ── Init ──────────────────────────────────────────────────────────────────
initVariants();
buildHomes();
buildStreetNodes();
buildPeople();
initBakery();
requestAnimationFrame(animate);
</script>
