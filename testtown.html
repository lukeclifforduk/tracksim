<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Test Town</title>
  <style>
    body { margin: 0; background: #222; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; image-rendering: pixelated; }
    canvas { display: block; image-rendering: pixelated; }
  </style>
</head>
<body>
<canvas id="c" width="1200" height="700"></canvas>
<script>
'use strict';

// ── Constants ──────────────────────────────────────────────────────────────
const W = 1200, H = 700;
const GRID = 18;
const WALK_SPEED = 28;
const CAR_SPEED  = 50;

// Town footprint: X=0-270, Y=430-700 (flush corner, 15×15 grid)
const TX = 0,   TY = 430;
const TW = 270, TH = 270;

// Road Y coordinates (top of each 18px road strip)
const MAIN_Y  = 448;   // Main E-W street
const CRES1_Y = 502;   // Crescent 1
const CRES2_Y = 556;   // Crescent 2
const CRES3_Y = 610;   // Crescent 3 (south loop)

// Road X coordinates (left edge of each 18px road strip)
const WPERIM_X = 0;    // West perimeter
const SPINE_X  = 126;  // Central spine
const EPERIM_X = 252;  // East perimeter
const NORTH_X  = 126;  // North entry (same as spine)

// Road centre lines (for waypoints)
const MAIN_CY  = MAIN_Y  + GRID / 2;   // 457
const CRES1_CY = CRES1_Y + GRID / 2;   // 511
const CRES2_CY = CRES2_Y + GRID / 2;   // 565
const CRES3_CY = CRES3_Y + GRID / 2;   // 619
const WPERIM_CX = WPERIM_X + GRID / 2; //   9
const SPINE_CX  = SPINE_X  + GRID / 2; // 135
const EPERIM_CX = EPERIM_X + GRID / 2; // 261

// Residential rows: garden starts right below main street
// Row garden faces the road above it; parking/access is the crescent below
const ROWS = [
  { gardenY: 466, houseY: 484, crescentY: CRES1_Y },
  { gardenY: 520, houseY: 538, crescentY: CRES2_Y },
  { gardenY: 574, houseY: 592, crescentY: CRES3_Y },
];

// 6 buildings per row, bilateral symmetric about X=135
const BLDG_XS = [18, 54, 90, 144, 180, 216];
// Variants per building position (bilateral: pos 0↔5, 1↔4, 2↔3)
// drv = driveway parking, std = road bay parking
const BLDG_VARIANTS = ['drv','std','drv','drv','std','drv'];

// ── Colour palette ─────────────────────────────────────────────────────────
const PALETTE = [
  '#b25a3c','#c9a043','#6a8e5a','#3d7c8c','#5a6a8e',
  '#8e3d4a','#6a4d7a','#d9c9a3','#4a6e4a','#a87a4a',
];

// ── Sprites ────────────────────────────────────────────────────────────────
// Person: 5×9px  P=head, S=shirt(palette), B=black
const PERSON_BASE = [
  ['_','P','P','P','_'],['_','P','P','P','_'],['_','P','P','P','_'],
  ['_','S','S','S','_'],['_','S','S','S','_'],['_','S','S','S','_'],
  ['_','B','B','B','_'],['_','B','B','B','_'],['_','B','_','B','_'],
];
const PERSON_WALK = [
  ['_','P','P','P','_'],['_','P','P','P','_'],['_','P','P','P','_'],
  ['_','S','S','S','_'],['_','S','S','S','_'],['_','S','S','S','_'],
  ['_','B','B','B','_'],['B','_','_','_','B'],['_','_','_','_','_'],
];

// Car: 18×12px  B=body(palette), K=outline, W=windshield, G=window
const CAR_BASE = [
  ['_','_','_','_','K','K','K','_','_','_','_','K','K','K','_','_','_','_'],
  ['_','_','_','K','B','B','B','B','B','B','B','B','B','B','K','_','_','_'],
  ['K','K','K','K','B','B','B','B','B','B','B','B','B','B','K','K','K','K'],
  ['K','B','B','K','B','B','B','B','B','B','K','K','K','K','K','B','B','K'],
  ['K','B','B','K','B','B','B','B','B','B','K','W','W','W','K','B','B','K'],
  ['K','B','B','K','B','B','B','B','B','B','K','W','W','W','K','B','B','K'],
  ['K','B','B','K','B','B','B','B','B','B','K','W','W','W','K','B','B','K'],
  ['K','B','B','K','B','B','B','B','B','B','K','W','W','W','K','B','B','K'],
  ['K','B','B','K','B','B','B','B','B','B','K','K','K','K','K','B','B','K'],
  ['K','K','K','K','B','B','B','B','B','B','B','B','B','B','K','K','K','K'],
  ['_','_','_','K','B','B','B','B','B','B','B','B','B','B','K','_','_','_'],
  ['_','_','_','_','K','K','K','_','_','_','_','_','K','K','K','_','_','_'],
];

function rotateSprite(s) {
  const rows = s.length, cols = s[0].length;
  const out = Array.from({length: cols}, () => Array(rows).fill('_'));
  for (let r = 0; r < rows; r++)
    for (let c = 0; c < cols; c++)
      out[c][rows - 1 - r] = s[r][c];
  return out;
}
const CAR_E = CAR_BASE;
const CAR_S = rotateSprite(CAR_E);
const CAR_W = rotateSprite(CAR_S);
const CAR_N = rotateSprite(CAR_W);
const CAR_SPRITES = { E: CAR_E, S: CAR_S, W: CAR_W, N: CAR_N };

// ── Canvas ─────────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

// ── Global state ───────────────────────────────────────────────────────────
let homes  = [];
let people = [];
let BUILDING_BOXES = [];
let PED_NODES = [];
let ALL_NODES = [];
let lastT  = null;

// ── FPS tracking ──────────────────────────────────────────────────────────
let _fps = 60, _fpsTimer = 0, _fpsFrames = 0;
function updateFps(dt) {
  _fpsFrames++;
  _fpsTimer += dt;
  if (_fpsTimer >= 0.5) { _fps = Math.round(_fpsFrames / _fpsTimer); _fpsFrames = 0; _fpsTimer = 0; }
}

// ── Animation loop ────────────────────────────────────────────────────────
function animate(ts) {
  const dt = lastT === null ? 0 : Math.min((ts - lastT) / 1000, 0.1);
  lastT = ts;
  updateFps(dt);
  update(dt);
  draw();
  requestAnimationFrame(animate);
}

// ── Draw helpers ───────────────────────────────────────────────────────────
function dashedLine(x1, y1, x2, y2) {
  ctx.save();
  ctx.strokeStyle = '#e0e0e0';
  ctx.lineWidth = 1;
  ctx.setLineDash([6, 6]);
  ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
  ctx.setLineDash([]); ctx.restore();
}

function road(x, y, w, h, cx, cy, cx2, cy2) {
  ctx.fillStyle = '#3f3f3f';
  ctx.fillRect(x, y, w, h);
  if (cx !== undefined) dashedLine(cx, cy, cx2 !== undefined ? cx2 : cx, cy2 !== undefined ? cy2 : cy);
}

// ── Draw: grass ────────────────────────────────────────────────────────────
function drawGrass() {
  ctx.fillStyle = '#2e8b57';
  ctx.fillRect(0, 0, W, H);
}

// ── Draw: all roads ────────────────────────────────────────────────────────
function drawRoads() {
  // North entry (X=126-144, Y=0-448)
  road(NORTH_X, 0, GRID, MAIN_Y, SPINE_CX, 0, SPINE_CX, MAIN_Y);
  // Main E-W street (full width + east exit to canvas edge)
  road(TX, MAIN_Y, W, GRID, TX, MAIN_CY, W, MAIN_CY);
  // West perimeter (X=0-18, Y=448-628)
  road(WPERIM_X, MAIN_Y, GRID, CRES3_Y + GRID - MAIN_Y, WPERIM_CX, MAIN_Y, WPERIM_CX, CRES3_Y + GRID);
  // East perimeter (X=252-270, Y=448-628)
  road(EPERIM_X, MAIN_Y, GRID, CRES3_Y + GRID - MAIN_Y, EPERIM_CX, MAIN_Y, EPERIM_CX, CRES3_Y + GRID);
  // Central spine (X=126-144, Y=448-628)
  road(SPINE_X, MAIN_Y, GRID, CRES3_Y + GRID - MAIN_Y, SPINE_CX, MAIN_Y, SPINE_CX, CRES3_Y + GRID);
  // Crescent 1 (full width, Y=502-520)
  road(TX, CRES1_Y, TW, GRID, TX, CRES1_CY, TX + TW, CRES1_CY);
  // Crescent 2 (full width, Y=556-574)
  road(TX, CRES2_Y, TW, GRID, TX, CRES2_CY, TX + TW, CRES2_CY);
  // Crescent 3 / south loop (full width, Y=610-628)
  road(TX, CRES3_Y, TW, GRID, TX, CRES3_CY, TX + TW, CRES3_CY);
}

// ── Draw: public area ──────────────────────────────────────────────────────
function drawPublicArea() {
  // Town square X=0-90
  ctx.fillStyle = '#c9b38a';
  ctx.fillRect(0, TY, 90, GRID);
  ctx.strokeStyle = '#a89060'; ctx.lineWidth = 1;
  ctx.strokeRect(0, TY, 90, GRID);

  // Bakery X=90-162
  ctx.fillStyle = '#e8c97a';
  ctx.fillRect(90, TY, 72, GRID);
  ctx.strokeStyle = '#5a4a36'; ctx.lineWidth = 2;
  ctx.strokeRect(90, TY, 72, GRID);
  ctx.fillStyle = '#c4956a'; ctx.fillRect(90, TY, 72, 3);       // roof strip
  ctx.fillStyle = '#7a4a28'; ctx.fillRect(123, TY + 6, 6, 12);  // door

  // Bakery parking X=162-252 (5 bays)
  ctx.fillStyle = '#3f3f3f';
  ctx.fillRect(162, TY, 90, GRID);
  ctx.strokeStyle = '#e0e0e0'; ctx.lineWidth = 1;
  for (let i = 0; i < 5; i++) {
    ctx.strokeRect(162 + i * 18 + 1, TY + 1, 16, GRID - 2);
  }

  // Corner plaza X=252-270 (connects east perimeter)
  ctx.fillStyle = '#c9b38a';
  ctx.fillRect(252, TY, 18, GRID);
}

// ── Draw: parking bay markings on crescent roads ───────────────────────────
function drawParkingBays() {
  const crescentYs = [CRES1_Y, CRES2_Y, CRES3_Y];
  for (let ri = 0; ri < 3; ri++) {
    const cy = crescentYs[ri];
    for (let bi = 0; bi < BLDG_XS.length; bi++) {
      if (BLDG_VARIANTS[bi] === 'std') {
        const bx = BLDG_XS[bi];
        // Two 9×12 bays side-by-side at top of crescent road
        ctx.fillStyle = '#4a4a4a';
        ctx.fillRect(bx + 1, cy + 1, 16, 12);
        ctx.strokeStyle = '#e0e0e0'; ctx.lineWidth = 1;
        ctx.strokeRect(bx + 1,     cy + 1, 8, 12);
        ctx.strokeRect(bx + 9, cy + 1, 8, 12);
      }
    }
  }
}

// ── Draw: gardens, fences, driveways ──────────────────────────────────────
function drawGardens() {
  for (const h of homes) {
    const { gardenRect: g, gate, variant, half } = h;
    // Garden fill
    ctx.fillStyle = '#3ca067';
    ctx.fillRect(g.x, g.y, g.w, g.h);
    // Driveway patch for drv homes
    if (variant === 'drv') {
      const dvx = half === 0 ? g.x : g.x + g.w - 9;
      ctx.fillStyle = '#5a5a5a';
      ctx.fillRect(dvx, g.y, 9, g.h);
    }
    // Fence
    ctx.strokeStyle = '#8b6f47'; ctx.lineWidth = 2;
    ctx.strokeRect(g.x, g.y, g.w, g.h);
    // Gate gap (erase top fence segment)
    ctx.fillStyle = '#3f3f3f'; // road colour shows through
    ctx.fillRect(gate.x, gate.y, gate.w, gate.h);
  }
}

// ── Draw: houses ───────────────────────────────────────────────────────────
function drawHouses() {
  for (const h of homes) {
    const { houseRect: hr, doorX, doorY } = h;
    const sleeping = people[h.id] && people[h.id].state === 'SLEEPING';
    // Walls
    ctx.fillStyle = sleeping ? '#705d4a' : '#a0856a';
    ctx.fillRect(hr.hx, hr.hy, hr.hw, hr.hh);
    ctx.strokeStyle = '#5a4a36'; ctx.lineWidth = 2;
    ctx.strokeRect(hr.hx, hr.hy, hr.hw, hr.hh);
    // Roof strip (north face = front)
    ctx.fillStyle = '#c4956a';
    ctx.fillRect(hr.hx, hr.hy, hr.hw, 3);
    // Door on north face
    ctx.fillStyle = '#7a4a28';
    ctx.fillRect(doorX, doorY, 3, 4);
    // Bed
    drawBed(h);
  }
}

function drawBed(h) {
  ctx.fillStyle = '#d9c9a3';
  ctx.fillRect(h.bedX, h.bedY, 6, 8);
  ctx.fillStyle = '#f4ecd8';
  ctx.fillRect(h.bedX, h.bedY, 6, 3);
}

// ── Draw: person sprite ────────────────────────────────────────────────────
function drawPersonSprite(px, py, skin, walking, sleeping) {
  const sprite = walking ? PERSON_WALK : PERSON_BASE;
  const drawX = Math.floor(px - 2), drawY = Math.floor(py - 4);
  const dim = sleeping ? 0.7 : 1.0;
  function dc(hex) {
    const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    return `rgb(${Math.floor(r*dim)},${Math.floor(g*dim)},${Math.floor(b*dim)})`;
  }
  const cm = { P: dc(skin.headColor), S: dc(skin.shirtColor), B: dc('#1a1a1a') };
  for (let r = 0; r < sprite.length; r++)
    for (let c = 0; c < sprite[r].length; c++) {
      const k = sprite[r][c]; if (k === '_') continue;
      ctx.fillStyle = cm[k]; ctx.fillRect(drawX+c, drawY+r, 1, 1);
    }
}

// ── Draw: car sprite ───────────────────────────────────────────────────────
function drawCarSprite(cx, cy, heading, carColor) {
  const sprite = CAR_SPRITES[heading] || CAR_SPRITES['E'];
  const sw = sprite[0].length, sh = sprite.length;
  const drawX = Math.floor(cx - sw/2), drawY = Math.floor(cy - sh/2);
  const cm = { B: carColor, K: '#111111', W: '#9ad6e8', G: '#3a5a3a' };
  for (let r = 0; r < sh; r++)
    for (let c = 0; c < sw; c++) {
      const k = sprite[r][c]; if (k === '_') continue;
      ctx.fillStyle = cm[k]; ctx.fillRect(drawX+c, drawY+r, 1, 1);
    }
}

// ── Draw: HUD ─────────────────────────────────────────────────────────────
function drawHUD() {
  const counts = {};
  for (const p of people) counts[p.state] = (counts[p.state] || 0) + 1;
  const order = ['AT_HOME','SLEEPING','PACE','EXIT_HOUSE','WANDER','INTERACT','RETURN','ENTER_CAR','DRIVE','PARK_CAR'];
  const lines = [`FPS: ${_fps}`, `People: ${people.length}`].concat(
    order.filter(s => counts[s]).map(s => `${s}: ${counts[s]}`)
  );
  const fw = 148, lh = 12, pad = 6;
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(W - fw - 4, 4, fw, lines.length * lh + pad * 2);
  ctx.fillStyle = '#e8e8e8'; ctx.font = '10px monospace';
  lines.forEach((l, i) => ctx.fillText(l, W - fw, 4 + pad + (i+1)*lh - 2));
}

// ── Draw: all people ───────────────────────────────────────────────────────
function drawPeople() {
  for (const p of people) {
    if (!p.visible) continue;
    const walking = ['EXIT_HOUSE','WANDER','RETURN','PACE'].includes(p.state);
    drawPersonSprite(p.x, p.y, p.skin, walking && p.legFrame, p.state === 'SLEEPING');
    if (p.state === 'INTERACT') {
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(Math.floor(p.x-1), Math.floor(p.y-8), 2, 2);
    }
  }
}

// ── Main draw ──────────────────────────────────────────────────────────────
function draw() {
  drawGrass();
  drawRoads();
  drawPublicArea();
  drawGardens();
  drawHouses();
  drawParkingBays();
  // parked cars
  for (const p of people) if (p.car.parked) drawCarSprite(p.car.x, p.car.y, p.car.heading, p.skin.carColor);
  drawPeople();
  // moving cars
  for (const p of people) if (!p.car.parked) drawCarSprite(p.car.x, p.car.y, p.car.heading, p.skin.carColor);
  drawHUD();
}

// ── Step 3: buildHomes() ──────────────────────────────────────────────────
function buildHomes() {
  homes = [];
  BUILDING_BOXES = [];
  let id = 0;
  for (let ri = 0; ri < 3; ri++) {
    const row = ROWS[ri];
    for (let bi = 0; bi < BLDG_XS.length; bi++) {
      const bx      = BLDG_XS[bi];
      const variant = BLDG_VARIANTS[bi];
      // Register full building bounding box (garden + house) for path rejection
      BUILDING_BOXES.push({ x: bx, y: row.gardenY, w: 36, h: 36, bldgKey: `${ri}_${bi}` });
      for (let half = 0; half < 2; half++) {
        const hx = bx + half * 18;
        const hy = row.houseY;
        const gx = bx + half * 18;
        const gy = row.gardenY;

        // Door on north face of house, centred in half
        const doorX = hx + 7;
        const doorY = hy;        // north face (top edge)

        // Gate: 4px gap in north fence of garden, centred in this half
        const gate = { x: gx + 7, y: gy - 1, w: 4, h: 3 };

        // Bed position — corner rotation by (bldgInRow % 2) XOR half
        const bedCorner = (bi + half) % 2; // 0=top-left, 1=top-right
        const bedX = bedCorner === 0 ? hx + 1 : hx + 11;
        const bedY = hy + 2;

        // Parking
        let parkingX, parkingY;
        if (variant === 'drv') {
          // Driveway: left half parks on left side of garden, right on right
          parkingX = half === 0 ? gx + 2 : gx + 11;
          parkingY = gy + 4;
        } else {
          // Road bay: on the crescent below (south of house)
          parkingX = half === 0 ? bx + 3 : bx + 12;
          parkingY = row.crescentY + 3;
        }

        homes.push({
          id, rowIdx: ri, bldgInRow: bi, half, variant,
          houseRect: { hx, hy, hw: 18, hh: 18 },
          gardenRect: { x: gx, y: gy, w: 18, h: 18 },
          gate,
          doorX, doorY,
          bedX, bedY,
          parkingX, parkingY,
          color: PALETTE[id % PALETTE.length],
        });
        id++;
      }
    }
  }
}

// ── Step 4a: Street waypoint graph ────────────────────────────────────────
function buildStreetNodes() {
  PED_NODES = [];
  ALL_NODES = [];

  // Main street nodes (pedestrians + cars) — Y=MAIN_CY, X every GRID from 0 to 270
  for (let x = 0; x <= TW; x += GRID) {
    const n = { x, y: MAIN_CY };
    PED_NODES.push(n);
    ALL_NODES.push(n);
  }
  // East exit — ped + car (beyond X=270, up to 5 extra nodes)
  for (let x = TW + GRID; x <= TW + 5 * GRID; x += GRID) {
    const n = { x, y: MAIN_CY };
    PED_NODES.push(n);
    ALL_NODES.push(n);
  }
  // North road nodes — car only
  for (let y = MAIN_CY - GRID; y >= 0; y -= GRID) ALL_NODES.push({ x: SPINE_CX, y });

  // Crescent roads + perimeter + spine — car only
  const carYs = [CRES1_CY, CRES2_CY, CRES3_CY];
  for (const cy of carYs) {
    for (let x = 0; x <= TW; x += GRID) ALL_NODES.push({ x, y: cy });
  }
  // Vertical spine nodes
  for (let y = MAIN_CY; y <= CRES3_CY + GRID; y += GRID) ALL_NODES.push({ x: SPINE_CX, y });
  // West perimeter
  for (let y = MAIN_CY; y <= CRES3_CY + GRID; y += GRID) ALL_NODES.push({ x: WPERIM_CX, y });
  // East perimeter
  for (let y = MAIN_CY; y <= CRES3_CY + GRID; y += GRID) ALL_NODES.push({ x: EPERIM_CX, y });
}

function nearestNode(x, y, nodes) {
  let best = nodes[0], bestD = Infinity;
  for (const n of nodes) {
    const d = (n.x - x) ** 2 + (n.y - y) ** 2;
    if (d < bestD) { bestD = d; best = n; }
  }
  return best;
}

// Check if a point is inside a foreign building/garden (not own home's building)
function insideForeignBuilding(x, y, homeId) {
  const h = homes[homeId];
  for (const box of BUILDING_BOXES) {
    if (box.bldgKey === `${h.rowIdx}_${h.bldgInRow}`) continue; // own building
    if (x >= box.x && x < box.x + box.w && y >= box.y && y < box.y + box.h) return true;
  }
  return false;
}

function safePedNode(x, y, homeId) {
  // Return nearest PED_NODE that isn't inside a foreign building
  let best = null, bestD = Infinity;
  for (const n of PED_NODES) {
    if (insideForeignBuilding(n.x, n.y, homeId)) continue;
    const d = (n.x - x) ** 2 + (n.y - y) ** 2;
    if (d < bestD) { bestD = d; best = n; }
  }
  return best || PED_NODES[0];
}

function randomPedNode(homeId) {
  // Pick random main-street node, never foreign building
  const candidates = PED_NODES.filter(n => !insideForeignBuilding(n.x, n.y, homeId));
  return candidates[Math.floor(Math.random() * candidates.length)];
}
function randomCarNode() {
  return ALL_NODES[Math.floor(Math.random() * ALL_NODES.length)];
}

// ── Step 4b: Drive path builders ──────────────────────────────────────────
function buildDrivePath(p) {
  const h   = homes[p.homeId];
  const rowCY = h.rowIdx === 0 ? CRES1_CY : h.rowIdx === 1 ? CRES2_CY : CRES3_CY;
  const path = [
    { x: SPINE_CX, y: rowCY },    // drive to spine on crescent
    { x: SPINE_CX, y: MAIN_CY },  // up spine to main street
  ];
  const extra = 1 + Math.floor(Math.random() * 3);
  for (let i = 0; i < extra; i++) path.push(randomCarNode());
  return path;
}
function buildReturnDrivePath(p, destX, destY) {
  const h   = homes[p.homeId];
  const rowCY = h.rowIdx === 0 ? CRES1_CY : h.rowIdx === 1 ? CRES2_CY : CRES3_CY;
  return [
    { x: SPINE_CX, y: MAIN_CY },
    { x: SPINE_CX, y: rowCY },
    { x: destX,    y: rowCY },
    { x: destX,    y: destY },
  ];
}

// ── Step 5: buildPeople() ─────────────────────────────────────────────────
function buildPeople() {
  people = [];
  for (const h of homes) {
    const spawnX = h.houseRect.hx + 9;
    const spawnY = h.houseRect.hy + 9;
    people.push({
      id: h.id, homeId: h.id,
      x: spawnX, y: spawnY,
      state: 'AT_HOME', stateTimer: 0,
      path: [],
      paceIdx: 0,                    // index into PACE waypoint list
      car: { x: h.parkingX + 9, y: h.parkingY + 6, parked: true, heading: 'E', speed: CAR_SPEED },
      skin: { headColor: '#f4c2a1', shirtColor: h.color, carColor: h.color },
      legFrame: 0, frameTimer: 0,
      visible: true,
      interactPartner: null,
      interactCooldown: 0,
    });
  }
}

// ── Step 6: Full state machine ────────────────────────────────────────────
function stepToward(obj, tx, ty, speed, dt) {
  const dx = tx - obj.x, dy = ty - obj.y;
  const dist = Math.hypot(dx, dy);
  if (dist < speed * dt + 0.5) { obj.x = tx; obj.y = ty; return true; }
  obj.x += (dx / dist) * speed * dt;
  obj.y += (dy / dist) * speed * dt;
  return false;
}

// Car–pedestrian yielding: returns effective car speed
function carEffectiveSpeed(car) {
  for (const p of people) {
    if (!p.visible) continue;
    if (['AT_HOME','SLEEPING','PACE'].includes(p.state)) continue;
    const d = Math.hypot(p.x - car.x, p.y - car.y);
    if (d < 9)  return 0;
    if (d < 18) return CAR_SPEED * 0.4;
  }
  return CAR_SPEED;
}

function updatePerson(p, dt) {
  const h = homes[p.homeId];

  // Cooldown tick
  if (p.interactCooldown > 0) p.interactCooldown = Math.max(0, p.interactCooldown - dt);

  // Leg animation
  p.frameTimer += dt;
  if (p.frameTimer > 0.18) { p.legFrame ^= 1; p.frameTimer = 0; }

  switch (p.state) {

    case 'AT_HOME': {
      // Keep inside room
      p.x = h.houseRect.hx + 9; p.y = h.houseRect.hy + 9;
      if (Math.random() < 0.005)  { startExit(p, h); break; }
      if (Math.random() < 0.001)  { startPace(p, h); break; }
      if (Math.random() < 0.0005) { startSleep(p, h); }
      break;
    }

    case 'SLEEPING': {
      // Move toward bed
      stepToward(p, h.bedX + 3, h.bedY + 4, WALK_SPEED, dt);
      p.stateTimer -= dt;
      if (p.stateTimer <= 0) { p.state = 'AT_HOME'; p.x = h.houseRect.hx + 9; p.y = h.houseRect.hy + 9; }
      break;
    }

    case 'PACE': {
      if (p.path.length === 0) { p.state = 'AT_HOME'; break; }
      const wp = p.path[0];
      if (stepToward(p, wp.x, wp.y, WALK_SPEED * 0.5, dt)) p.path.shift();
      break;
    }

    case 'EXIT_HOUSE': {
      if (p.path.length === 0) {
        if (Math.random() < 0.30 && p.car.parked) {
          p.state = 'ENTER_CAR';
          p.path  = [{ x: h.parkingX + 9, y: h.parkingY + 6 }];
        } else {
          p.state = 'WANDER';
          p.path  = [randomPedNode(p.homeId)];
        }
      } else {
        const wp = p.path[0];
        if (stepToward(p, wp.x, wp.y, WALK_SPEED, dt)) p.path.shift();
      }
      break;
    }

    case 'WANDER': {
      if (p.path.length === 0) {
        if (Math.random() < 0.008) { startReturn(p, h); break; }
        p.path = [randomPedNode(p.homeId)];
      } else {
        const wp = p.path[0];
        if (stepToward(p, wp.x, wp.y, WALK_SPEED, dt)) p.path.shift();
      }
      // Interaction check (0.5%)
      if (p.state === 'WANDER' && !p.interactPartner && p.interactCooldown === 0) {
        for (const q of people) {
          if (q === p || q.state !== 'WANDER' || q.interactPartner || q.interactCooldown > 0) continue;
          if (Math.hypot(q.x - p.x, q.y - p.y) < 12 && Math.random() < 0.005) {
            const dur = 4 + Math.random() * 3;
            p.state = 'INTERACT'; p.stateTimer = dur; p.interactPartner = q;
            q.state = 'INTERACT'; q.stateTimer = dur; q.interactPartner = p;
            p.path = []; q.path = [];
            break;
          }
        }
      }
      break;
    }

    case 'INTERACT': {
      p.stateTimer -= dt;
      if (p.stateTimer <= 0) {
        p.state = 'WANDER'; p.interactPartner = null;
        p.interactCooldown = 1.0;
        p.path = [randomPedNode(p.homeId)];
      }
      break;
    }

    case 'RETURN': {
      if (p.path.length === 0) {
        p.x = h.houseRect.hx + 9; p.y = h.houseRect.hy + 9;
        p.state = 'AT_HOME';
      } else {
        const wp = p.path[0];
        if (stepToward(p, wp.x, wp.y, WALK_SPEED, dt)) p.path.shift();
      }
      break;
    }

    case 'ENTER_CAR': {
      if (p.path.length === 0) {
        p.visible = false;
        p.car.parked = false;
        p.car.x = h.parkingX + 9; p.car.y = h.parkingY + 6;
        p.state = 'DRIVE';
        p.path  = buildDrivePath(p);
      } else {
        const wp = p.path[0];
        if (stepToward(p, wp.x, wp.y, WALK_SPEED, dt)) p.path.shift();
      }
      break;
    }

    case 'DRIVE': {
      if (p.path.length === 0) {
        p.state = 'PARK_CAR';
        p.path  = buildReturnDrivePath(p, h.parkingX + 9, h.parkingY + 6);
      } else {
        const spd = carEffectiveSpeed(p.car);
        const wp  = p.path[0];
        const dx  = wp.x - p.car.x, dy = wp.y - p.car.y;
        if (Math.abs(dx) > Math.abs(dy)) p.car.heading = dx > 0 ? 'E' : 'W';
        else p.car.heading = dy > 0 ? 'S' : 'N';
        if (stepToward(p.car, wp.x, wp.y, spd, dt)) p.path.shift();
      }
      break;
    }

    case 'PARK_CAR': {
      if (p.path.length === 0) {
        p.car.parked = true; p.car.heading = 'N';
        p.car.x = h.parkingX + 9; p.car.y = h.parkingY + 6;
        p.x = h.parkingX + 9; p.y = h.parkingY + 6;
        p.visible = true;
        startReturn(p, h);
      } else {
        const spd = carEffectiveSpeed(p.car);
        const wp  = p.path[0];
        const dx  = wp.x - p.car.x, dy = wp.y - p.car.y;
        if (Math.abs(dx) > Math.abs(dy)) p.car.heading = dx > 0 ? 'E' : 'W';
        else p.car.heading = dy > 0 ? 'S' : 'N';
        if (stepToward(p.car, wp.x, wp.y, spd, dt)) p.path.shift();
      }
      break;
    }
  }
}

// ── State transition helpers ───────────────────────────────────────────────
function startExit(p, h) {
  p.state = 'EXIT_HOUSE';
  const gx = h.gate.x + 2, gy = h.gate.y + 1;
  p.path = [
    { x: h.doorX + 1, y: h.doorY + 2 },
    { x: gx, y: gy },
    { x: gx, y: MAIN_CY },
  ];
}

function startReturn(p, h) {
  p.state = 'RETURN';
  const gx = h.gate.x + 2, gy = h.gate.y + 1;
  const street = safePedNode(p.x, p.y, p.homeId);
  p.path = [
    { x: street.x, y: street.y },
    { x: gx, y: MAIN_CY },
    { x: gx, y: gy },
    { x: h.doorX + 1, y: h.doorY + 2 },
  ];
}

function startSleep(p, h) {
  p.state = 'SLEEPING';
  p.stateTimer = 8 + Math.random() * 12;
}

function startPace(p, h) {
  p.state = 'PACE';
  const cx = h.houseRect.hx + 9, cy = h.houseRect.hy + 9;
  p.path = [
    { x: h.doorX + 1, y: h.doorY + 3 },
    { x: h.bedX + 3,  y: h.bedY + 4 },
    { x: cx, y: cy },
  ];
}

// ── Update ────────────────────────────────────────────────────────────────
function update(dt) {
  for (const p of people) updatePerson(p, dt);
}

// ── Init ──────────────────────────────────────────────────────────────────
buildHomes();
buildStreetNodes();
buildPeople();
requestAnimationFrame(animate);
</script>
